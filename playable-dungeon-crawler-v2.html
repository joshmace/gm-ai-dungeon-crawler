<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dungeon Crawler - v2 Testing Build</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://kit.fontawesome.com/f4b50dbafe.js" crossorigin="anonymous"></script>

    <!-- v1 refactor — module scaffolding (Stage 1a). Each file attaches to a window
         namespace so the main inline script below can call into it as it is filled in
         over later stages. Order matters: base engines first, then UI modules, then
         bootstrap. -->
    <script src="./scripts/rules-engine.js"></script>
    <script src="./scripts/pack-loader.js"></script>
    <script src="./scripts/game-state.js"></script>
    <script src="./scripts/prompt-builder.js"></script>
    <script src="./scripts/response-parser.js"></script>
    <script src="./scripts/llm-proxy.js"></script>
    <script src="./scripts/ui-character.js"></script>
    <script src="./scripts/ui-encounters.js"></script>
    <script src="./scripts/ui-narrative.js"></script>
    <script src="./scripts/ui-features.js"></script>
    <script src="./scripts/ui-hazards.js"></script>
    <script src="./scripts/ui-connections.js"></script>
    <script src="./scripts/ui-dice.js"></script>
    <script src="./scripts/main.js"></script>
</head>
<body>
    <!-- Template placeholders - populated by template loader -->
    <div id="template-loading-overlay"></div>
    <div id="template-debug-panel"></div>
    <div class="app-container" id="app-container"></div>

    <script>
        // ============================================
        // TEMPLATE LOADER
        // ============================================
        
        const TEMPLATES = {
            'loading-overlay': './templates/loading-overlay.html',
            'debug-panel': './templates/debug-panel.html',
            'character-panel': './templates/character-panel.html',
            'narrative-panel': './templates/narrative-panel.html',
            'encounter-panel': './templates/encounter-panel.html'
        };

        const SYSTEM_PROMPT_URL = './ai-gm-system-prompt.md';
        /** GM system prompt template (loaded at startup). Dynamic values filled in by buildSystemPrompt() via {{PLACEHOLDER}} substitution. */
        let SYSTEM_PROMPT_TEMPLATE = '';

        async function loadTemplate(name) {
            const response = await fetch(TEMPLATES[name]);
            if (!response.ok) throw new Error(`Failed to load template: ${name}`);
            return await response.text();
        }

        async function loadAllTemplates() {
            try {
                const [loadingOverlay, characterPanel, narrativePanel, encounterPanel, systemPrompt] = await Promise.all([
                    loadTemplate('loading-overlay'),
                    loadTemplate('character-panel'),
                    loadTemplate('narrative-panel'),
                    loadTemplate('encounter-panel'),
                    fetch(SYSTEM_PROMPT_URL).then(r => {
                        if (!r.ok) throw new Error('Failed to load GM system prompt');
                        return r.text();
                    })
                ]);

                document.getElementById('template-loading-overlay').outerHTML = loadingOverlay;
                // Debug panel removed for Phase 2; re-enable later when enhanced (was: debug-panel template)

                const appContainer = document.getElementById('app-container');
                appContainer.innerHTML = characterPanel + narrativePanel + encounterPanel;

                SYSTEM_PROMPT_TEMPLATE = systemPrompt;
                window.SYSTEM_PROMPT_TEMPLATE = systemPrompt;  // expose for extracted prompt-builder

                return true;
            } catch (error) {
                console.error('Template loading failed:', error);
                document.body.innerHTML = `
                    <div style="color: #e8dcc4; background: #1a1410; padding: 40px; text-align: center; min-height: 100vh;">
                        <h2 style="color: #c85050;">Template Loading Error</h2>
                        <p style="margin-top: 20px;">Failed to load UI templates. Please ensure template files exist in ./templates/</p>
                        <p style="margin-top: 10px; color: #8a7a6a;">${error.message}</p>
                    </div>
                `;
                return false;
            }
        }
    </script>

    <script>
        // ============================================
        // CONFIGURATION & DEBUG
        // ============================================
        
        const CONFIG = {
            DEBUG_MODE: true,
            /** Game Pack manifest: references setting, rules, bestiary, adventure_module, items, character. */
            GAME_PACK: './game_pack_village_three_knots.json',
            API_ENDPOINT: '/api/messages',
            /** Stream GM responses via SSE; set false to fall back to single-shot JSON. */
            STREAM: true,
            /** GM model; overridden by server from /api/config (system-level AI_MODEL). */
            MODEL: 'claude-sonnet-4-5',
            /** Max tokens per GM reply. Lower = less output cost. Easily configurable via Debug Panel → API / Usage. */
            MAX_TOKENS: 1200,
            /** Conversation turns sent with each request. Lower = less input cost. Easily configurable via Debug Panel → API / Usage. */
            MAX_HISTORY_TURNS: 10
        };
        // Stage 1e: expose to extracted modules.
        window.CONFIG = CONFIG;

        /** Condition id (lowercase) -> Font Awesome icon classes. Add/change icons here for each condition from rules.combat.conditions. */
        const CONDITION_ICONS = {
            poisoned: 'fa-sharp-duotone fa-light fa-flask-round-poison',
            blessed: 'fa-sharp-duotone fa-light fa-sparkles',
            stunned: 'fa-sharp-duotone fa-light fa-ban',
            wounded: 'fa-sharp-duotone fa-light fa-bandage',
            exhausted: 'fa-sharp-duotone fa-light fa-face-weary'
        };
        const CONDITION_ICON_DEFAULT = 'fa-sharp-duotone fa-light fa-circle-question';
        // Stage 1e-v: expose to ui-character.js
        window.CONDITION_ICONS = CONDITION_ICONS;
        window.CONDITION_ICON_DEFAULT = CONDITION_ICON_DEFAULT;

        /** Sync Debug Panel API/Usage inputs with CONFIG and update CONFIG when user changes them. */
        function initApiUsageConfig() {
            const maxTokensEl = document.getElementById('configMaxTokens');
            const historyTurnsEl = document.getElementById('configHistoryTurns');
            if (!maxTokensEl || !historyTurnsEl) return;
            maxTokensEl.value = CONFIG.MAX_TOKENS;
            historyTurnsEl.value = CONFIG.MAX_HISTORY_TURNS;
            function applyMaxTokens() {
                const v = parseInt(maxTokensEl.value, 10);
                if (!isNaN(v)) {
                    CONFIG.MAX_TOKENS = Math.max(500, Math.min(8000, v));
                    maxTokensEl.value = CONFIG.MAX_TOKENS;
                }
            }
            function applyHistoryTurns() {
                const v = parseInt(historyTurnsEl.value, 10);
                if (!isNaN(v)) {
                    CONFIG.MAX_HISTORY_TURNS = Math.max(2, Math.min(50, v));
                    historyTurnsEl.value = CONFIG.MAX_HISTORY_TURNS;
                }
            }
            maxTokensEl.addEventListener('change', applyMaxTokens);
            maxTokensEl.addEventListener('blur', applyMaxTokens);
            historyTurnsEl.addEventListener('change', applyHistoryTurns);
            historyTurnsEl.addEventListener('blur', applyHistoryTurns);
        }

        // Debug logging function
        function debugLog(category, message, data = null) {
            if (!CONFIG.DEBUG_MODE) return;
            
            const timestamp = new Date().toLocaleTimeString();
            const prefix = `[${timestamp}] [${category}]`;
            
            console.log(prefix, message, data || '');
            
            // Update debug panel parse log if it's a parse event
            if (category === 'PARSE') {
                const logDiv = document.getElementById('debugParseLog');
                if (logDiv) {
                    const entry = document.createElement('div');
                    entry.textContent = `${timestamp} ${message}`;
                    entry.style.marginBottom = '2px';
                    logDiv.insertBefore(entry, logDiv.firstChild);
                    
                    // Keep only last 20 entries
                    while (logDiv.children.length > 20) {
                        logDiv.removeChild(logDiv.lastChild);
                    }
                }
            }
        }

        // ============================================
        // GAME DATA & STATE
        // ============================================
        
        const gameData = {
            character: null,
            setting: null,
            rules: null,
            bestiary: null,
            module: null
        };
        // Stage 1e: expose to extracted modules. Same object, two access paths
        // (lexical `gameData` for inline code, `window.gameData` for scripts/*.js).
        window.gameData = gameData;

        // XP progression table (fallback when rules.json has no experience.level_progression). Matches rules.json scale (1/10 of classic).
        const XP_LEVELS_DEFAULT = {
            1: 0, 2: 200, 3: 400, 4: 800, 5: 1600,
            6: 3200, 7: 6400, 8: 12800, 9: 25600, 10: 51200
        };

        /** Level thresholds from rules.experience.level_progression when present, else default. Used for XP bar and level-up. */
        function getXPLevels() {
            const prog = gameData.rules && gameData.rules.experience && gameData.rules.experience.level_progression;
            if (prog && typeof prog === 'object' && Object.keys(prog).length > 0) {
                const out = {};
                for (const [k, v] of Object.entries(prog)) {
                    const level = parseInt(k, 10);
                    if (!isNaN(level) && typeof v === 'number') out[level] = v;
                }
                if (Object.keys(out).length > 0) return out;
            }
            return XP_LEVELS_DEFAULT;
        }

        const SAVE_KEY = 'gm-ai-dungeon-save';
        const SAVE_VERSION = 1;

        /** Serializable slice of game state for save. */
        function getStateToSave() {
            return {
                character: JSON.parse(JSON.stringify(gameState.character)),
                currentRoom: gameState.currentRoom,
                triggeredEvents: [...(gameState.triggeredEvents || [])],
                conversationHistory: gameState.conversationHistory.map(m => ({ role: m.role, content: m.content })),
                damageToEncounters: { ...(gameState.damageToEncounters || {}) },
                inCombat: !!gameState.inCombat,
                mode: gameState.mode || 'exploration',
                equippedInUse: [...(gameState.equippedInUse || [])],
                lastCombatRoom: gameState.lastCombatRoom,
                encounterHistory: (gameState.encounterHistory || []).map(e => ({ ...e })),
                readiedWeaponName: gameState.readiedWeaponName,
                armorEquipped: !!gameState.armorEquipped,
                lastUserRollType: gameState.lastUserRollType
            };
        }

        function saveGame() {
            if (!gameState.character || gameState.isDead) return;
            try {
                const payload = {
                    version: SAVE_VERSION,
                    gamePack: CONFIG.GAME_PACK,
                    moduleTitle: gameData.module && gameData.module.module ? gameData.module.module.title : '',
                    savedAt: Date.now(),
                    state: getStateToSave()
                };
                localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
                debugLog('SAVE', 'Game saved');
            } catch (e) {
                console.warn('Save failed:', e);
            }
        }

        function getSaveMetadata() {
            try {
                const raw = localStorage.getItem(SAVE_KEY);
                if (!raw) return null;
                const data = JSON.parse(raw);
                return data && data.version === SAVE_VERSION ? data : null;
            } catch (e) {
                return null;
            }
        }

        function hasValidSave() {
            const meta = getSaveMetadata();
            return meta && meta.gamePack === CONFIG.GAME_PACK;
        }

        function loadGame() {
            const meta = getSaveMetadata();
            if (!meta || meta.gamePack !== CONFIG.GAME_PACK) return false;
            const s = meta.state;
            if (!s || !s.character) return false;
            gameState.character = s.character;
            gameState.currentRoom = s.currentRoom;
            gameState.triggeredEvents = s.triggeredEvents || [];
            gameState.conversationHistory = s.conversationHistory || [];
            gameState.damageToEncounters = s.damageToEncounters || {};
            gameState.inCombat = !!s.inCombat;
            gameState.mode = s.mode || (s.inCombat ? 'combat' : 'exploration');
            gameState.equippedInUse = s.equippedInUse || [];
            gameState.lastCombatRoom = s.lastCombatRoom;
            gameState.encounterHistory = s.encounterHistory || [];
            gameState.readiedWeaponName = s.readiedWeaponName || null;
            gameState.armorEquipped = !!s.armorEquipped;
            gameState.lastUserRollType = s.lastUserRollType || null;
            gameState.isDead = false;
            gameState.pendingLevelUpAck = null;
            debugLog('SAVE', 'Game loaded');
            return true;
        }

        const gameState = {
            character: null,
            currentRoom: null,
            triggeredEvents: [],
            conversationHistory: [],
            waitingForRoll: false,
            pendingRollContext: null,
            /** Damage dealt to each encounter by id (e.g. goblin_guard: 5). Used to show current monster HP. */
            damageToEncounters: {},
            /** True when combat has started (either side attacked). Cleared when all nearby enemies defeated, player dies, or player retreats. */
            inCombat: false,
            /** Current pillar: 'exploration' | 'combat' | 'travel'. Exactly one active; drives mode-specific prompt. */
            mode: 'exploration',
            /** Items put in use during play (e.g. Torch (lit) when player lights one from pack). Shown in Equipped. */
            equippedInUse: [],
            /** Set when we parse torch use from player message; skip GM parse for same turn to avoid double-count. */
            torchUseParsedThisTurn: false,
            /** After a d20 roll: natural value (1-20) and whether it was an attack roll (for crit damage / auto-miss). */
            lastD20Natural: null,
            lastRollWasAttack: false,
            /** When combat ends, store currentRoom here so monster panel can linger until player takes another action. Cleared in submitAction(). */
            lastCombatRoom: null,
            /** Encounter panel history (newest encountered first). Entries persist and update status (active/defeated). */
            encounterHistory: [],
            /** Command history for Up/Down navigation (newest first; max 50). */
            commandHistory: [],
            commandHistoryIndex: -1,
            commandHistoryDraft: '',
            /** True when character has died; death overlay shown, input disabled until choice. */
            isDead: false,
            /** True when the last user message was a dice roll submit; skip parsing monster damage from GM narrative to avoid double-count. */
            lastUserMessageWasDiceRoll: false,
            /** Last roll type: 'resolved' (attack auto-resolved by rules engine) | 'ability' | null (free-form). Drives the current-step hint in the combat prompt. */
            lastUserRollType: null,
        };
        // Stage 1e: expose to extracted modules.
        window.gameState = gameState;

        // ============================================
        // DATA LOADING
        // ============================================
        
        // Stage 1d: data load now flows through the v1 pipeline.
        //   PackLoader.loadPack() -> raw v1 gameData (manifest + 6 archetypes + sidecars, validated)
        //   GameState.init()      -> pre-v1-shaped shim the legacy renderers read
        // The shimmed object is copied onto the existing const-bound `gameData`
        // by property mutation so every downstream access continues to work.
        async function loadGameData() {
            try {
                const v1 = await PackLoader.loadPack(CONFIG.GAME_PACK, updateLoadingStatus);
                const shim = GameState.init(v1);
                Object.assign(gameData, shim);
                debugLog('DATA', 'Pack loaded:', v1.manifest && v1.manifest.id);
                return true;
            } catch (error) {
                console.error('Failed to load game data:', error);
                Main.showError(error);
                return false;
            }
        }

        // Thin wrapper kept so callers later in the monolith (initializeGameStateFromData,
        // finishGameStart) can keep calling updateLoadingStatus without caring that the
        // real implementation lives in scripts/main.js now. Retired during Stage 1e+.
        function updateLoadingStatus(message) {
            Main.setStatus(message);
        }






        const MAX_LEVEL = 10;

        /** Hit die size for level-up HP (from character hit_dice e.g. "3d10" -> 10, or class default). */
        function getHitDieSize() {
            const hd = gameData.character && gameData.character.combat_stats
                && gameData.character.combat_stats.hit_points
                && gameData.character.combat_stats.hit_points.hit_dice
                && gameData.character.combat_stats.hit_points.hit_dice.total;
            if (hd && typeof hd === 'string') {
                const m = hd.match(/d(\d+)/i);
                if (m) return parseInt(m[1], 10);
            }
            const cls = (gameState.character && gameState.character.class || '').toLowerCase();
            if (cls.includes('wizard') || cls.includes('sorcerer')) return 6;
            if (cls.includes('fighter') || cls.includes('paladin') || cls.includes('ranger')) return 10;
            if (cls.includes('cleric') || cls.includes('druid') || cls.includes('bard') || cls.includes('rogue')) return 8;
            return 8;
        }

        /** Process level-up: if XP meets next threshold and level < 10, add level and HP. */
        function processLevelUp() {
            const char = gameState.character;
            if (!char || char.level >= MAX_LEVEL) return;
            const xpLevels = getXPLevels();
            while (char.level < MAX_LEVEL && xpLevels[char.level + 1] != null && char.xp >= xpLevels[char.level + 1]) {
                const sides = getHitDieSize();
                const roll = Math.floor(Math.random() * sides) + 1;
                const conMod = (char.abilities && char.abilities.con && char.abilities.con.modifier) || 0;
                const gain = Math.max(1, roll + conMod);
                char.level += 1;
                char.maxHp += gain;
                char.hp += gain;
                gameState.pendingLevelUpAck = { level: char.level, hpGain: gain };
                addSystemMessage(`Level up! You are now level ${char.level}. Gained ${gain} HP (${roll}${conMod >= 0 ? '+' : ''}${conMod} CON).`);
                debugLog('STATE', `Level up to ${char.level}, +${gain} HP`);
            }
        }

        /**
         * Total modifier from active conditions for this roll. Used so the app enforces condition effects on dice.
         * @param {boolean} isAttackRoll - true for attack rolls, false for ability/skill checks
         * @param {string|null} abilityKey - for checks: 'str'|'dex'|'con'|'int'|'wis'|'cha' (wounded only applies to str/dex/con)
         * @returns {number} modifier to add to the roll (negative = penalty)
         */
        function getConditionModifierForRoll(isAttackRoll, abilityKey) {
            const char = gameState.character;
            const conditions = char && char.conditions ? char.conditions : [];
            const condDefs = gameData.rules && gameData.rules.combat && gameData.rules.combat.conditions;
            if (!condDefs || typeof condDefs !== 'object') return 0;
            let total = 0;
            conditions.forEach(c => {
                const id = (c.id || c.name || c).toLowerCase();
                const def = condDefs[id];
                if (!def || typeof def !== 'object') return;
                const level = c.level != null ? c.level : 1;
                if (isAttackRoll) {
                    if (typeof def.attack_penalty === 'number') total += def.attack_penalty;
                    if (typeof def.attack_penalty_per_level === 'number') total += def.attack_penalty_per_level * level;
                } else {
                    const abilities = def.check_penalty_abilities;
                    if (abilities && Array.isArray(abilities) && abilityKey && !abilities.includes(abilityKey.toLowerCase())) return;
                    if (typeof def.check_penalty === 'number') total += def.check_penalty;
                    if (typeof def.check_penalty_per_level === 'number') total += def.check_penalty_per_level * level;
                }
            });
            return total;
        }


        // ============================================
        // INITIALIZATION
        // ============================================
        
        async function initializeGame() {
            debugLog('INIT', 'Starting game initialization');
            
            // Load all data files
            const loaded = await loadGameData();
            if (!loaded) {
                alert('Failed to load game data. Check console for details and ensure all JSON files are in the same directory.');
                return;
            }
            if (hasValidSave()) {
                showStartChoice();
                return;
            }
            initializeGameStateFromData();
            finishGameStart(true);
        }

        function initializeGameStateFromData() {
            updateLoadingStatus('Initializing game state...');
            gameState.isDead = false;
            gameState.triggeredEvents = [];
            gameState.conversationHistory = [];
            gameState.damageToEncounters = {};
            gameState.inCombat = false;
            gameState.mode = 'exploration';
            gameState.equippedInUse = [];
            gameState.lastCombatRoom = null;
            gameState.encounterHistory = [];
            gameState.commandHistory = [];
            gameState.commandHistoryIndex = -1;
            gameState.commandHistoryDraft = '';
            gameState.pendingLevelUpAck = null;
            gameState.character = {
                name: gameData.character.basic_info.name,
                class: gameData.character.basic_info.class,
                level: gameData.character.basic_info.level,
                hp: gameData.character.combat_stats.hit_points.current,
                maxHp: gameData.character.combat_stats.hit_points.maximum,
                ac: gameData.character.combat_stats.armor_class,
                xp: gameData.character.experience.current,
                abilities: {},
                skills: {},
                equipment: [],
                inventory: [],
                conditions: []
            };
            
            // Convert abilities (map full names to short names)
            const abilityNameMap = {
                strength: 'str', dexterity: 'dex', constitution: 'con',
                intelligence: 'int', wisdom: 'wis', charisma: 'cha'
            };
            for (const [key, value] of Object.entries(gameData.character.ability_scores)) {
                const shortKey = abilityNameMap[key] || key;
                gameState.character.abilities[shortKey] = {
                    score: value.score,
                    modifier: value.modifier
                };
            }
            
            debugLog('INIT', 'Character abilities initialized', gameState.character.abilities);
            
            // Convert skills
            for (const [key, value] of Object.entries(gameData.character.skills)) {
                gameState.character.skills[key] = value.modifier;
            }
            
            // Convert equipment: weapons and armor only (no torch, light sources, etc.)
            for (const item of [...gameData.character.equipment.worn, ...gameData.character.equipment.wielded, ...gameData.character.equipment.carried]) {
                const isWeapon = !!item.damage;
                const isArmor = (item.type || '').toLowerCase() === 'armor';
                if (!isWeapon && !isArmor) continue; // skip torch, light sources, etc.
                const typeInfo = isWeapon ? getWeaponTypeInfo(item) : { type: null, range: null };
                let stats = '';
                if (item.damage) {
                    const base = `${item.damage} ${item.damage_type}`;
                    stats = typeInfo.type === 'ranged' && typeInfo.range
                        ? `${base} (ranged ${typeInfo.range})`
                        : `${base} (${typeInfo.type || 'melee'})`;
                } else {
                    stats = item.properties ? item.properties.join(' - ') : '';
                }
                const eq = {
                    name: item.name,
                    stats,
                    equipped: item.equipped !== undefined ? item.equipped : false,
                    isWeapon,
                    isArmor,
                    weaponType: typeInfo.type,
                    weaponRange: typeInfo.range
                };
                if (isArmor && item.ac != null) eq.ac = item.ac;
                if (isWeapon && item.damage) {
                    eq.damage = item.damage;
                    eq.damage_type = item.damage_type || '';
                    eq.range = item.range || (typeInfo.range ? String(typeInfo.range) : 'melee');
                    eq.properties = item.properties;
                }
                gameState.character.equipment.push(eq);
            }
            // Convert inventory
            for (const item of gameData.character.equipment.backpack) {
                gameState.character.inventory.push({
                    name: item.name,
                    quantity: item.quantity
                });
            }
            
            // Add coins
            const coins = gameData.character.equipment.coin;
            gameState.character.inventory.push({
                name: 'Gold',
                quantity: `${coins.gold}gp`
            });
            
            // Set starting room
            gameState.currentRoom = gameData.module.module.starting_room;
            gameState.readiedWeaponName = null;
            gameState.armorEquipped = true;
        }

        function showStartChoice() {
            const overlay = document.getElementById('loadingOverlay');
            if (!overlay) return;
            const meta = getSaveMetadata();
            const savedAt = meta && meta.savedAt ? new Date(meta.savedAt).toLocaleString() : '';
            overlay.innerHTML = `
                <h2>Saved game found</h2>
                <p class="start-choice-p">Continue your adventure or start a new game.</p>
                ${savedAt ? `<p class="start-choice-meta">Saved: ${savedAt}</p>` : ''}
                <div class="start-choice-buttons">
                    <button type="button" class="primary-button" id="btnContinue">Continue</button>
                    <button type="button" class="secondary-button" id="btnNewGame">New game</button>
                </div>
            `;
            document.getElementById('btnContinue').onclick = () => {
                if (loadGame()) {
                    finishGameStart(false);
                } else {
                    initializeGameStateFromData();
                    finishGameStart(true);
                }
            };
            document.getElementById('btnNewGame').onclick = () => {
                // if (!confirm('Are you sure? Your saved progress will be lost.')) return;
                initializeGameStateFromData();
                finishGameStart(true);
            };
        }

        function finishGameStart(showWelcome) {
            hideDeathOverlay();
            updateLoadingStatus('Rendering interface...');
            initializeCharacterSheet();
            document.getElementById('dungeonTitle').textContent = gameData.module.module.title;
            const modeEl = document.getElementById('modeIndicator');
            if (modeEl) {
                modeEl.textContent = 'Exploration';
                modeEl.className = 'mode-indicator mode-exploration';
            }
            document.getElementById('loadingOverlay').style.display = 'none';
            initApiUsageConfig();
            document.getElementById('playerInput').disabled = false;
            if (showWelcome) {
                const startingRoom = gameData.module.rooms[gameState.currentRoom];
                addSystemMessage(`Welcome to ${gameData.module.module.title}!`);
                addNarration(startingRoom.description);
                if (startingRoom.features) {
                    for (const feature of startingRoom.features) {
                        if (feature.triggers && feature.triggers.includes('on_entry') && feature.text) {
                            addNarration(feature.text);
                        }
                    }
                }
                addSystemMessage('Press Ctrl+Shift+D to toggle debug panel. Type your action and press Enter.');
            } else {
                addSystemMessage('Game loaded.');
                addResumeContext();
            }
            document.getElementById('playerInput').focus();
            const copyBtn = document.getElementById('copyNarrativeBtn');
            if (copyBtn) copyBtn.onclick = () => copyNarrativeToClipboard();
            debugLog('INIT', 'Game initialization complete');
        }

        // ============================================
        // CHARACTER SHEET DISPLAY
        // ============================================
        



        // ============================================
        // STATE MANAGEMENT FUNCTIONS
        // ============================================
        
        function modifyHP(amount) {
            debugLog('STATE', `Modifying HP by ${amount}`);
            gameState.character.hp = Math.max(0, Math.min(gameState.character.maxHp, gameState.character.hp + amount));
            updateCharacterDisplay();
            if (gameState.character.hp === 0) {
                gameState.inCombat = false;
                gameState.mode = 'exploration';
                gameState.lastCombatRoom = gameState.currentRoom;
                saveGame(); // save state just before marking dead so "Load save" restores to last moment
                gameState.isDead = true;
                addSystemMessage("You have died! Your adventure ends here.");
                disableInput(true);
            } else {
                saveGame();
            }
        }
        
        function addXP(amount) {
            debugLog('STATE', `Adding ${amount} XP`);
            gameState.character.xp += amount;
            processLevelUp();
            updateCharacterDisplay();
            saveGame();
        }
        
        function addToInventory(itemName, quantity = 1) {
            debugLog('STATE', `Adding to inventory: ${itemName} x${quantity}`);
            const existing = gameState.character.inventory.find(i => i.name === itemName);
            if (existing) {
                if (typeof existing.quantity === 'number') {
                    existing.quantity += quantity;
                } else {
                    const match = existing.quantity.match(/(\d+)/);
                    if (match) {
                        const current = parseInt(match[1]);
                        existing.quantity = `${current + quantity}gp`;
                    }
                }
            } else {
                gameState.character.inventory.push({ name: itemName, quantity });
            }
            updateCharacterDisplay();
            saveGame();
        }
        
        function removeFromInventory(itemName, quantity = 1) {
            debugLog('STATE', `Removing from inventory: ${itemName} x${quantity}`);
            const item = gameState.character.inventory.find(i => i.name === itemName);
            if (item) {
                if (typeof item.quantity === 'number') {
                    item.quantity = Math.max(0, item.quantity - quantity);
                } else if (typeof item.quantity === 'string' && item.name === 'Gold') {
                    const m = item.quantity.match(/(\d+)/);
                    if (m) {
                        const current = parseInt(m[1], 10);
                        const next = Math.max(0, current - quantity);
                        item.quantity = next > 0 ? `${next}gp` : '0gp';
                    }
                }
            }
            updateCharacterDisplay();
            saveGame();
        }

        /** Deduct gold; returns true if the player had enough and was deducted. */
        function deductGold(amount) {
            if (amount <= 0) return true;
            const item = gameState.character.inventory.find(i => i.name === 'Gold');
            if (!item) return false;
            const m = (item.quantity || '').toString().match(/(\d+)/);
            const current = m ? parseInt(m[1], 10) : 0;
            if (current < amount) return false;
            item.quantity = (current - amount) > 0 ? `${current - amount}gp` : '0gp';
            updateCharacterDisplay();
            saveGame();
            return true;
        }

        /** Current gold amount (number). */
        function getGold() {
            const item = gameState.character.inventory.find(i => i.name === 'Gold');
            if (!item) return 0;
            const m = (item.quantity || '').toString().match(/(\d+)/);
            return m ? parseInt(m[1], 10) : 0;
        }

        /** Default specs for common weapons/armor when not in character data. Name (key) normalized to lowercase. */
        const DEFAULT_EQUIPMENT_SPECS = {
            longsword: { name: 'Longsword', damage: '1d8', damage_type: 'slashing', range: 'melee', properties: ['versatile (1d10)'] },
            shortsword: { name: 'Shortsword', damage: '1d6', damage_type: 'piercing', range: 'melee' },
            dagger: { name: 'Dagger', damage: '1d4', damage_type: 'piercing', range: 'melee', properties: ['finesse', 'light', 'thrown 20/60'] },
            shortbow: { name: 'Shortbow', damage: '1d6', damage_type: 'piercing', range: '80/320', properties: ['ammunition', 'two-handed'] },
            longbow: { name: 'Longbow', damage: '1d8', damage_type: 'piercing', range: '150/600', properties: ['ammunition', 'heavy', 'two-handed'] },
            'chain mail': { name: 'Chain Mail', type: 'armor', ac: 16, properties: ['heavy'] },
            'leather armor': { name: 'Leather Armor', type: 'armor', ac: 11, properties: [] },
            'studded leather': { name: 'Studded Leather', type: 'armor', ac: 12, properties: [] },
            shield: { name: 'Shield', type: 'armor', ac: 2, properties: [] }
        };

        /** Build catalog of equipment specs from gameData + defaults (name -> spec). Used for find/buy parsing. */
        function getEquipmentCatalog() {
            const catalog = new Map();
            const add = (name, spec) => {
                if (name && spec) catalog.set(String(name).trim().toLowerCase(), { ...spec, name: spec.name || name });
            };
            const data = gameData.character && gameData.character.equipment;
            if (data) {
                for (const item of [...(data.worn || []), ...(data.wielded || []), ...(data.carried || [])]) {
                    const n = (item.name || '').trim().toLowerCase();
                    if (!n) continue;
                    if (item.damage) add(n, { name: item.name, damage: item.damage, damage_type: item.damage_type, range: item.range || 'melee', properties: item.properties });
                    else if ((item.type || '').toLowerCase() === 'armor') add(n, { name: item.name, type: 'armor', ac: item.ac, properties: item.properties || [] });
                }
            }
            for (const [k, v] of Object.entries(DEFAULT_EQUIPMENT_SPECS)) {
                if (!catalog.has(k)) catalog.set(k, typeof v.name !== 'undefined' ? v : { ...v, name: k });
            }
            return catalog;
        }

        /** Add a weapon or armor to character equipment (from find/buy). Spec: weapon { name, damage, damage_type?, range?, properties? } or armor { name, type:'armor', ac, properties? }. */
        function addEquipmentItem(spec) {
            if (!spec || !spec.name) return;
            const isArmor = (spec.type || '').toLowerCase() === 'armor';
            const isWeapon = !!spec.damage;
            if (!isWeapon && !isArmor) return;
            const typeInfo = isWeapon ? getWeaponTypeInfo(spec) : { type: null, range: null };
            let stats = '';
            if (isWeapon) {
                const base = `${spec.damage} ${spec.damage_type || ''}`.trim();
                stats = typeInfo.type === 'ranged' && typeInfo.range
                    ? `${base} (ranged ${typeInfo.range})`
                    : `${base} (${typeInfo.type || 'melee'})`;
            } else {
                stats = Array.isArray(spec.properties) ? spec.properties.join(' - ') : (spec.properties || '');
            }
            const eq = {
                name: spec.name,
                stats,
                equipped: false,
                isWeapon,
                isArmor,
                weaponType: typeInfo.type,
                weaponRange: typeInfo.range
            };
            if (isArmor && spec.ac != null) eq.ac = spec.ac;
            if (isWeapon) {
                eq.damage = spec.damage;
                eq.damage_type = spec.damage_type || '';
                eq.range = spec.range || (typeInfo.range ? String(typeInfo.range) : 'melee');
                eq.properties = spec.properties;
            }
            gameState.character.equipment.push(eq);
            updateCharacterDisplay();
            saveGame();
            debugLog('STATE', `Added equipment: ${spec.name}`);
        }

        /** Add a condition by id (from rules.combat.conditions). Id is case-insensitive; stored as lowercase. */
        function addCondition(id) {
            if (!id || typeof id !== 'string') return;
            const normId = id.trim().toLowerCase();
            if (!normId) return;
            const info = getConditionInfo(normId);
            if (!info.effect_summary && !info.effect_detail) {
                const ids = getConditionIdsFromRules();
                if (ids.length && !ids.includes(normId)) return;
            }
            const existing = gameState.character.conditions.find(c => (c.id || c.name || '').toLowerCase() === normId);
            if (existing) return;
            gameState.character.conditions.push({ id: normId });
            debugLog('STATE', `Condition added: ${normId}`);
            updateCharacterDisplay();
            saveGame();
        }

        /** Remove a condition by id. */
        function removeCondition(id) {
            if (!id || typeof id !== 'string') return;
            const normId = id.trim().toLowerCase();
            const before = gameState.character.conditions.length;
            gameState.character.conditions = gameState.character.conditions.filter(
                c => (c.id || c.name || String(c)).toLowerCase() !== normId
            );
            if (gameState.character.conditions.length < before) {
                debugLog('STATE', `Condition removed: ${normId}`);
                updateCharacterDisplay();
                saveGame();
            }
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        
        function disableInput(disabled) {
            const input = document.getElementById('playerInput');
            input.disabled = disabled;
            if (!disabled) input.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitAction();
            }
        }

        function handleInputKeyDown(event) {
            if (event.key !== 'ArrowUp' && event.key !== 'ArrowDown') return;
            const history = gameState.commandHistory;
            if (!history.length) return;
            const input = document.getElementById('playerInput');
            if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (gameState.commandHistoryIndex === -1) {
                    gameState.commandHistoryDraft = input.value;
                    gameState.commandHistoryIndex = 0;
                } else if (gameState.commandHistoryIndex < history.length - 1) {
                    gameState.commandHistoryIndex += 1;
                }
                input.value = history[gameState.commandHistoryIndex];
            } else {
                event.preventDefault();
                if (gameState.commandHistoryIndex <= 0) {
                    gameState.commandHistoryIndex = -1;
                    input.value = gameState.commandHistoryDraft;
                } else {
                    gameState.commandHistoryIndex -= 1;
                    input.value = history[gameState.commandHistoryIndex];
                }
            }
        }

        function submitAction() {
            const input = document.getElementById('playerInput');
            const action = input.value.trim();
            
            if (!action || gameState.waitingForRoll) return;
            
            gameState.lastCombatRoom = null; // clear lingering monster panel when player takes another action
            tryParseWeaponAway(action);
            tryParseWeaponSwitch(action);
            tryParseArmorState(action);
            tryParseRetreat(action);
            gameState.torchUseParsedThisTurn = false; // reset each turn
            tryParsePackItemUse(action, true); // parse player's declared actions (e.g. "I pull out my torch and light it")
            
            addPlayerAction(action);
            input.value = '';
            gameState.commandHistoryIndex = -1;
            gameState.commandHistoryDraft = '';
            if (gameState.commandHistory[0] !== action) {
                gameState.commandHistory.unshift(action);
                if (gameState.commandHistory.length > 50) gameState.commandHistory.pop();
            }
            
            gameState.lastUserRollType = null; // player is taking a new action (not responding to a roll)
            gameState.conversationHistory.push({
                role: "user",
                content: action
            });
            
            callAIGM();
        }



        function processAIResponse(response) {
            debugLog('AI', 'Processing AI response');
            const previousRoom = gameState.currentRoom;
            const previousCombat = gameState.inCombat;
            
            // Parse optional scene directives and strip control tags from visible text.
            let scene = parseSceneDirectives(response);
            let monsterDamageAlreadyApplied = false;
            /** Deferred so display order is: GM block → callouts → outcome line (desired combat flow). */
            const pendingMonsterCallouts = [];
            let pendingMonsterOutcomeLine = null;

            // Monster attack: compute rolls and strip tags; defer adding callouts until after GM narration.
            if (/\[MONSTER_ATTACK\]/i.test(scene.cleanText)) {
                const enc = getFirstActiveEncounterInCurrentRoom();
                const monsterName = enc ? (enc.name || (resolveMonster(enc.monster_ref) && resolveMonster(enc.monster_ref).name) || 'Monster') : 'Monster';
                const attackInfo = getMonsterAttackInfoForCurrentRoom();
                const bonus = attackInfo ? attackInfo.bonus : 0;
                const weaponName = attackInfo ? attackInfo.weaponName : 'attack';
                const rangeLabel = (attackInfo && attackInfo.range && attackInfo.range !== 'melee') ? 'ranged' : 'melee';
                const d20 = Math.floor(Math.random() * 20) + 1;
                const total = d20 + bonus;
                const playerAC = getEffectiveAC();
                const hit = total >= playerAC;
                pendingMonsterCallouts.push(`Attack Roll 1d20: ${d20} (${bonus >= 0 ? '+' : ''}${bonus}) = ${total} (${weaponName}/${rangeLabel})`);
                pendingMonsterCallouts.push(hit ? `HIT: ${total} vs AC ${playerAC}` : `MISS: ${total} vs AC ${playerAC}`);
                if (hit) {
                    let formula = getMonsterDamageFormulaForCurrentRoom();
                    if (!formula) formula = getMonsterDamageFormulaFromAnyRoom();
                    if (!formula) formula = '1d6';
                    const dmgResult = rollDiceFormula(formula);
                    pendingMonsterCallouts.push(`${monsterName}: ${dmgResult.breakdown} (to you)`);
                    modifyHP(-dmgResult.total);
                    monsterDamageAlreadyApplied = true;
                    pendingMonsterOutcomeLine = 'The blow lands and wounds you. Your turn — what do you do?';
                    debugLog('PARSE', `Monster attack hit; damage: ${dmgResult.breakdown}`);
                } else {
                    pendingMonsterOutcomeLine = 'The attack misses. Your turn — what do you do?';
                }
                scene.cleanText = scene.cleanText.replace(/\[MONSTER_ATTACK\]/gi, '').replace(/\s+\./g, '.').replace(/\.\.+/g, '.').trim();
                if (monsterDamageAlreadyApplied) {
                    scene.cleanText = scene.cleanText
                        .replace(/\s*for\s+\[MONSTER_DAMAGE\]\s*damage\.?/gi, '.')
                        .replace(/\[MONSTER_DAMAGE\]/gi, '')
                        .replace(/\s+\./g, '.')
                        .replace(/\.\.+/g, '.')
                        .trim();
                }
            }

            // Monster damage (when GM uses [MONSTER_DAMAGE] without [MONSTER_ATTACK]): compute and strip; defer callout.
            if (!monsterDamageAlreadyApplied && /\[MONSTER_DAMAGE\]/i.test(scene.cleanText)) {
                let formula = getMonsterDamageFormulaForCurrentRoom();
                if (!formula) formula = getMonsterDamageFormulaFromAnyRoom();
                if (!formula) {
                    formula = '1d6';
                    debugLog('PARSE', 'No monster damage formula found; using fallback 1d6');
                }
                const result = rollDiceFormula(formula);
                const enc = getFirstActiveEncounterInCurrentRoom();
                const monsterName = enc ? (enc.name || (resolveMonster(enc.monster_ref) && resolveMonster(enc.monster_ref).name) || 'Monster') : 'Monster';
                pendingMonsterCallouts.push(`${monsterName}: ${result.breakdown} (to you)`);
                modifyHP(-result.total);
                scene.cleanText = scene.cleanText
                    .replace(/\s*for\s+\[MONSTER_DAMAGE\]\s*damage\.?/gi, '.')
                    .replace(/\[MONSTER_DAMAGE\]/gi, '')
                    .replace(/\s+\./g, '.')
                    .replace(/\.\.+/g, '.')
                    .trim();
                debugLog('PARSE', `Monster damage roll: ${result.breakdown}`);
            }
            const displayResponse = scene.cleanText
                .replace(/\[COMBAT:\s*(on|off|true|false|yes|no)\]/gi, '')
                .replace(/\[MODE:\s*(travel|exploration)\]/gi, '')
                .replace(/\[(?:DAMAGE_TO_PLAYER|HEAL_PLAYER|DAMAGE_TO_MONSTER|MONSTER_DEFEATED|MONSTER_FLED):[^\]]*\]/gi, '')
                .trim();
            
            parseStateChanges(scene.cleanText);
            saveGame();
            
            const rollRequestPattern = /\[ROLL_REQUEST:\s*([^\]]+)\]/i;
            const match = displayResponse.match(rollRequestPattern);
            
            if (gameState.isDead) {
                const textToShow = displayResponse.replace(rollRequestPattern, '').trim() || displayResponse.trim();
                showDeathOverlay(textToShow);
                disableInput(true);
            } else if (match) {
                const ability = match[1].trim();
                const abilityLower = ability.toLowerCase();
                if (abilityLower === 'damage' || abilityLower.includes('attack')) {
                    gameState.inCombat = true;
                    gameState.mode = 'combat';
                    ensureCombatRoomHasEncounters();
                    if (abilityLower === 'damage' && !gameState.readiedWeaponName) {
                        const sources = gameData.character && gameData.character.equipment
                            ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                            : [];
                        const firstWeapon = sources.find(w => w.damage);
                        if (firstWeapon) {
                            gameState.readiedWeaponName = firstWeapon.name;
                            updateCharacterDisplay();
                            debugLog('PARSE', `Readied weapon (default for damage roll): ${firstWeapon.name}`);
                        }
                    }
                }
                const formattedResponse = displayResponse.replace(rollRequestPattern, '').trim();
                if (formattedResponse) addNarration(formattedResponse);
                showDiceSection(`Roll ${ability}:`, ability);
            } else {
                // Desired order: GM block first, then monster callouts, then outcome line.
                if (displayResponse) addNarration(displayResponse);
                for (const line of pendingMonsterCallouts) addMechanicsCallout(line);
                if (pendingMonsterOutcomeLine) addNarration(pendingMonsterOutcomeLine);
                disableInput(false);
            }
        }
        
        /** Parse "goblin takes 5 damage" / "hits the goblin for 5" and update tracked monster HP. Checks all rooms so we record damage even if currentRoom was wrong. */
        function parseMonsterDamage(text) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return;
            if (!gameState.damageToEncounters) gameState.damageToEncounters = {};
            let roomWithUpdate = null;
            for (const [roomId, room] of Object.entries(rooms)) {
                if (!room || !room.encounters || room.encounters.length === 0) continue;
                for (const enc of room.encounters) {
                    const monster = resolveMonster(enc.monster_ref);
                    if (!monster) continue;
                    // Match encounter name, monster name, and first word of monster (e.g. "goblin" from "Goblin Warrior") so "the goblin takes 8 damage" parses.
                    const nameList = [enc.name, monster.name].filter(Boolean);
                    const firstWord = (monster.name || '').split(/\s+/)[0];
                    if (firstWord && !nameList.includes(firstWord)) nameList.push(firstWord);
                    // When using a generic short name (first word), only match in current room so we don't apply damage to same-named monsters in other rooms.
                    if (firstWord && nameList.includes(firstWord) && roomId !== gameState.currentRoom) continue;
                    const escapedNames = nameList.map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
                    if (!escapedNames) continue;
                    const patterns = [
                        new RegExp(`(?:the\\s+)?(?:${escapedNames})\\s+takes\\s+(\\d+)\\s+(?:damage|HP)?`, 'gi'),
                        new RegExp(`(?:hits?|strikes?|deals?)\\s+(?:the\\s+)?(?:${escapedNames})\\s+for\\s+(\\d+)\\s*(?:damage|HP)?`, 'gi'),
                        new RegExp(`(\\d+)\\s+(?:damage|HP)\\s+(?:to|against)\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi'),
                        new RegExp(`(?:deal|deals?|dealt)\\s+(?:the\\s+)?(?:${escapedNames})\\s+(\\d+)\\s+(?:damage|HP)?`, 'gi'),
                        new RegExp(`(?:deal|deals?|dealt)\\s+(\\d+)\\s+(?:damage|HP)\\s+(?:to|against)\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi')
                    ];
                    for (const re of patterns) {
                        let m;
                        re.lastIndex = 0;
                        while ((m = re.exec(text)) !== null) {
                            const damage = parseInt(m[1], 10);
                            gameState.damageToEncounters[enc.id] = (gameState.damageToEncounters[enc.id] || 0) + damage;
                            gameState.inCombat = true;
                            gameState.mode = 'combat';
                            roomWithUpdate = roomId;
                            debugLog('PARSE', `Monster damage: ${enc.name} +${damage} (total: ${gameState.damageToEncounters[enc.id]}/${monster.hp})`);
                        }
                    }
                    // NOTE: Narrative death/flee detection removed — the GM frequently uses dramatic death
                    // language on non-lethal hits (e.g. "collapses" for a blow that leaves 13 HP).
                    // Monster defeat is now driven ONLY by HP math (damage >= monster.hp) or an
                    // explicit [MONSTER_DEFEATED: id] / [MONSTER_FLED: id] tag from the GM.
                    // See parseExplicitStateTags for tag handling.
                }
            }
            if (roomWithUpdate) {
                const room = rooms[roomWithUpdate];
                gameState.currentRoom = roomWithUpdate;
                if (room && room.encounters && room.encounters.length > 0) {
                    const allDefeated = room.encounters.every(enc => getEncounterHP(enc).defeated);
                    if (allDefeated) {
                        gameState.inCombat = false;
                        gameState.mode = 'exploration';
                        gameState.lastCombatRoom = roomWithUpdate;
                        debugLog('PARSE', 'Combat ended: all enemies defeated');
                    } else {
                        // Still in active combat in this room.
                        gameState.inCombat = true;
                        gameState.mode = 'combat';
                    }
                }
            }
        }

        /** Normalize ids/names for robust tag target matching. */
        function normalizeEntityToken(s) {
            return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
        }

        /** Find encounter by explicit tag token (encounter id/name/monster_ref/monster name). Prefers current room. */
        function findEncounterForStateTag(targetToken) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return null;
            const token = normalizeEntityToken(targetToken);
            if (!token) return null;

            function scanRoom(roomId) {
                const room = rooms[roomId];
                if (!room || !room.encounters) return null;
                for (const enc of room.encounters) {
                    const monster = resolveMonster(enc.monster_ref);
                    const candidates = [
                        enc.id,
                        enc.name,
                        enc.monster_ref,
                        monster && monster.id,
                        monster && monster.name
                    ];
                    if (candidates.some(c => normalizeEntityToken(c) === token)) {
                        return { roomId, room, encounter: enc, monster };
                    }
                }
                return null;
            }

            if (gameState.currentRoom) {
                const cur = scanRoom(gameState.currentRoom);
                if (cur) return cur;
            }
            for (const roomId of Object.keys(rooms)) {
                if (roomId === gameState.currentRoom) continue;
                const hit = scanRoom(roomId);
                if (hit) return hit;
            }
            return null;
        }

        /**
         * Parse explicit state tags (authoritative) and apply directly.
         * Supported tags:
         * - [DAMAGE_TO_PLAYER: 4]
         * - [HEAL_PLAYER: 6]
         * - [DAMAGE_TO_MONSTER: goblin_fighter, 5]
         * - [MONSTER_DEFEATED: goblin_fighter]
         * - [MONSTER_FLED: goblin_scout]
         */
        function parseExplicitStateTags(text) {
            const out = {
                text,
                hasPlayerDamageTag: false,
                hasPlayerHealTag: false,
                hasMonsterDamageTag: false
            };
            if (!text) return out;

            let roomWithUpdate = null;
            let m;

            const dmgPlayerRe = /\[DAMAGE_TO_PLAYER:\s*(\d+)\s*\]/gi;
            while ((m = dmgPlayerRe.exec(text)) !== null) {
                out.hasPlayerDamageTag = true;
                const damage = parseInt(m[1], 10);
                if (damage >= 1 && damage <= 999) {
                    // Hazard/trap damage — do NOT force combat mode; [COMBAT: on] handles that separately
                    modifyHP(-damage);
                    addMechanicsCallout(`Hazard: ${damage} damage\nHP: ${gameState.character.hp}/${gameState.character.maxHp}`);
                    debugLog('PARSE', `Tag damage TO PLAYER: ${damage}`);
                }
            }

            const healPlayerRe = /\[HEAL_PLAYER:\s*(\d+)\s*\]/gi;
            while ((m = healPlayerRe.exec(text)) !== null) {
                out.hasPlayerHealTag = true;
                const healing = parseInt(m[1], 10);
                if (healing >= 1 && healing <= 999) {
                    modifyHP(healing);
                    addMechanicsCallout(`Healed: +${healing} HP\nHP: ${gameState.character.hp}/${gameState.character.maxHp}`);
                    debugLog('PARSE', `Tag healing TO PLAYER: ${healing}`);
                }
            }

            const dmgMonsterRe = /\[DAMAGE_TO_MONSTER:\s*([^,\]]+)\s*,\s*(\d+)\s*\]/gi;
            while ((m = dmgMonsterRe.exec(text)) !== null) {
                out.hasMonsterDamageTag = true;
                const target = m[1].trim();
                const damage = parseInt(m[2], 10);
                if (!(damage >= 1 && damage <= 999)) continue;
                const found = findEncounterForStateTag(target);
                if (!found) {
                    debugLog('PARSE', `Tag damage to monster ignored (no target match): ${target}`);
                    continue;
                }
                gameState.damageToEncounters[found.encounter.id] = (gameState.damageToEncounters[found.encounter.id] || 0) + damage;
                gameState.inCombat = true;
                gameState.mode = 'combat';
                roomWithUpdate = found.roomId;
                debugLog('PARSE', `Tag damage TO MONSTER: ${found.encounter.name} +${damage}`);
            }

            const defeatedMonsterRe = /\[MONSTER_DEFEATED:\s*([^\]]+)\s*\]/gi;
            while ((m = defeatedMonsterRe.exec(text)) !== null) {
                out.hasMonsterDamageTag = true;
                const target = m[1].trim();
                const found = findEncounterForStateTag(target);
                if (!found) {
                    debugLog('PARSE', `Tag monster defeated ignored (no target match): ${target}`);
                    continue;
                }
                const hp = getEncounterHP(found.encounter);
                const currentDamage = gameState.damageToEncounters[found.encounter.id] || 0;
                gameState.damageToEncounters[found.encounter.id] = Math.max(currentDamage, hp.max);
                gameState.inCombat = true;
                gameState.mode = 'combat';
                roomWithUpdate = found.roomId;
                debugLog('PARSE', `Tag monster defeated: ${found.encounter.name} (set to 0/${hp.max})`);
            }

            const fledMonsterRe = /\[MONSTER_FLED:\s*([^\]]+)\s*\]/gi;
            while ((m = fledMonsterRe.exec(text)) !== null) {
                out.hasMonsterDamageTag = true;
                const target = m[1].trim();
                const found = findEncounterForStateTag(target);
                if (!found) {
                    debugLog('PARSE', `Tag monster fled ignored (no target match): ${target}`);
                    continue;
                }
                const hp = getEncounterHP(found.encounter);
                const currentDamage = gameState.damageToEncounters[found.encounter.id] || 0;
                gameState.damageToEncounters[found.encounter.id] = Math.max(currentDamage, hp.max);
                gameState.inCombat = true;
                gameState.mode = 'combat';
                roomWithUpdate = found.roomId;
                debugLog('PARSE', `Tag monster fled (tracked as defeated): ${found.encounter.name} (set to 0/${hp.max})`);
            }

            if (roomWithUpdate) {
                gameState.currentRoom = roomWithUpdate;
                // Do NOT call ensureCombatRoomHasEncounters() here: it would jump to another room with
                // active encounters (e.g. morale_chamber) when this room just ended combat, making Scout/Fighter appear early.
                const room = gameData.module && gameData.module.rooms && gameData.module.rooms[roomWithUpdate];
                if (room && room.encounters && room.encounters.length > 0) {
                    const allDefeated = room.encounters.every(enc => getEncounterHP(enc).defeated);
                    if (allDefeated) {
                        gameState.inCombat = false;
                        gameState.mode = 'exploration';
                        gameState.lastCombatRoom = roomWithUpdate;
                        debugLog('PARSE', 'Combat ended: all enemies defeated (explicit tag)');
                    }
                }
            }

            out.text = text.replace(/\[(?:DAMAGE_TO_PLAYER|HEAL_PLAYER|DAMAGE_TO_MONSTER|MONSTER_DEFEATED|MONSTER_FLED):[^\]]*\]/gi, ' ');
            return out;
        }
        
        /** If narrative indicates the player entered a different room, update currentRoom so combat indicator etc. are correct. */
        function tryParseRoomChange(text) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms || !text) return;
            const t = text.toLowerCase();
            const normalized = t.replace(/\bmoral chamber\b/g, 'morale chamber');
            const movementWord = /\b(?:enter|reach|arrive|step into|are now in|find yourself in|head (?:in)?to|go (?:in)?to)\b/.test(t);
            if (!movementWord) return;
            for (const [roomId, room] of Object.entries(rooms)) {
                if (!room) continue;
                if (roomId === gameState.currentRoom) continue;
                const roomName = (room.name || '').toLowerCase();
                const roomIdPhrase = roomId.replace(/_/g, ' ').toLowerCase();
                if (roomName && normalized.includes(roomName)) {
                    gameState.currentRoom = roomId;
                    updateCharacterDisplay();
                    debugLog('PARSE', `Room changed to: ${roomId} (${room.name})`);
                    return;
                }
                if (roomIdPhrase && normalized.includes(roomIdPhrase)) {
                    gameState.currentRoom = roomId;
                    updateCharacterDisplay();
                    debugLog('PARSE', `Room changed to: ${roomId} (id phrase "${roomIdPhrase}")`);
                    return;
                }
            }
        }
        
        /** Parse [COMBAT: on] and [COMBAT: off] — GM explicitly sets combat state. Takes precedence over heuristics. */
        function tryParseCombatTag(text) {
            if (!text) return;
            const onMatch = text.match(/\[COMBAT:\s*(on|true|yes)\]/i);
            const offMatch = text.match(/\[COMBAT:\s*(off|false|no)\]/i);
            if (onMatch) {
                gameState.inCombat = true;
                gameState.mode = 'combat';
                gameState.combatStateFromTag = true;
                ensureCombatRoomHasEncounters();
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat state: on (GM tag)');
            } else if (offMatch) {
                gameState.inCombat = false;
                gameState.mode = 'exploration';
                gameState.lastCombatRoom = gameState.currentRoom;
                gameState.combatStateFromTag = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat state: off (GM tag)');
            }
        }

        /** Fallback: if GM says combat begins/starts (and no explicit tag), set in-combat. */
        function tryParseCombatBegins(text) {
            if (!text) return;
            if (text.match(/\[COMBAT:\s*(on|off|true|false)\]/i)) return; // GM used tag, skip heuristic
            const t = text.toLowerCase();
            if (/\bcombat\s+(?:begins?|starts?)\b/.test(t) || /\b(?:the\s+)?(?:fight|battle)\s+(?:begins?|starts?|is\s+on)\b/.test(t) || /\b(?:you\s+are\s+)(?:in\s+)?combat\b/.test(t)) {
                gameState.inCombat = true;
                gameState.mode = 'combat';
                ensureCombatRoomHasEncounters();
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat began (GM narrative fallback)');
            }
        }
        
        /** If narrative or player message indicates retreat/flee, end combat. */
        function tryParseRetreat(text) {
            if (!text) return;
            const t = text.toLowerCase();
            const gmNarrative = /\b(?:you\s+)(?:run|retreat|flee|escape|withdraw|manage to|succeed in)\b/.test(t) ||
                /\b(?:you\s+)(?:run|retreat|flee|escape)\s+(?:away|safely|back)/.test(t) ||
                /\b(?:run\s+away|retreat|fled|escape|withdraw)\b.*\b(?:safely|successfully|manage)\b/.test(t);
            const playerDeclares = /\b(?:i\s+)(?:run\s+away|retreat|flee|escape|withdraw|disengage)\b/.test(t) ||
                /\b(?:i'll\s+)(?:run\s+away|retreat|flee|escape)\b/.test(t);
            if (gmNarrative || playerDeclares) {
                gameState.inCombat = false;
                gameState.mode = 'exploration';
                gameState.lastCombatRoom = gameState.currentRoom;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat ended: retreat/flee');
            }
        }
        
        /** If text mentions removing or donning armor, update armorEquipped and AC. */
        function tryParseArmorState(text) {
            const t = text.toLowerCase();
            if (/\b(?:remove|take off|doff|strip off|unequip)\s+(?:your?)?\s*(?:armor|chain mail|mail)\b/i.test(t) ||
                /\b(?:you\s+)?(?:remove|doff)\s+(?:your?)?\s*(?:armor|chain mail)\b/i.test(t)) {
                gameState.armorEquipped = false;
                updateCharacterDisplay();
                debugLog('PARSE', 'Armor removed; AC now unarmored');
            } else if (/\b(?:put on|don|equip|wear)\s+(?:your?)?\s*(?:armor|chain mail|mail)\b/i.test(t) ||
                /\b(?:you\s+)?(?:don|put on)\s+(?:your?)?\s*(?:armor|chain mail)\b/i.test(t)) {
                gameState.armorEquipped = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Armor donned');
            }
        }

        /** Parse [CONDITION: add id] and [CONDITION: remove id]; optionally narrative phrases for known condition ids. */
        function tryParseConditions(text) {
            if (!text) return;
            const ids = getConditionIdsFromRules();
            const tagAdd = /\[CONDITION:\s*add\s+([^\]]+)\]/gi;
            const tagRemove = /\[CONDITION:\s*remove\s+([^\]]+)\]/gi;
            let m;
            while ((m = tagAdd.exec(text)) !== null) {
                addCondition(m[1].trim());
            }
            while ((m = tagRemove.exec(text)) !== null) {
                removeCondition(m[1].trim());
            }
            const t = text.toLowerCase();
            ids.forEach(id => {
                const info = getConditionInfo(id);
                const name = info.name.toLowerCase();
                if (name && (t.includes(`you are ${name}`) || t.includes(`you're ${name}`) || t.includes(`you become ${name}`) || t.includes(`you have been ${name}`))) {
                    addCondition(id);
                }
                if (name && (t.includes(`no longer ${name}`) || t.includes(`no longer ${id}`) || t.includes(`${name} wears off`) || t.includes(`${name} ends`) || t.includes(`${name} clears`))) {
                    removeCondition(id);
                }
            });
        }
        
        /** If text mentions putting away / sheathing a weapon, clear readied weapon so no weapon is highlighted. */
        function tryParseWeaponAway(text) {
            if (!text) return;
            const t = text.toLowerCase();
            if (/\b(?:put|puts?)\s+(?:my|your?|the)\s+(?:sword|weapon|blade|longsword|shortbow)\s+away\b/.test(t) ||
                /\b(?:put|puts?)\s+away\s+(?:my|your?|the)\s+(?:sword|weapon|blade|longsword|shortbow)\b/.test(t) ||
                /\bsheathe?s?\s+(?:my|your?|the)\s+(?:sword|weapon|blade)?\b/.test(t) ||
                /\bstow?s?\s+(?:my|your?|the)\s+(?:sword|weapon)\b/.test(t) ||
                /\b(?:you\s+)?(?:put|sheathe?|stow)\s+(?:your?\s+)?(?:sword|weapon)\s+away\b/.test(t)) {
                gameState.readiedWeaponName = null;
                updateCharacterDisplay();
                debugLog('PARSE', 'Readied weapon cleared (put away / sheathed)');
            }
        }
        
        /** If text mentions switching/drawing/readying/attacking with a weapon, set readied weapon and update panel. */
        function tryParseWeaponSwitch(text) {
            const sources = gameData.character && gameData.character.equipment
                ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                : [];
            const weaponNames = sources.filter(w => w.damage).map(w => w.name).filter(Boolean);
            for (const name of weaponNames) {
                const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const patterns = [
                    new RegExp(`(?:switch|switch to|draw|ready|use|wield|pull out)\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:attack|strike|hit)\\s+(?:with|using)\\s+(?:your?|my\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:attack|strike)\\s+(?:the\\s+)?[^\\s]+\\s+with\\s+(?:your?|my\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:you\\s+)?(?:draw|ready|switch to)\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:you\\s+)?(?:attack|strike)\\s+with\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`${escaped}\\s+(?:is\\s+)?(?:now\\s+)?(?:readied?|drawn|out)`, 'i')
                ];
                for (const p of patterns) {
                    if (p.test(text)) {
                        gameState.readiedWeaponName = name;
                        updateCharacterDisplay();
                        debugLog('PARSE', `Readied weapon set to: ${name}`);
                        return;
                    }
                }
            }
        }
        
        /** Parse [MODE: travel] and [MODE: exploration] — GM switches pillar. */
        function tryParseModeTag(text) {
            if (!text) return;
            const travelMatch = text.match(/\[MODE:\s*travel\]/i);
            const explorMatch = text.match(/\[MODE:\s*exploration\]/i);
            if (travelMatch) {
                gameState.mode = 'travel';
                updateCharacterDisplay();
                debugLog('PARSE', 'Mode: travel (GM tag)');
            } else if (explorMatch) {
                gameState.mode = 'exploration';
                updateCharacterDisplay();
                debugLog('PARSE', 'Mode: exploration (GM tag)');
            }
        }

        function parseStateChanges(text) {
            debugLog('PARSE', 'Parsing state changes from AI response');
            gameState.combatStateFromTag = false; // reset; set true if GM used [COMBAT: on/off]
            // Strip HTML so "You take <b>4</b> damage" is parseable (GM may use <b>/<i> in responses)
            let plainText = text.replace(/<[^>]*>/g, ' ');
            plainText = plainText.replace(/\s+/g, ' ').trim();
            
            tryParseRoomChange(plainText);
            tryParseModeTag(plainText);
            tryParseCombatTag(plainText);   // GM tag takes precedence
            tryParseCombatBegins(plainText);
            tryParseRetreat(plainText);
            tryParseWeaponAway(plainText);
            tryParseWeaponSwitch(plainText);
            tryParseArmorState(plainText);
            tryParseConditions(plainText);
            const explicitState = parseExplicitStateTags(plainText);
            plainText = explicitState.text.replace(/\s+/g, ' ').trim();
            // Skip narrative monster-damage parsing when damage was already applied from a mechanics callout (player just submitted a damage roll)
            if (!explicitState.hasMonsterDamageTag && !gameState.lastUserMessageWasDiceRoll) {
                parseMonsterDamage(plainText); // fallback only when no explicit monster damage tags are present
            }
            updateCharacterDisplay();
            
            // Parse HP changes - DAMAGE (only when the PLAYER receives damage, not when the player deals damage)
            // Many patterns to catch varied GM phrasings; stop at first match to avoid double-counting
            const damageToPlayerPatterns = [
                /(?:you|your character)\s+(?:take|taking|suffer|lose)\s+(\d+)\s+(?:points?\s+of\s+)?(?:damage|HP)\b/i,
                /(?:you(?:\s+are|'re)?|your character(?:\s+is)?)\s+(?:hit|struck|wounded)\s+for\s+(\d+)\b/i,
                /(?:hits?|strikes?|deals?|inflicts?|wounds?)\s+(?:you|your character)\s+(?:for\s+)?(\d+)\s*(?:damage|HP)?\b/i,
                /deals?\s+(\d+)\s+(?:damage|HP)\s+(?:to|against|upon)\s+(?:you|your character)\b/i,
                /dealing\s+(\d+)\s+(?:damage|HP)\s+(?:to|against|upon)\s+(?:you|your character)\b/i,
                /(\d+)\s+(?:damage|HP)\s+(?:to|against|upon)\s+(?:you|your character)\b/i
            ];
            
            if (!explicitState.hasPlayerDamageTag) {
                const lastUser = gameState.conversationHistory.length > 0 ? gameState.conversationHistory[gameState.conversationHistory.length - 1] : null;
                const lastContent = (lastUser && lastUser.role === 'user' && lastUser.content) ? String(lastUser.content).trim() : '';
                const lastUserDamageRoll = lastContent ? (lastContent.match(/^(?:i\s+rolled\s+)?(\d+)$/i) || lastContent.match(/(?:rolled\s+)?(\d+)\s*(?:for\s+damage|damage)?/i)) : null;
                const lastRollValue = lastUserDamageRoll ? parseInt(lastUserDamageRoll[1], 10) : null;
                for (const pattern of damageToPlayerPatterns) {
                    const match = plainText.match(pattern);
                    if (match) {
                        const damage = parseInt(match[1], 10);
                        if (damage >= 1 && damage <= 999) {
                            if (lastRollValue !== null && damage === lastRollValue) {
                                debugLog('PARSE', `Skipping damage TO PLAYER: ${damage} (same as player's last roll — likely GM meant monster took this damage)`);
                                break;
                            }
                            debugLog('PARSE', `Detected damage TO PLAYER: ${damage}`);
                            // Do NOT force combat mode here — [COMBAT: on] is the authoritative signal
                            modifyHP(-damage);
                            addMechanicsCallout(`Damage: ${damage} HP\nHP: ${gameState.character.hp}/${gameState.character.maxHp}`);
                        }
                        break;
                    }
                }
            }
            
            // Parse HP changes - HEALING
            const healPatterns = [
                /(?:heal|restore|regain)\s+(\d+)\s+(?:HP|hit points)/i,
                /(\d+)\s+HP\s+(?:restored|healed)/i
            ];
            
            if (!explicitState.hasPlayerHealTag) {
                for (const pattern of healPatterns) {
                    const match = plainText.match(pattern);
                    if (match) {
                        const healing = parseInt(match[1]);
                        debugLog('PARSE', `Detected healing: ${healing}`);
                        modifyHP(healing);
                        break;
                    }
                }
            }
            
            // XP and gold are NOT parsed from GM narrative — they come only from mechanics callouts (e.g. on enemy defeat). Do not double-award.
            
            // Parse item acquisition (find/discover/obtain) — weapon/armor -> equipment; else -> pack
            const itemPattern = /(?:find|discover|obtain|take)\s+(?:a|an|the)\s+([^.!?,]+?)(?:\.|!|,|\s+in\s+|\s+from\s+)/i;
            const itemMatch = plainText.match(itemPattern);
            if (itemMatch && !plainText.match(/gold|damage|HP/i)) {
                const itemName = itemMatch[1].trim();
                if (itemName.length < 30 && !itemName.includes('you') && !itemName.includes('your')) {
                    const catalog = getEquipmentCatalog();
                    const key = itemName.toLowerCase().replace(/\s+/g, ' ').trim().replace(/^(?:a|an|the)\s+/, '');
                    let spec = catalog.get(key);
                    if (!spec) {
                        for (const [k, v] of catalog) {
                            if (key.includes(k) || k.includes(key)) { spec = v; break; }
                        }
                    }
                    if (spec && (spec.damage || (spec.type || '').toLowerCase() === 'armor')) {
                        debugLog('PARSE', `Detected equipment: ${itemName}`);
                        addEquipmentItem(spec);
                    } else {
                        debugLog('PARSE', `Detected item: ${itemName}`);
                        addToInventory(itemName, 1);
                    }
                }
            }

            // Parse purchases (buy X for Y gp / pay Y gp for X) — deduct gold, add item to equipment or pack
            const buyPatterns = [
                /(?:you\s+)?(?:buy|purchase)\s+(?:a|an|the)?\s*([^.!?,]+?)\s+for\s+(\d+)\s*(?:gp|gold)/i,
                /(?:you\s+)?pay\s+(\d+)\s*(?:gp|gold)\s+for\s+(?:a|an|the)?\s*([^.!?,]+?)(?:\.|,|$)/i
            ];
            for (const pat of buyPatterns) {
                const m = plainText.match(pat);
                if (m) {
                    const amount = parseInt(pat.source.includes('pay') ? m[1] : m[2], 10);
