<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dungeon Crawler - v2 Testing Build</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://kit.fontawesome.com/f4b50dbafe.js" crossorigin="anonymous"></script>

    <!-- v1 refactor — module scaffolding (Stage 1a). Each file attaches to a window
         namespace so the main inline script below can call into it as it is filled in
         over later stages. Order matters: base engines first, then UI modules, then
         bootstrap. -->
    <script src="./scripts/rules-engine.js"></script>
    <script src="./scripts/pack-loader.js"></script>
    <script src="./scripts/game-state.js"></script>
    <script src="./scripts/prompt-builder.js"></script>
    <script src="./scripts/response-parser.js"></script>
    <script src="./scripts/llm-proxy.js"></script>
    <script src="./scripts/ui-character.js"></script>
    <script src="./scripts/ui-encounters.js"></script>
    <script src="./scripts/ui-narrative.js"></script>
    <script src="./scripts/ui-features.js"></script>
    <script src="./scripts/ui-hazards.js"></script>
    <script src="./scripts/ui-connections.js"></script>
    <script src="./scripts/ui-dice.js"></script>
    <script src="./scripts/main.js"></script>
</head>
<body>
    <!-- Template placeholders - populated by template loader -->
    <div id="template-loading-overlay"></div>
    <div id="template-debug-panel"></div>
    <div class="app-container" id="app-container"></div>

    <script>
        // ============================================
        // TEMPLATE LOADER
        // ============================================
        
        const TEMPLATES = {
            'loading-overlay': './templates/loading-overlay.html',
            'debug-panel': './templates/debug-panel.html',
            'character-panel': './templates/character-panel.html',
            'narrative-panel': './templates/narrative-panel.html',
            'encounter-panel': './templates/encounter-panel.html'
        };

        const SYSTEM_PROMPT_URL = './ai-gm-system-prompt.md';
        /** GM system prompt template (loaded at startup). Dynamic values filled in by buildSystemPrompt() via {{PLACEHOLDER}} substitution. */
        let SYSTEM_PROMPT_TEMPLATE = '';

        async function loadTemplate(name) {
            const response = await fetch(TEMPLATES[name]);
            if (!response.ok) throw new Error(`Failed to load template: ${name}`);
            return await response.text();
        }

        async function loadAllTemplates() {
            try {
                const [loadingOverlay, characterPanel, narrativePanel, encounterPanel, systemPrompt] = await Promise.all([
                    loadTemplate('loading-overlay'),
                    loadTemplate('character-panel'),
                    loadTemplate('narrative-panel'),
                    loadTemplate('encounter-panel'),
                    fetch(SYSTEM_PROMPT_URL).then(r => {
                        if (!r.ok) throw new Error('Failed to load GM system prompt');
                        return r.text();
                    })
                ]);

                document.getElementById('template-loading-overlay').outerHTML = loadingOverlay;
                // Debug panel removed for Phase 2; re-enable later when enhanced (was: debug-panel template)

                const appContainer = document.getElementById('app-container');
                appContainer.innerHTML = characterPanel + narrativePanel + encounterPanel;

                SYSTEM_PROMPT_TEMPLATE = systemPrompt;
                window.SYSTEM_PROMPT_TEMPLATE = systemPrompt;  // expose for extracted prompt-builder

                return true;
            } catch (error) {
                console.error('Template loading failed:', error);
                document.body.innerHTML = `
                    <div style="color: #e8dcc4; background: #1a1410; padding: 40px; text-align: center; min-height: 100vh;">
                        <h2 style="color: #c85050;">Template Loading Error</h2>
                        <p style="margin-top: 20px;">Failed to load UI templates. Please ensure template files exist in ./templates/</p>
                        <p style="margin-top: 10px; color: #8a7a6a;">${error.message}</p>
                    </div>
                `;
                return false;
            }
        }
    </script>

    <script>
        // ============================================
        // CONFIGURATION & DEBUG
        // ============================================
        
        const CONFIG = {
            DEBUG_MODE: true,
            /** Game Pack manifest: references setting, rules, bestiary, adventure_module, items, character. */
            GAME_PACK: './game_pack_village_three_knots.json',
            API_ENDPOINT: '/api/messages',
            /** Stream GM responses via SSE; set false to fall back to single-shot JSON. */
            STREAM: true,
            /** GM model; overridden by server from /api/config (system-level AI_MODEL). */
            MODEL: 'claude-sonnet-4-5',
            /** Max tokens per GM reply. Lower = less output cost. Easily configurable via Debug Panel → API / Usage. */
            MAX_TOKENS: 1200,
            /** Conversation turns sent with each request. Lower = less input cost. Easily configurable via Debug Panel → API / Usage. */
            MAX_HISTORY_TURNS: 10
        };
        // Stage 1e: expose to extracted modules.
        window.CONFIG = CONFIG;

        /** Condition id (lowercase) -> Font Awesome icon classes. Add/change icons here for each condition from rules.combat.conditions. */
        const CONDITION_ICONS = {
            poisoned: 'fa-sharp-duotone fa-light fa-flask-round-poison',
            blessed: 'fa-sharp-duotone fa-light fa-sparkles',
            stunned: 'fa-sharp-duotone fa-light fa-ban',
            wounded: 'fa-sharp-duotone fa-light fa-bandage',
            exhausted: 'fa-sharp-duotone fa-light fa-face-weary'
        };
        const CONDITION_ICON_DEFAULT = 'fa-sharp-duotone fa-light fa-circle-question';
        // Stage 1e-v: expose to ui-character.js
        window.CONDITION_ICONS = CONDITION_ICONS;
        window.CONDITION_ICON_DEFAULT = CONDITION_ICON_DEFAULT;

        // ============================================
        // GAME DATA & STATE
        // ============================================


        const gameData = {
            character: null,
            setting: null,
            rules: null,
            bestiary: null,
            module: null
        };
        // Stage 1e: expose to extracted modules. Same object, two access paths
        // (lexical `gameData` for inline code, `window.gameData` for scripts/*.js).
        window.gameData = gameData;

        const gameState = {
            character: null,
            currentRoom: null,
            triggeredEvents: [],
            conversationHistory: [],
            waitingForRoll: false,
            pendingRollContext: null,
            /** Damage dealt to each encounter by id (e.g. goblin_guard: 5). Used to show current monster HP. */
            damageToEncounters: {},
            /** True when combat has started (either side attacked). Cleared when all nearby enemies defeated, player dies, or player retreats. */
            inCombat: false,
            /** Current pillar: 'exploration' | 'combat' | 'travel'. Exactly one active; drives mode-specific prompt. */
            mode: 'exploration',
            /** Items put in use during play (e.g. Torch (lit) when player lights one from pack). Shown in Equipped. */
            equippedInUse: [],
            /** Set when we parse torch use from player message; skip GM parse for same turn to avoid double-count. */
            torchUseParsedThisTurn: false,
            /** After a d20 roll: natural value (1-20) and whether it was an attack roll (for crit damage / auto-miss). */
            lastD20Natural: null,
            lastRollWasAttack: false,
            /** When combat ends, store currentRoom here so monster panel can linger until player takes another action. Cleared in submitAction(). */
            lastCombatRoom: null,
            /** Encounter panel history (newest encountered first). Entries persist and update status (active/defeated). */
            encounterHistory: [],
            /** Command history for Up/Down navigation (newest first; max 50). */
            commandHistory: [],
            commandHistoryIndex: -1,
            commandHistoryDraft: '',
            /** True when character has died; death overlay shown, input disabled until choice. */
            isDead: false,
            /** True when the last user message was a dice roll submit; skip parsing monster damage from GM narrative to avoid double-count. */
            lastUserMessageWasDiceRoll: false,
            /** Last roll type: 'resolved' (attack auto-resolved by rules engine) | 'ability' | null (free-form). Drives the current-step hint in the combat prompt. */
            lastUserRollType: null,
            /** Stage 5: runtime feature state. Deltas from authored initial state, keyed by feature id. */
            featureState: {},
            /** Stage 5: runtime connection overrides. Keyed by connection key; { state, revealed? }. */
            connectionsModified: {},
            /** Stage 5: ordered list of room ids visited this game. Drives visited-flag rendering in the prompt + UI. */
            visitedRooms: [],
            /** Stage 7: completion-condition state. `conditions_met` is a list of descriptor objects per the v1 save spec. */
            completion: { completed: false, conditions_met: [] },
            /** Stage 7: wall-clock timestamp when the current game run started. Preserved across loadGame. */
            sessionStartedAt: null,
        };
        // Stage 1e: expose to extracted modules.
        window.gameState = gameState;

        // ============================================
        // TEST UTILITIES
        // ============================================
        
        const TestUtils = {
            modifyHP(amount) {
                modifyHP(amount);
                addSystemMessage(`[DEBUG] HP adjusted by ${amount}`);
            },
            
            fullHeal() {
                gameState.character.hp = gameState.character.maxHp;
                updateCharacterDisplay();
                addSystemMessage('[DEBUG] Fully healed');
            },
            
            addXP(amount) {
                addXP(amount);
            },
            
            addPotion() {
                addToInventory('Healing Potion', 1);
                addSystemMessage('[DEBUG] Added healing potion');
            },
            
            addGold(amount) {
                addToInventory('Gold', amount);
                addSystemMessage(`[DEBUG] Added ${amount} gold`);
            },
            
            teleportToRoom(roomId) {
                if (gameData.module.rooms[roomId]) {
                    const prev = gameState.currentRoom;
                    gameState.currentRoom = roomId;
                    const room = gameData.module.rooms[roomId];
                    addSystemMessage(`[DEBUG] Teleported to ${room.name}`);
                    addNarration(room.description);
                    // Stage 5: single coordination point — marks visited,
                    // renders feature cards + connections strip, fires
                    // on_enter hazards. Matches the production room-change
                    // hook in scripts/response-parser.js.
                    if (prev !== roomId && typeof onRoomEntry === 'function') {
                        setTimeout(() => {
                            onRoomEntry(roomId);
                        }, 0);
                    }
                    if (typeof updateCharacterDisplay === 'function') updateCharacterDisplay();
                    if (typeof saveGame === 'function') saveGame();
                } else {
                    addSystemMessage(`[DEBUG] Room ${roomId} not found`);
                }
            },
            
            logState() {
                console.table({
                    HP: `${gameState.character.hp}/${gameState.character.maxHp}`,
                    XP: gameState.character.xp,
                    Room: gameState.currentRoom,
                    Gold: gameState.character.inventory.find(i => i.name.includes('Gold'))?.quantity || '0gp'
                });
                console.log('Full state:', gameState);
            },

            addCondition(id) {
                if (typeof addCondition === 'function') {
                    addCondition(id);
                    addSystemMessage(`[DEBUG] Condition added: ${id}`);
                }
            },

            removeCondition(id) {
                if (typeof removeCondition === 'function') {
                    removeCondition(id);
                    addSystemMessage(`[DEBUG] Condition removed: ${id}`);
                }
            },

            // Direct dice-section invocation for testing Stage 4 adv/disadv
            // without depending on the GM to emit the suffix. Example:
            //   test.rollRequest('Perception, advantage')
            //   test.rollRequest('Athletics, disadvantage')
            //   test.rollRequest('CON save')
            //   test.rollRequest('Dexterity')            // roll-under packs
            rollRequest(label) {
                if (typeof showDiceSection === 'function') {
                    addSystemMessage(`[DEBUG] Forced [ROLL_REQUEST: ${label}]`);
                    showDiceSection(`Roll ${label}:`, label);
                }
            },
            
            clearHistory() {
                gameState.conversationHistory = [];
                addSystemMessage('[DEBUG] Conversation history cleared');
            },

            // --- Stage 5 feature / connection helpers ---
            //
            // Skip the narrative path and write engine-level state directly.
            // Each helper calls RulesEngine.applyEffect, then re-renders
            // feature cards + connections strip so the UI reflects the change
            // immediately. Use for smoke-testing without typing through GM
            // narration (e.g. force the Oathblade rack open, reveal a hidden
            // door, solve the puzzle to see on_success fire).

            activateFeature(featureId, state) {
                if (!window.RulesEngine || !window.GameState) return;
                const ms = window.GameState.buildModuleState();
                const result = window.RulesEngine.applyEffect(
                    { type: 'activate_feature', target: featureId, state: state || 'unlocked' },
                    ms,
                    gameData
                );
                addSystemMessage(`[DEBUG] activateFeature(${featureId}, ${state || 'unlocked'}) → ${JSON.stringify(result)}`);
                if (typeof saveGame === 'function') saveGame();
                if (window.UI && window.UI.features && window.UI.features.renderForRoom) window.UI.features.renderForRoom(gameState.currentRoom);
                if (window.UI && window.UI.connections && window.UI.connections.renderForRoom) window.UI.connections.renderForRoom(gameState.currentRoom);
            },

            unlockConnection(key) {
                if (!window.RulesEngine || !window.GameState) return;
                const ms = window.GameState.buildModuleState();
                const result = window.RulesEngine.applyEffect(
                    { type: 'unlock_connection', target: key },
                    ms,
                    gameData
                );
                addSystemMessage(`[DEBUG] unlockConnection(${key}) → ${JSON.stringify(result)}`);
                if (typeof saveGame === 'function') saveGame();
                if (window.UI && window.UI.connections && window.UI.connections.renderForRoom) window.UI.connections.renderForRoom(gameState.currentRoom);
            },

            revealConnection(key) {
                if (!window.RulesEngine || !window.GameState) return;
                const ms = window.GameState.buildModuleState();
                const result = window.RulesEngine.applyEffect(
                    { type: 'reveal_connection', target: key },
                    ms,
                    gameData
                );
                addSystemMessage(`[DEBUG] revealConnection(${key}) → ${JSON.stringify(result)}`);
                if (typeof saveGame === 'function') saveGame();
                if (window.UI && window.UI.connections && window.UI.connections.renderForRoom) window.UI.connections.renderForRoom(gameState.currentRoom);
            },

            // Force a puzzle solve — fires on_success effects + reward via markSolved.
            // Use when you want to exercise the reward / effect pipeline without
            // typing the narrative answer (e.g. test.solveFeature('hidden_word_riddle')
            // for the Gauntlet regression).
            solveFeature(featureId) {
                if (window.UI && window.UI.features && window.UI.features.markSolved) {
                    const ok = window.UI.features.markSolved(featureId, { narrateFromAuthored: true });
                    addSystemMessage(`[DEBUG] solveFeature(${featureId}) → ${ok ? 'applied' : 'no-op (not found or already solved)'}`);
                } else {
                    addSystemMessage(`[DEBUG] solveFeature: UI.features.markSolved not available`);
                }
            },

            // Stage 7: print the current save envelope to the console for
            // spec-checking without round-tripping through localStorage.
            // Returns the object as well, so `const s = test.dumpSave()` works.
            dumpSave() {
                if (!window.GameState || !window.GameState.getStateToSave) {
                    addSystemMessage('[DEBUG] dumpSave: GameState.getStateToSave not available');
                    return null;
                }
                const payload = window.GameState.getStateToSave();
                console.log('[DEBUG] Save envelope:', payload);
                const schema = payload && payload.schema_version;
                const pack   = payload && payload.game_pack_id;
                const module_ = payload && payload.module_id;
                addSystemMessage(`[DEBUG] dumpSave: schema=${schema} pack=${pack} module=${module_} (full blob in console)`);
                return payload;
            },

            // Stage 7: dump the raw save blob out of localStorage (what's
            // actually on disk, post-write). Pairs with dumpSave() to check
            // that what's serialized matches what's persisted.
            dumpSavedBlob() {
                const manifest = window.gameData && window.gameData._v1 && window.gameData._v1.manifest;
                const packId = manifest && manifest.id;
                if (!packId) { addSystemMessage('[DEBUG] dumpSavedBlob: no pack id'); return null; }
                const key = 'gm-ai-dungeon-save:' + packId.replace(/[^a-z0-9_-]/gi, '_');
                const raw = localStorage.getItem(key);
                if (!raw) { addSystemMessage(`[DEBUG] dumpSavedBlob: no save at key ${key}`); return null; }
                const parsed = JSON.parse(raw);
                console.log('[DEBUG] Saved blob @', key, parsed);
                addSystemMessage(`[DEBUG] dumpSavedBlob: key=${key} bytes=${raw.length} (full blob in console)`);
                return parsed;
            },

            // Stage 7: force a save NOW even if isDead. Useful for testing
            // the death-save-then-load flow (the death path calls saveGame
            // just before flipping isDead; forceSave lets us sidestep that
            // ordering if we're poking at edge cases).
            forceSave() {
                if (!window.GameState || !window.GameState.getStateToSave) return;
                const payload = window.GameState.getStateToSave();
                const packId = (payload && payload.game_pack_id) || 'default';
                const key = 'gm-ai-dungeon-save:' + packId.replace(/[^a-z0-9_-]/gi, '_');
                localStorage.setItem(key, JSON.stringify(payload));
                addSystemMessage(`[DEBUG] forceSave: wrote ${key}`);
            },

            // Stage 7: stamp a bogus schema_version onto the current save
            // slot so we can verify the "old save format" drop-and-message
            // path on next load. Doesn't touch gameplay state.
            corruptSave() {
                const manifest = window.gameData && window.gameData._v1 && window.gameData._v1.manifest;
                const packId = manifest && manifest.id;
                if (!packId) { addSystemMessage('[DEBUG] corruptSave: no pack id'); return; }
                const key = 'gm-ai-dungeon-save:' + packId.replace(/[^a-z0-9_-]/gi, '_');
                const raw = localStorage.getItem(key);
                if (!raw) { addSystemMessage(`[DEBUG] corruptSave: no save at ${key}`); return; }
                const data = JSON.parse(raw);
                data.schema_version = 0;
                localStorage.setItem(key, JSON.stringify(data));
                addSystemMessage(`[DEBUG] corruptSave: stamped schema_version=0 on ${key}. Reload + click Continue to verify drop.`);
            },

            // Stage 7: force the completion summary overlay without
            // playing through the module. Uses the module's actual
            // completion_condition when present so the summary-card
            // subtitle matches what a real win would show; falls back
            // to a synthetic { kind: 'forced' } plan for null-condition
            // packs (Gauntlet) so you can still preview the card.
            fireCompletion() {
                if (!window.RulesEngine || !window.GameState) {
                    addSystemMessage('[DEBUG] fireCompletion: engine not ready');
                    return;
                }
                const mod = window.gameData && window.gameData._v1 && window.gameData._v1.module;
                const cc = mod && mod.completion_condition;
                const plan = cc
                    ? { completed: true, kind: cc.type, target: cc.target || null }
                    : { completed: true, kind: 'forced' };
                gameState.completion = { completed: true, conditions_met: [plan] };
                const summary = window.GameState.buildCompletionSummary(plan);
                addSystemMessage(`[DEBUG] fireCompletion: kind=${plan.kind}${plan.target ? ' target='+plan.target : ''}`);
                if (window.UI && window.UI.narrative && window.UI.narrative.showCompletionOverlay) {
                    window.UI.narrative.showCompletionOverlay(summary);
                } else {
                    addSystemMessage('[DEBUG] fireCompletion: UI.narrative.showCompletionOverlay missing');
                }
            },

            // Stage 7: evaluate the module's completion_condition NOW
            // against live state without firing the overlay. Returns the
            // plan object so you can see whether the win-condition is
            // tracking (e.g. during a Havel fight — does the engine see
            // his encounter as resolved yet?).
            checkCompletion() {
                if (!window.RulesEngine || !window.GameState) return null;
                const mod = window.gameData && window.gameData._v1 && window.gameData._v1.module;
                const ms  = window.GameState.buildModuleState();
                const plan = window.RulesEngine.evaluateCompletion(mod, ms);
                console.log('[DEBUG] evaluateCompletion:', plan, 'moduleState encounters:', ms.encounters);
                addSystemMessage(`[DEBUG] checkCompletion: completed=${plan.completed} kind=${plan.kind}${plan.target ? ' target='+plan.target : ''} (full plan in console)`);
                return plan;
            },

            // Stage 7: force HP to 0 to exercise the death-overlay path
            // under the Stage 7 save rewrite. On Three Knots (at_zero:
            // "dead") the death overlay fires immediately; on L&B /
            // Gauntlet (at_zero: "unconscious") the Stage 7 path is the
            // same save-then-flip sequence but the GM typically narrates
            // unconsciousness — check that the save blob carried
            // schema_version:1 either way.
            //
            // In normal play the overlay is rendered by the response
            // parser after the GM narrates the killing blow. Here we
            // bypass the GM round-trip, so call showDeathOverlay
            // directly after modifyHP flips isDead.
            killCharacter() {
                if (!window.modifyHP || !gameState.character) {
                    addSystemMessage('[DEBUG] killCharacter: state not ready');
                    return;
                }
                const hp = gameState.character.hp || 0;
                addSystemMessage(`[DEBUG] killCharacter: HP ${hp} → 0`);
                window.modifyHP(-hp - 1);
                if (gameState.isDead && window.showDeathOverlay) {
                    window.showDeathOverlay('');
                }
            },

            // Stage 7: mark every authored encounter resolved in one
            // shot. Useful for Gauntlet regression ("null completion_
            // condition must never fire") and for quickly reaching the
            // all_encounters_defeated path on packs that use it.
            // Mutates damageToEncounters so the engine sees the kills;
            // does NOT fire the on_defeat_effects (those belong to the
            // GM-narrated path).
            defeatAllEncounters() {
                const rooms = window.gameData && window.gameData.module && window.gameData.module.rooms;
                if (!rooms) return;
                const { getEncounterHP } = window.UI && window.UI.encounters || {};
                const hpLookup = getEncounterHP || window.getEncounterHP;
                let n = 0;
                for (const room of Object.values(rooms)) {
                    for (const enc of (room.encounters || [])) {
                        if (!enc || !enc.id) continue;
                        const hp = hpLookup ? hpLookup(enc) : { max: 9999 };
                        gameState.damageToEncounters[enc.id] = (hp && hp.max) || 9999;
                        n++;
                    }
                }
                addSystemMessage(`[DEBUG] defeatAllEncounters: marked ${n} encounter(s) resolved`);
                if (window.checkCompletion) window.checkCompletion();
                if (typeof updateCharacterDisplay === 'function') updateCharacterDisplay();
                if (window.updateMonsterPanel) window.updateMonsterPanel();
                if (typeof saveGame === 'function') saveGame();
            },

            // Stage 7: helper for defeat_encounter conditions — mark
            // exactly the target encounter resolved. On Crow's Hollow
            // that's warden_lieutenants_last_stand; on Three Knots it's
            // the tomb guardian. Shortcut for `test.defeatEncounter('id')`
            // without walking the pack down to the room and fighting.
            defeatEncounter(encounterId) {
                const rooms = window.gameData && window.gameData.module && window.gameData.module.rooms;
                if (!rooms) return;
                const hpLookup = window.getEncounterHP;
                for (const room of Object.values(rooms)) {
                    for (const enc of (room.encounters || [])) {
                        if (!enc || enc.id !== encounterId) continue;
                        const hp = hpLookup ? hpLookup(enc) : { max: 9999 };
                        gameState.damageToEncounters[enc.id] = (hp && hp.max) || 9999;
                        addSystemMessage(`[DEBUG] defeatEncounter: ${encounterId} (marked resolved)`);
                        if (window.checkCompletion) window.checkCompletion();
                        if (typeof saveGame === 'function') saveGame();
                        return;
                    }
                }
                addSystemMessage(`[DEBUG] defeatEncounter: ${encounterId} not found in any room`);
            }
        };
        
        // Expose to console
        window.test = TestUtils;

        // ============================================
        // DEBUG PANEL TOGGLE
        // ============================================
        
        // Debug panel toggle disabled for Phase 2 (panel removed from layout)
        // document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.shiftKey && e.key === 'D') { ... } });

        // ============================================
        // START GAME
        // ============================================
        
        window.addEventListener('load', async () => {
            console.log('[INIT] Page loaded, loading templates...');
            const templatesLoaded = await loadAllTemplates();
            if (!templatesLoaded) {
                console.error('[INIT] Template loading failed, cannot start game');
                return;
            }
            console.log('[INIT] Templates loaded, fetching server config');
            try {
                const configRes = await fetch('/api/config');
                if (configRes.ok) {
                    const config = await configRes.json();
                    if (config.model) CONFIG.MODEL = config.model;
                }
            } catch (e) {
                console.warn('[INIT] Could not fetch /api/config, using default MODEL');
            }
            console.log('[INIT] Initializing game');
            debugLog('INIT', 'Page loaded, initializing game');
            initializeGame();
        });
    </script>
</body>
</html>
