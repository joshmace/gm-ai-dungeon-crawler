<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dungeon Crawler - v2 Testing Build</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://kit.fontawesome.com/f4b50dbafe.js" crossorigin="anonymous"></script>
</head>
<body>
    <!-- Template placeholders - populated by template loader -->
    <div id="template-loading-overlay"></div>
    <div id="template-debug-panel"></div>
    <div class="app-container" id="app-container"></div>

    <script>
        // ============================================
        // TEMPLATE LOADER
        // ============================================
        
        const TEMPLATES = {
            'loading-overlay': './templates/loading-overlay.html',
            'debug-panel': './templates/debug-panel.html',
            'character-panel': './templates/character-panel.html',
            'narrative-panel': './templates/narrative-panel.html',
            'encounter-panel': './templates/encounter-panel.html'
        };

        async function loadTemplate(name) {
            const response = await fetch(TEMPLATES[name]);
            if (!response.ok) throw new Error(`Failed to load template: ${name}`);
            return await response.text();
        }

        async function loadAllTemplates() {
            try {
                const [loadingOverlay, debugPanel, characterPanel, narrativePanel, encounterPanel] = await Promise.all([
                    loadTemplate('loading-overlay'),
                    loadTemplate('debug-panel'),
                    loadTemplate('character-panel'),
                    loadTemplate('narrative-panel'),
                    loadTemplate('encounter-panel')
                ]);

                document.getElementById('template-loading-overlay').outerHTML = loadingOverlay;
                document.getElementById('template-debug-panel').outerHTML = debugPanel;
                
                const appContainer = document.getElementById('app-container');
                appContainer.innerHTML = characterPanel + narrativePanel + encounterPanel;

                return true;
            } catch (error) {
                console.error('Template loading failed:', error);
                document.body.innerHTML = `
                    <div style="color: #e8dcc4; background: #1a1410; padding: 40px; text-align: center; min-height: 100vh;">
                        <h2 style="color: #c85050;">Template Loading Error</h2>
                        <p style="margin-top: 20px;">Failed to load UI templates. Please ensure template files exist in ./templates/</p>
                        <p style="margin-top: 10px; color: #8a7a6a;">${error.message}</p>
                    </div>
                `;
                return false;
            }
        }
    </script>

    <script>
        // ============================================
        // CONFIGURATION & DEBUG
        // ============================================
        
        const CONFIG = {
            DEBUG_MODE: true,
            /** Swappable data: character, module (adventure), monsters, rules. Changing these changes the game. Schemas must match (see character/module/monster/rules JSON structure). */
            DATA_FILES: {
                character: './character_aldric.json',
                module: './test_module_rules.json',
                monsters: './monster_manual.json',
                rules: './rules.json'
            },
            API_ENDPOINT: '/api/messages',
            MODEL: 'claude-sonnet-4-20250514',
            /** Max tokens per GM reply. Lower = less output cost. Easily configurable via Debug Panel → API / Usage. */
            MAX_TOKENS: 1200,
            /** Conversation turns sent with each request. Lower = less input cost. Easily configurable via Debug Panel → API / Usage. */
            MAX_HISTORY_TURNS: 10
        };

        /** Condition id (lowercase) -> Font Awesome icon classes. Add/change icons here for each condition from rules.combat.conditions. */
        const CONDITION_ICONS = {
            poisoned: 'fa-sharp-duotone fa-light fa-flask-round-poison',
            blessed: 'fa-sharp-duotone fa-light fa-sparkles',
            stunned: 'fa-sharp-duotone fa-light fa-ban',
            wounded: 'fa-sharp-duotone fa-light fa-bandage',
            exhausted: 'fa-sharp-duotone fa-light fa-face-weary'
        };
        const CONDITION_ICON_DEFAULT = 'fa-sharp-duotone fa-light fa-circle-question';

        /** Sync Debug Panel API/Usage inputs with CONFIG and update CONFIG when user changes them. */
        function initApiUsageConfig() {
            const maxTokensEl = document.getElementById('configMaxTokens');
            const historyTurnsEl = document.getElementById('configHistoryTurns');
            if (!maxTokensEl || !historyTurnsEl) return;
            maxTokensEl.value = CONFIG.MAX_TOKENS;
            historyTurnsEl.value = CONFIG.MAX_HISTORY_TURNS;
            function applyMaxTokens() {
                const v = parseInt(maxTokensEl.value, 10);
                if (!isNaN(v)) {
                    CONFIG.MAX_TOKENS = Math.max(500, Math.min(8000, v));
                    maxTokensEl.value = CONFIG.MAX_TOKENS;
                }
            }
            function applyHistoryTurns() {
                const v = parseInt(historyTurnsEl.value, 10);
                if (!isNaN(v)) {
                    CONFIG.MAX_HISTORY_TURNS = Math.max(2, Math.min(50, v));
                    historyTurnsEl.value = CONFIG.MAX_HISTORY_TURNS;
                }
            }
            maxTokensEl.addEventListener('change', applyMaxTokens);
            maxTokensEl.addEventListener('blur', applyMaxTokens);
            historyTurnsEl.addEventListener('change', applyHistoryTurns);
            historyTurnsEl.addEventListener('blur', applyHistoryTurns);
        }

        // Debug logging function
        function debugLog(category, message, data = null) {
            if (!CONFIG.DEBUG_MODE) return;
            
            const timestamp = new Date().toLocaleTimeString();
            const prefix = `[${timestamp}] [${category}]`;
            
            console.log(prefix, message, data || '');
            
            // Update debug panel parse log if it's a parse event
            if (category === 'PARSE') {
                const logDiv = document.getElementById('debugParseLog');
                if (logDiv) {
                    const entry = document.createElement('div');
                    entry.textContent = `${timestamp} ${message}`;
                    entry.style.marginBottom = '2px';
                    logDiv.insertBefore(entry, logDiv.firstChild);
                    
                    // Keep only last 20 entries
                    while (logDiv.children.length > 20) {
                        logDiv.removeChild(logDiv.lastChild);
                    }
                }
            }
        }

        // ============================================
        // GAME DATA & STATE
        // ============================================
        
        const gameData = {
            character: null,
            module: null,
            monsters: null,
            rules: null
        };

        // XP progression table (fallback when rules.json has no experience.level_progression)
        const XP_LEVELS_DEFAULT = {
            1: 0, 2: 2000, 3: 4000, 4: 8000, 5: 16000,
            6: 32000, 7: 64000, 8: 128000, 9: 256000, 10: 512000
        };

        /** Level thresholds from rules.experience.level_progression when present, else default. Used for XP bar and level-up. */
        function getXPLevels() {
            const prog = gameData.rules && gameData.rules.experience && gameData.rules.experience.level_progression;
            if (prog && typeof prog === 'object' && Object.keys(prog).length > 0) {
                const out = {};
                for (const [k, v] of Object.entries(prog)) {
                    const level = parseInt(k, 10);
                    if (!isNaN(level) && typeof v === 'number') out[level] = v;
                }
                if (Object.keys(out).length > 0) return out;
            }
            return XP_LEVELS_DEFAULT;
        }
        
        const gameState = {
            character: null,
            currentRoom: null,
            triggeredEvents: [],
            conversationHistory: [],
            waitingForRoll: false,
            pendingRollContext: null,
            /** Damage dealt to each encounter by id (e.g. goblin_guard: 5). Used to show current monster HP. */
            damageToEncounters: {},
            /** True when combat has started (either side attacked). Cleared when all nearby enemies defeated, player dies, or player retreats. */
            inCombat: false,
            /** Items put in use during play (e.g. Torch (lit) when player lights one from pack). Shown in Equipped. */
            equippedInUse: [],
            /** Set when we parse torch use from player message; skip GM parse for same turn to avoid double-count. */
            torchUseParsedThisTurn: false,
            /** After a d20 roll: natural value (1-20) and whether it was an attack roll (for crit damage / auto-miss). */
            lastD20Natural: null,
            lastRollWasAttack: false,
            /** When combat ends, store currentRoom here so monster panel can linger until player takes another action. Cleared in submitAction(). */
            lastCombatRoom: null,
            /** Encounter panel history (newest encountered first). Entries persist and update status (active/defeated). */
            encounterHistory: [],
            /** Command history for Up/Down navigation (newest first; max 50). */
            commandHistory: [],
            commandHistoryIndex: -1,
            commandHistoryDraft: '',
        };

        // ============================================
        // DATA LOADING
        // ============================================
        
        async function loadGameData() {
            try {
                updateLoadingStatus('Loading character data...');
                const charResponse = await fetch(CONFIG.DATA_FILES.character);
                if (!charResponse.ok) throw new Error('Failed to load character');
                const charData = await charResponse.json();
                gameData.character = charData.character;
                
                updateLoadingStatus('Loading module...');
                const modResponse = await fetch(CONFIG.DATA_FILES.module);
                if (!modResponse.ok) throw new Error('Failed to load module');
                const modData = await modResponse.json();
                // Store the full module data (includes module metadata AND rooms)
                gameData.module = modData;
                
                updateLoadingStatus('Loading monster manual...');
                const monsResponse = await fetch(CONFIG.DATA_FILES.monsters);
                if (!monsResponse.ok) throw new Error('Failed to load monsters');
                const monsData = await monsResponse.json();
                gameData.monsters = monsData.monster_manual.monsters;
                
                updateLoadingStatus('Loading rules...');
                try {
                    const rulesResponse = await fetch(CONFIG.DATA_FILES.rules);
                    if (rulesResponse.ok) {
                        const rulesData = await rulesResponse.json();
                        gameData.rules = rulesData.rules;
                    } else {
                        gameData.rules = null;
                        debugLog('DATA', 'Rules file missing or failed; using fallback prompt text');
                    }
                } catch (e) {
                    gameData.rules = null;
                    debugLog('DATA', 'Rules load error (optional):', e.message);
                }
                
                debugLog('DATA', 'All game data loaded successfully');
                return true;
                
            } catch (error) {
                console.error('Failed to load game data:', error);
                updateLoadingStatus(`ERROR: ${error.message}`);
                return false;
            }
        }

        function updateLoadingStatus(message) {
            const statusEl = document.getElementById('loadingStatus');
            if (statusEl) statusEl.textContent = message;
        }

        // ============================================
        // MONSTER RESOLUTION
        // ============================================
        
        function resolveMonster(monsterId) {
            if (!gameData.monsters || !gameData.monsters[monsterId]) {
                debugLog('MONSTER', `WARNING: Monster ${monsterId} not found in manual`);
                return null;
            }
            return gameData.monsters[monsterId];
        }

        /** First active (non-defeated) encounter in current room, or null. */
        function getFirstActiveEncounterInCurrentRoom() {
            const room = gameData.module && gameData.module.rooms && gameData.module.rooms[gameState.currentRoom];
            if (!room || !room.encounters || room.encounters.length === 0) return null;
            for (const enc of room.encounters) {
                if (!getEncounterHP(enc).defeated) return enc;
            }
            return null;
        }

        /** Damage formula (e.g. "1d6+2") for the first attack of the first active encounter in current room. Used for [MONSTER_DAMAGE] roll. */
        function getMonsterDamageFormulaForCurrentRoom() {
            const enc = getFirstActiveEncounterInCurrentRoom();
            if (!enc) return null;
            const monster = resolveMonster(enc.monster_ref);
            if (!monster || !monster.attacks || monster.attacks.length === 0) return null;
            const a = monster.attacks[0];
            return (a.damage || '').trim() || null;
        }

        /** Fallback: get monster damage formula from any room with an active encounter (in case currentRoom is wrong). */
        function getMonsterDamageFormulaFromAnyRoom() {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return null;
            for (const room of Object.values(rooms)) {
                if (!room || !room.encounters || room.encounters.length === 0) continue;
                for (const enc of room.encounters) {
                    if (getEncounterHP(enc).defeated) continue;
                    const monster = resolveMonster(enc.monster_ref);
                    if (!monster || !monster.attacks || monster.attacks.length === 0) continue;
                    const d = (monster.attacks[0].damage || '').trim();
                    if (d) return d;
                }
            }
            return null;
        }

        /** Roll a dice formula string (e.g. "1d6+2", "2d6+3") and return { total, breakdown }. */
        function rollDiceFormula(formula) {
            if (!formula || typeof formula !== 'string') return { total: 0, breakdown: '' };
            const m = formula.trim().match(/^(\d+)d(\d+)\s*([+-])?\s*(\d+)?$/i);
            if (!m) return { total: 0, breakdown: formula };
            const count = parseInt(m[1], 10);
            const sides = parseInt(m[2], 10);
            const sign = m[3] === '-' ? -1 : 1;
            const mod = m[4] ? sign * parseInt(m[4], 10) : 0;
            let sum = 0;
            const rolls = [];
            for (let i = 0; i < count; i++) {
                const r = Math.floor(Math.random() * sides) + 1;
                rolls.push(r);
                sum += r;
            }
            const total = sum + mod;
            const modStr = mod !== 0 ? (mod >= 0 ? ` + ${mod}` : ` - ${Math.abs(mod)}`) : '';
            const breakdown = `${formula} (${rolls.join(' + ')}${modStr}) = ${total}`;
            return { total, breakdown };
        }

        /** Current HP for an encounter (tracked damage vs monster max HP). */
        function getEncounterHP(encounter) {
            const monster = resolveMonster(encounter.monster_ref);
            if (!monster) return { current: 0, max: 0, defeated: true };
            const maxHP = (encounter.hp != null && encounter.hp > 0) ? Number(encounter.hp) : (monster.hp != null ? monster.hp : 0);
            const damage = gameState.damageToEncounters[encounter.id] || 0;
            const current = Math.max(0, maxHP - damage);
            return { current, max: maxHP, defeated: current <= 0 };
        }

        /** Best combat fallback room: prefer non-defeated encounters, else any room with encounters. */
        function getFirstRoomIdWithEncounters() {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return null;
            const ids = Object.keys(rooms).sort();
            for (const id of ids) {
                const r = rooms[id];
                if (!r || !r.encounters || r.encounters.length === 0) continue;
                if (r.encounters.some(enc => !getEncounterHP(enc).defeated)) return id;
            }
            for (const id of ids) {
                const r = rooms[id];
                if (r && r.encounters && r.encounters.length > 0) return id;
            }
            return null;
        }

        /** When combat is starting, ensure currentRoom has encounters so the monster panel populates. Call after setting inCombat = true. */
        function ensureCombatRoomHasEncounters() {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return;
            const cur = rooms[gameState.currentRoom];
            const curHasActiveEncounters = cur && cur.encounters && cur.encounters.some(enc => !getEncounterHP(enc).defeated);
            if (curHasActiveEncounters) return;
            const fallback = getFirstRoomIdWithEncounters();
            if (fallback) {
                gameState.currentRoom = fallback;
                debugLog('PARSE', `Combat started but current room had no active encounters; set currentRoom to ${fallback} for monster panel`);
            }
        }

        /** Stable key for encounter-history entries. */
        function getEncounterHistoryKey(roomId, encounter) {
            return `${roomId || 'unknown'}::${encounter && encounter.id ? encounter.id : 'unknown'}`;
        }

        /** Add/update encounters for a room into panel history (new encounters appear at top). */
        function recordEncounterHistoryForRoom(roomId) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms || !roomId) return;
            const room = rooms[roomId];
            if (!room || !room.encounters || room.encounters.length === 0) return;
            for (const enc of room.encounters) {
                const key = getEncounterHistoryKey(roomId, enc);
                const monster = resolveMonster(enc.monster_ref);
                const hpInfo = getEncounterHP(enc);
                const ac = monster && (monster.ac != null ? monster.ac : (monster.AC != null ? monster.AC : '—'));
                const attacks = monster && Array.isArray(monster.attacks)
                    ? monster.attacks.map(a => ({
                        name: a.name,
                        bonus: a.bonus,
                        damage: a.damage,
                        damage_type: a.damage_type,
                        range: a.range
                    }))
                    : [];
                const idx = gameState.encounterHistory.findIndex(e => e.key === key);
                const base = {
                    key,
                    roomId,
                    roomName: room.name || roomId,
                    encounterId: enc.id,
                    displayName: enc.name || (monster && monster.name) || enc.monster_ref || 'Unknown',
                    monsterRef: enc.monster_ref || null,
                    acSnapshot: ac != null ? ac : '—',
                    attacksSnapshot: attacks
                };
                if (idx === -1) {
                    gameState.encounterHistory.unshift({
                        ...base,
                        lastKnownCurrentHp: hpInfo.current,
                        lastKnownMaxHp: hpInfo.max,
                        defeated: hpInfo.defeated
                    });
                } else {
                    gameState.encounterHistory[idx] = {
                        ...gameState.encounterHistory[idx],
                        ...base,
                        lastKnownCurrentHp: hpInfo.current,
                        lastKnownMaxHp: hpInfo.max,
                        defeated: hpInfo.defeated
                    };
                }
            }
        }

        /** Populate the right-side monster panel from persistent encounter history (newest first). */
        function updateMonsterPanel() {
            const container = document.getElementById('monsterStatsPanel');
            if (!container) return;
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) {
                container.className = 'monster-panel-empty';
                container.innerHTML = 'No monsters in this room.';
                return;
            }
            let roomIdToShow = gameState.currentRoom;
            if (gameState.inCombat) {
                roomIdToShow = gameState.currentRoom;
            } else if (gameState.lastCombatRoom != null && gameState.lastCombatRoom !== '') {
                roomIdToShow = gameState.lastCombatRoom;
            }
            // Keep history up to date from the currently relevant encounter room.
            recordEncounterHistoryForRoom(roomIdToShow);

            if (!gameState.encounterHistory || gameState.encounterHistory.length === 0) {
                container.className = 'monster-panel-empty';
                container.innerHTML = 'No monsters encountered yet.';
                return;
            }
            let html = '';
            for (const hist of gameState.encounterHistory) {
                const room = rooms[hist.roomId];
                const enc = room && room.encounters ? room.encounters.find(e => e.id === hist.encounterId) : null;
                const monsterRef = (enc && enc.monster_ref) || hist.monsterRef;
                const monster = monsterRef ? resolveMonster(monsterRef) : null;
                const hpInfo = enc ? getEncounterHP(enc) : {
                    current: hist.lastKnownCurrentHp != null ? hist.lastKnownCurrentHp : 0,
                    max: hist.lastKnownMaxHp != null ? hist.lastKnownMaxHp : 0,
                    defeated: !!hist.defeated
                };
                if (!monster) {
                    const status = hpInfo.defeated ? 'Defeated' : 'Active';
                    html += `<div class="monster-stat-block${hpInfo.defeated ? ' defeated' : ''}"><div class="monster-stat-name">${hist.displayName}</div><div class="monster-stat-line">Status: ${status}</div><div class="monster-stat-line">Unknown monster: ${monsterRef || '—'}</div></div>`;
                    continue;
                }
                const ac = monster.ac != null ? monster.ac : (monster.AC != null ? monster.AC : (hist.acSnapshot != null ? hist.acSnapshot : '—'));
                const defeatedClass = hpInfo.defeated ? ' defeated' : '';
                html += `<div class="monster-stat-block${defeatedClass}">`;
                html += `<div class="monster-stat-name">${hist.displayName}</div>`;
                html += `<div class="monster-stat-line">Status: ${hpInfo.defeated ? 'Defeated' : 'Active'}</div>`;
                if (hist.roomName) html += `<div class="monster-stat-line">Room: ${hist.roomName}</div>`;
                html += `<div class="monster-stat-line">AC ${ac}</div>`;
                html += `<div class="monster-stat-line">HP ${hpInfo.current}/${hpInfo.max}</div>`;
                const attacks = (monster.attacks && monster.attacks.length > 0) ? monster.attacks : (hist.attacksSnapshot || []);
                if (attacks.length > 0) {
                    html += '<div class="monster-stat-attacks">';
                    for (const a of attacks) {
                        const range = (a.range || 'melee').toString().toLowerCase();
                        const rangeStr = range === 'melee' ? 'melee' : `ranged ${a.range}`;
                        html += `<div class="monster-stat-attack">${a.name}: +${a.bonus != null ? a.bonus : '0'} to hit, ${(a.damage || '—')} ${(a.damage_type || '')} (${rangeStr})</div>`;
                    }
                    html += '</div>';
                }
                html += '</div>';
            }
            container.className = '';
            container.innerHTML = html || '<span class="monster-panel-empty">No active encounter.</span>';
        }

        /**
         * Resolve encounter rewards with strict precedence:
         * 1) Module encounter overrides (on_death first, then direct encounter fields)
         * 2) Monster manual fallback
         * Note: explicit module empty treasure ([]) means "no treasure" and MUST NOT fall back.
         */
        function resolveEncounterRewards(encounter, monster) {
            const od = encounter && encounter.on_death ? encounter.on_death : null;
            const moduleHasXP = (od && od.xp_award != null) || (encounter && encounter.xp_award != null);
            const moduleXP = (od && od.xp_award != null) ? od.xp_award : (encounter && encounter.xp_award != null ? encounter.xp_award : null);
            const xp = moduleHasXP ? moduleXP : (monster && monster.xp_value != null ? monster.xp_value : null);

            const moduleHasTreasure = (od && Array.isArray(od.treasure)) || (encounter && Array.isArray(encounter.treasure));
            const moduleTreasure = (od && Array.isArray(od.treasure)) ? od.treasure : (encounter && Array.isArray(encounter.treasure) ? encounter.treasure : null);
            const treasure = moduleHasTreasure ? moduleTreasure : (monster && monster.treasure != null ? monster.treasure : null);

            return {
                xp,
                treasure,
                moduleHasXP,
                moduleHasTreasure
            };
        }

        /** Expected XP and gold for defeated encounters in the current room. Module overrides always win; monster manual is fallback only. */
        function getExpectedRewardsForCurrentRoom() {
            const room = gameData.module && gameData.module.rooms && gameData.module.rooms[gameState.currentRoom];
            if (!room || !room.encounters) return { xpValues: [], goldAmounts: [] };
            const xpValues = [];
            const goldAmounts = [];
            for (const enc of room.encounters) {
                if (!getEncounterHP(enc).defeated) continue;
                const monster = resolveMonster(enc.monster_ref);
                const rewards = resolveEncounterRewards(enc, monster);
                const xp = rewards.xp;
                if (xp != null) xpValues.push(xp);
                // Gold is validated from module treasure arrays only (exact quantities).
                if (rewards.moduleHasTreasure && Array.isArray(rewards.treasure)) {
                    for (const t of rewards.treasure) {
                        if ((t.item || '').toLowerCase() === 'gold' && t.quantity != null) goldAmounts.push(Number(t.quantity));
                    }
                }
            }
            return { xpValues, goldAmounts };
        }

        function buildEncounterDescription(encounter, includeCurrentHP = false) {
            const monster = resolveMonster(encounter.monster_ref);
            if (!monster) return `Unknown monster: ${encounter.monster_ref}`;
            
            const hpInfo = includeCurrentHP ? getEncounterHP(encounter) : null;
            let hpStr;
            if (hpInfo && hpInfo.defeated) {
                hpStr = `DEFEATED (0/${hpInfo.max} HP) — narrate death, award XP/treasure from On death`;
            } else if (hpInfo) {
                hpStr = `${hpInfo.current}/${hpInfo.max} HP remaining`;
            } else {
                hpStr = `HP ${monster.hp}`;
            }
            // List all attacks with range (melee vs ranged) — GM chooses based on distance
            const attackLines = (monster.attacks || []).map(a => {
                const r = (a.range || 'melee').toString().toLowerCase();
                const rangeStr = r === 'melee' ? 'melee' : `ranged ${a.range}`;
                return `${a.name} +${a.bonus} for ${a.damage} ${a.damage_type} (${rangeStr})`;
            }).join(' | ');
            const attackStr = attackLines || 'no attacks';
            let line = `${encounter.name} (${monster.name}, id ${encounter.id}): ${hpStr}, AC ${monster.ac} (use this exact AC for hit/miss). Attacks: ${attackStr}`;
            // Rewards: module overrides always win; manual used only when module doesn't define the field.
            const rewards = resolveEncounterRewards(encounter, monster);
            const xp = rewards.xp;
            if (encounter.on_death || (monster.xp_value != null) || (monster.treasure != null) || rewards.moduleHasXP || rewards.moduleHasTreasure) {
                if (xp != null) line += ` | On death: award exactly ${xp} XP`;
                if (rewards.moduleHasTreasure) {
                    const treasureList = Array.isArray(rewards.treasure) ? rewards.treasure : [];
                    const treasureStr = treasureList.length > 0
                        ? treasureList.map(t => t.item === 'gold' ? `${t.quantity} gp` : t.item).join(', ')
                        : 'none';
                    line += ` | Treasure (module): ${treasureStr}`;
                    const goldEntry = treasureList.find(t => (t.item || '').toLowerCase() === 'gold');
                    const goldQty = goldEntry && goldEntry.quantity != null ? Number(goldEntry.quantity) : null;
                    const phrases = [];
                    if (xp != null) phrases.push(`say "You gain ${xp} XP"`);
                    if (goldQty != null) phrases.push(`say "You discover ${goldQty} gold" (or "${goldQty} gp")`);
                    if (phrases.length) line += ` | Use these exact numbers: ${phrases.join('; ')}`;
                } else if (rewards.treasure != null && String(rewards.treasure).trim() !== '') {
                    line += ` | Treasure (from monster manual): ${rewards.treasure}`;
                    if (xp != null) line += ` | Say "You gain ${xp} XP"`;
                } else if (xp != null) {
                    line += ` | Say "You gain ${xp} XP"`;
                }
            }
            return line;
        }

        /** Build a concise RULESET block from rules.json for the GM. Ensures swappable rulesets are honored. */
        function buildRulesetBlockForPrompt() {
            const r = gameData.rules;
            if (!r) return '';
            const lines = [];
            lines.push(`System: ${r.system || 'OSR'}. Honor these mechanics; do not substitute your own numbers or rules.`);
            if (r.design_philosophy) lines.push(`Design philosophy: ${r.design_philosophy}`);
            const dc = r.core_mechanics && r.core_mechanics.ability_checks && r.core_mechanics.ability_checks.dc_scale;
            if (dc && typeof dc === 'object') {
                const dcStr = Object.entries(dc).map(([k, v]) => `${k} DC ${v}`).join(', ');
                lines.push(`Ability/skill check DCs (use these exactly): ${dcStr}.`);
            }
            if (r.core_mechanics && r.core_mechanics.ability_checks) {
                const ac = r.core_mechanics.ability_checks;
                if (ac.roll) lines.push(`Checks: ${ac.roll}.`);
                if (ac.when_to_roll) lines.push(`When to roll: ${ac.when_to_roll}.`);
            }
            if (r.combat) {
                if (r.combat.attack_roll) {
                    const ar = r.combat.attack_roll;
                    lines.push(`Attack: melee ${ar.melee || '1d20+STR+prof'}, ranged ${ar.ranged || '1d20+DEX+prof'}. Hit if roll >= target AC.`);
                }
                if (r.combat.damage) {
                    lines.push(`Damage: ${r.combat.damage.roll || 'weapon die + ability modifier'}. Crit: natural 20 (app handles double dice + mod). Natural 1 = auto miss.`);
                }
                if (r.combat.hit_points && r.combat.hit_points.at_zero) lines.push(`At 0 HP: ${r.combat.hit_points.at_zero}.`);
            }
            if (r.optional_rules && typeof r.optional_rules === 'object') {
                const enabled = Object.entries(r.optional_rules).filter(([, v]) => v && v.enabled === true).map(([k]) => k);
                if (enabled.length) lines.push(`Optional rules in effect: ${enabled.join(', ')}.`);
            }
            if (r.combat && r.combat.conditions && typeof r.combat.conditions === 'object') {
                const condList = Object.entries(r.combat.conditions).map(([id, c]) => {
                    const summary = typeof c === 'object' && c.effect_summary ? c.effect_summary : (typeof c === 'string' ? c : id);
                    return `${id}: ${summary}`;
                }).join('; ');
                if (condList) lines.push(`Conditions (apply exactly as specified; use [CONDITION: add id] or [CONDITION: remove id] so the app can track): ${condList}`);
            }
            return lines.join('\n');
        }

        /** Return condition info from rules (supports object { name, effect_summary, effect_detail, type } or legacy string). */
        function getConditionInfo(id) {
            const c = gameData.rules && gameData.rules.combat && gameData.rules.combat.conditions && gameData.rules.combat.conditions[id];
            if (!c) return { name: id, effect_summary: '', effect_detail: '', type: 'debuff' };
            if (typeof c === 'string') return { name: id.charAt(0).toUpperCase() + id.slice(1), effect_summary: c, effect_detail: c, type: 'debuff' };
            return {
                name: c.name || id,
                effect_summary: c.effect_summary || '',
                effect_detail: c.effect_detail || c.effect_summary || '',
                type: c.type || 'debuff'
            };
        }

        /** Return list of condition ids defined in the ruleset. */
        function getConditionIdsFromRules() {
            const cond = gameData.rules && gameData.rules.combat && gameData.rules.combat.conditions;
            return cond && typeof cond === 'object' ? Object.keys(cond) : [];
        }

        /**
         * Total modifier from active conditions for this roll. Used so the app enforces condition effects on dice.
         * @param {boolean} isAttackRoll - true for attack rolls, false for ability/skill checks
         * @param {string|null} abilityKey - for checks: 'str'|'dex'|'con'|'int'|'wis'|'cha' (wounded only applies to str/dex/con)
         * @returns {number} modifier to add to the roll (negative = penalty)
         */
        function getConditionModifierForRoll(isAttackRoll, abilityKey) {
            const char = gameState.character;
            const conditions = char && char.conditions ? char.conditions : [];
            const condDefs = gameData.rules && gameData.rules.combat && gameData.rules.combat.conditions;
            if (!condDefs || typeof condDefs !== 'object') return 0;
            let total = 0;
            conditions.forEach(c => {
                const id = (c.id || c.name || c).toLowerCase();
                const def = condDefs[id];
                if (!def || typeof def !== 'object') return;
                const level = c.level != null ? c.level : 1;
                if (isAttackRoll) {
                    if (typeof def.attack_penalty === 'number') total += def.attack_penalty;
                    if (typeof def.attack_penalty_per_level === 'number') total += def.attack_penalty_per_level * level;
                } else {
                    const abilities = def.check_penalty_abilities;
                    if (abilities && Array.isArray(abilities) && abilityKey && !abilities.includes(abilityKey.toLowerCase())) return;
                    if (typeof def.check_penalty === 'number') total += def.check_penalty;
                    if (typeof def.check_penalty_per_level === 'number') total += def.check_penalty_per_level * level;
                }
            });
            return total;
        }

        /** Build explicit dungeon layout from module JSON for the GM. GM must use ONLY this. */
        function buildModuleLayoutForPrompt() {
            const rooms = gameData.module.rooms;
            const moduleMeta = gameData.module.module;
            let out = '';
            for (const [roomId, room] of Object.entries(rooms)) {
                out += `\n--- ROOM: ${room.name} (id: ${roomId}) ---\n`;
                out += `Description: ${room.description}\n`;
                if (room.connections && Object.keys(room.connections).length > 0) {
                    const exits = Object.entries(room.connections).map(([dir, targetId]) => {
                        const target = rooms[targetId];
                        const targetName = target ? target.name : targetId;
                        return `${dir} → ${targetName} (${targetId})`;
                    }).join(', ');
                    out += `Exits (use ONLY these): ${exits}\n`;
                } else {
                    out += `Exits: none\n`;
                }
                if (room.features && room.features.length > 0) {
                    out += 'Features (use ONLY these; do not add others):\n';
                    for (const f of room.features) {
                        out += `- ${f.name}: ${f.description || ''}`;
                        if (f.text) out += ` | When read/used: "${f.text}"`;
                        if (f.note) out += ` | Note: "${f.note}"`;
                        if (f.success) out += ` | On success: "${f.success}"`;
                        if (f.failure) out += ` | On failure: "${f.failure}"`;
                        if (f.contains) out += ` | Contains: ${JSON.stringify(f.contains)}`;
                        if (f.interaction) out += ` | Interaction: ${f.interaction}`;
                        if (f.dc != null) out += ` | DC: ${f.dc} (use this exact value from ruleset scale)`;
                        out += '\n';
                    }
                }
                if (room.encounters && room.encounters.length > 0) {
                    out += 'Encounters here (ONLY these monsters exist in this room): ';
                    out += room.encounters.map(e => e.name + ' (' + e.monster_ref + ')').join(', ') + '\n';
                }
            }
            return out;
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        
        async function initializeGame() {
            debugLog('INIT', 'Starting game initialization');
            
            // Load all data files
            const loaded = await loadGameData();
            if (!loaded) {
                alert('Failed to load game data. Check console for details and ensure all JSON files are in the same directory.');
                return;
            }
            
            // Initialize game state from loaded data
            updateLoadingStatus('Initializing game state...');
            
            // Convert loaded character data to game state format
            gameState.character = {
                name: gameData.character.basic_info.name,
                class: gameData.character.basic_info.class,
                level: gameData.character.basic_info.level,
                hp: gameData.character.combat_stats.hit_points.current,
                maxHp: gameData.character.combat_stats.hit_points.maximum,
                ac: gameData.character.combat_stats.armor_class,
                xp: gameData.character.experience.current,
                abilities: {},
                skills: {},
                equipment: [],
                inventory: [],
                conditions: []
            };
            
            // Convert abilities (map full names to short names)
            const abilityNameMap = {
                strength: 'str', dexterity: 'dex', constitution: 'con',
                intelligence: 'int', wisdom: 'wis', charisma: 'cha'
            };
            for (const [key, value] of Object.entries(gameData.character.ability_scores)) {
                const shortKey = abilityNameMap[key] || key;
                gameState.character.abilities[shortKey] = {
                    score: value.score,
                    modifier: value.modifier
                };
            }
            
            debugLog('INIT', 'Character abilities initialized', gameState.character.abilities);
            
            // Convert skills
            for (const [key, value] of Object.entries(gameData.character.skills)) {
                gameState.character.skills[key] = value.modifier;
            }
            
            // Convert equipment: weapons and armor only (no torch, light sources, etc.)
            for (const item of [...gameData.character.equipment.worn, ...gameData.character.equipment.wielded, ...gameData.character.equipment.carried]) {
                const isWeapon = !!item.damage;
                const isArmor = (item.type || '').toLowerCase() === 'armor';
                if (!isWeapon && !isArmor) continue; // skip torch, light sources, etc.
                const typeInfo = isWeapon ? getWeaponTypeInfo(item) : { type: null, range: null };
                let stats = '';
                if (item.damage) {
                    const base = `${item.damage} ${item.damage_type}`;
                    stats = typeInfo.type === 'ranged' && typeInfo.range
                        ? `${base} (ranged ${typeInfo.range})`
                        : `${base} (${typeInfo.type || 'melee'})`;
                } else {
                    stats = item.properties ? item.properties.join(' - ') : '';
                }
                gameState.character.equipment.push({
                    name: item.name,
                    stats,
                    equipped: item.equipped !== undefined ? item.equipped : false,
                    isWeapon,
                    isArmor,
                    weaponType: typeInfo.type,
                    weaponRange: typeInfo.range
                });
            }
            // No weapon readied at start; only armor is "equipped" for display
            gameState.readiedWeaponName = null;
            gameState.armorEquipped = true;
            
            // Convert inventory
            for (const item of gameData.character.equipment.backpack) {
                gameState.character.inventory.push({
                    name: item.name,
                    quantity: item.quantity
                });
            }
            
            // Add coins
            const coins = gameData.character.equipment.coin;
            gameState.character.inventory.push({
                name: 'Gold',
                quantity: `${coins.gold}gp`
            });
            
            // Set starting room
            gameState.currentRoom = gameData.module.module.starting_room;
            
            updateLoadingStatus('Rendering interface...');
            
            // Initialize character sheet display
            initializeCharacterSheet();
            
            // Update title
            document.getElementById('dungeonTitle').textContent = gameData.module.module.title;
            
            // Hide loading overlay
            document.getElementById('loadingOverlay').style.display = 'none';

            // Sync API/usage config inputs with CONFIG (and keep CONFIG updated when user changes them)
            initApiUsageConfig();
            
            // Enable input
            document.getElementById('playerInput').disabled = false;
            
            // Add welcome message
            const startingRoom = gameData.module.rooms[gameState.currentRoom];
            addSystemMessage(`Welcome to ${gameData.module.module.title}!`);
            addNarration(startingRoom.description);
            
            // Check for on_entry features
            if (startingRoom.features) {
                for (const feature of startingRoom.features) {
                    if (feature.triggers && feature.triggers.includes('on_entry') && feature.text) {
                        addNarration(feature.text);
                    }
                }
            }
            
            addSystemMessage('Press Ctrl+Shift+D to toggle debug panel. Type your action and press Enter.');
            
            // Focus input
            document.getElementById('playerInput').focus();
            
            debugLog('INIT', 'Game initialization complete');
        }

        function initializeCharacterSheet() {
            const char = gameState.character;
            
            // Update header
            document.getElementById('charName').textContent = char.name;
            document.getElementById('charClass').textContent = `${char.class} - Lvl ${char.level}`;
            
            // Abilities
            const abilitiesHTML = Object.entries(char.abilities).map(([key, value]) => `
                <div class="ability-score">
                    <div class="ability-name">${key.toUpperCase()}</div>
                    <div class="ability-value">${value.score}</div>

                </div>
            `).join('');

            // Skills
            const skillsHTML = Object.entries(char.skills).map(([key, value]) => `
                <div class="skill-item">

        /** AC from armor if worn, otherwise 10 + DEX (unarmored). */
        function getEffectiveAC() {
            const char = gameState.character;
            if (!char || !char.abilities) return char ? char.ac : 10;
            if (!gameState.armorEquipped) return 10 + char.abilities.dex.modifier;
            const worn = gameData.character && gameData.character.equipment && gameData.character.equipment.worn;
            const armor = worn && worn.find(w => (w.type || '').toLowerCase() === 'armor');
            return (armor && armor.ac != null) ? armor.ac : char.ac;
        }

        function updateCharacterDisplay() {
            const char = gameState.character;
            const ac = getEffectiveAC();
            document.getElementById('hpDisplay').textContent = `${char.hp}/${char.maxHp}`;
            document.getElementById('acDisplay').textContent = ac;
            
            // Update XP progress bar (use ruleset level progression when available)
            const xpLevels = getXPLevels();
            const currentLevel = char.level;
            const nextLevel = currentLevel + 1;
            const currentLevelXP = xpLevels[currentLevel];
            const nextLevelXP = xpLevels[nextLevel] != null ? xpLevels[nextLevel] : (xpLevels[10] != null ? xpLevels[10] * 2 : 999999);
            
            const xpProgress = char.xp - currentLevelXP;
            const xpNeeded = nextLevelXP - currentLevelXP;
            const progressPercent = Math.min(100, (xpProgress / xpNeeded) * 100);
            
            document.getElementById('xpProgressText').textContent = 
                `${char.xp.toLocaleString()} / ${nextLevelXP.toLocaleString()}`;
            document.getElementById('xpBarFill').style.width = `${progressPercent}%`;
            
            // Combat indicator: red highlight on character header when in combat
            const headerEl = document.getElementById('characterHeader');
            if (headerEl) headerEl.classList.toggle('in-combat', gameState.inCombat);
            
            // Update conditions: icon-only with tooltip showing name and effect
            const conditionsHTML = char.conditions.length === 0
                ? ''
                : char.conditions.map(condition => {
                    const id = (condition.id || condition.name || condition).toString().toLowerCase();
                    const info = getConditionInfo(id);
                    const iconClass = CONDITION_ICONS[id] || CONDITION_ICON_DEFAULT;
                    const tooltip = [info.name, info.effect_summary].filter(Boolean).join(': ');
                    const title = tooltip ? ` title="${tooltip.replace(/"/g, '&quot;')}"` : '';
                    const typeClass = info.type === 'buff' ? ' buff' : '';
                    return `<span class="condition-icon${typeClass}"${title}><i class="${iconClass}"></i></span>`;
                }).join('');
            const conditionsEl = document.getElementById('conditionsDisplay');
            conditionsEl.innerHTML = conditionsHTML;
            if (conditionsHTML && window.FontAwesome && window.FontAwesome.dom && typeof window.FontAwesome.dom.i2svg === 'function') {
                window.FontAwesome.dom.i2svg({ node: conditionsEl });
            }
            
            // Update Equipped: armor, weapons, and items in use (e.g. torch lit). (Future: different behavior when inventory/equipment items are clicked.)
            const equippedItems = [...char.equipment, ...(gameState.equippedInUse || [])];
            const equippedHTML = equippedItems.map(item => {
                let typeClass = '';
                let icon = '';
                if (item.isArmor) {
                    typeClass = 'armor';
                    icon = '<i class="fa-sharp-duotone fa-solid fa-shield-halved"></i>';
                } else if (item.isWeapon && item.weaponType === 'ranged') {
                    typeClass = 'ranged';
                    icon = '<i class="fa-sharp-duotone fa-solid fa-bow-arrow"></i>';
                } else if (item.isWeapon && (item.weaponType === 'melee' || !item.weaponType)) {
                    typeClass = 'melee';
                    icon = '<i class="fa-sharp-duotone fa-solid fa-sword"></i>';
                }
                return `
                <div class="equipment-item${typeClass ? ' ' + typeClass : ''}">
                    ${icon}
                    <div class="equipment-name">${item.name}</div>
                    <div class="equipment-stats">${item.stats || ''}</div>
                </div>
            `;
            }).join('');
            const equippedEl = document.getElementById('equippedList');
            equippedEl.innerHTML = equippedHTML;
            if (window.FontAwesome && window.FontAwesome.dom && typeof window.FontAwesome.dom.i2svg === 'function') {
                window.FontAwesome.dom.i2svg({ node: equippedEl });
            }
            
            // Update Pack: backpack items with quantities (show x0 when used). Gold always first.
            const sortedInventory = [...char.inventory].sort((a, b) => (a.name === 'Gold' ? -1 : 0) - (b.name === 'Gold' ? -1 : 0));
            const packHTML = sortedInventory.map(item => {
                const qty = item.quantity;
                const qtyStr = item.name === 'Gold' ? ` ${qty}` : `x${qty}`;
                const goldClass = item.name === 'Gold' ? ' gold' : '';
                const goldIcon = item.name === 'Gold' ? '<i class="fa-sharp-duotone fa-light fa-sack"></i>' : '';
                return `
                <div class="inventory-item${goldClass}">
                    <span class="item-name">${goldIcon} ${item.name}</span>
                    <span class="item-quantity">${qtyStr}</span>
                </div>
            `}).join('');
            const packEl = document.getElementById('packList');
            packEl.innerHTML = packHTML;
            if (window.FontAwesome && window.FontAwesome.dom && typeof window.FontAwesome.dom.i2svg === 'function') {
                window.FontAwesome.dom.i2svg({ node: packEl });
            }
            updateMonsterPanel();
        }

        // ============================================
        // STATE MANAGEMENT FUNCTIONS
        // ============================================
        
        function modifyHP(amount) {
            debugLog('STATE', `Modifying HP by ${amount}`);
            gameState.character.hp = Math.max(0, Math.min(gameState.character.maxHp, gameState.character.hp + amount));
            updateCharacterDisplay();
            
            if (gameState.character.hp === 0) {
                gameState.inCombat = false;
                gameState.lastCombatRoom = gameState.currentRoom;
                addSystemMessage("You have died! Your adventure ends here.");
                disableInput(true);
            }
        }
        
        function addXP(amount) {
            debugLog('STATE', `Adding ${amount} XP`);
            gameState.character.xp += amount;
            addSystemMessage(`Gained ${amount} XP!`);
            updateCharacterDisplay();
        }
        
        function addToInventory(itemName, quantity = 1) {
            debugLog('STATE', `Adding to inventory: ${itemName} x${quantity}`);
            const existing = gameState.character.inventory.find(i => i.name === itemName);
            if (existing) {
                if (typeof existing.quantity === 'number') {
                    existing.quantity += quantity;
                } else {
                    const match = existing.quantity.match(/(\d+)/);
                    if (match) {
                        const current = parseInt(match[1]);
                        existing.quantity = `${current + quantity}gp`;
                    }
                }
            } else {
                gameState.character.inventory.push({ name: itemName, quantity });
            }
            updateCharacterDisplay();
        }
        
        function removeFromInventory(itemName, quantity = 1) {
            debugLog('STATE', `Removing from inventory: ${itemName} x${quantity}`);
            const item = gameState.character.inventory.find(i => i.name === itemName);
            if (item) {
                if (typeof item.quantity === 'number') {
                    item.quantity = Math.max(0, item.quantity - quantity);
                    // Keep item with qty 0 so it can be retrieved (e.g. rope)
                }
            }
            updateCharacterDisplay();
        }

        /** Add a condition by id (from rules.combat.conditions). Id is case-insensitive; stored as lowercase. */
        function addCondition(id) {
            if (!id || typeof id !== 'string') return;
            const normId = id.trim().toLowerCase();
            if (!normId) return;
            const info = getConditionInfo(normId);
            if (!info.effect_summary && !info.effect_detail) {
                const ids = getConditionIdsFromRules();
                if (ids.length && !ids.includes(normId)) return;
            }
            const existing = gameState.character.conditions.find(c => (c.id || c.name || '').toLowerCase() === normId);
            if (existing) return;
            gameState.character.conditions.push({ id: normId });
            debugLog('STATE', `Condition added: ${normId}`);
            updateCharacterDisplay();
        }

        /** Remove a condition by id. */
        function removeCondition(id) {
            if (!id || typeof id !== 'string') return;
            const normId = id.trim().toLowerCase();
            const before = gameState.character.conditions.length;
            gameState.character.conditions = gameState.character.conditions.filter(
                c => (c.id || c.name || String(c)).toLowerCase() !== normId
            );
            if (gameState.character.conditions.length < before) {
                debugLog('STATE', `Condition removed: ${normId}`);
                updateCharacterDisplay();
            }
        }

        // ============================================
        // NARRATIVE FUNCTIONS
        // ============================================
        
        function scrollToBottom() {
            const scroll = document.getElementById('narrativeScroll');
            setTimeout(() => {
                scroll.scrollTop = scroll.scrollHeight;
            }, 100);
        }

        /** Normalize narrative formatting so bold is consistent. Converts markdown ** to <b></b> so both **text** and <b>text</b> render as bold. */
        function normalizeNarrativeFormatting(text) {
            if (!text || typeof text !== 'string') return '';
            const parts = text.split(/\*\*/);
            let out = '';
            for (let i = 0; i < parts.length; i++) {
                if (i % 2 === 1) out += '<b>' + parts[i] + '</b>';
                else out += parts[i];
            }
            return out;
        }

        function addNarration(text) {
            const scroll = document.getElementById('narrativeScroll');
            const entry = document.createElement('div');
            entry.className = 'narrative-entry';
            const formatted = normalizeNarrativeFormatting(text);
            entry.innerHTML = `<div class="gm-narration">${formatted}</div>`;
            scroll.appendChild(entry);
            scrollToBottom();
        }

        /** Strip optional scene imagery tags from GM text so they are not shown. (Future: module JSON may reference pre-made maps/images.) */
        function parseSceneDirectives(text) {
            if (!text) return { cleanText: '' };
            const cleanText = text
                .replace(/\[SCENE_IMAGE:\s*[^\]]+\]/gi, '')
                .replace(/\[SCENE_PROMPT:\s*[^\]]+\]/gi, '')
                .replace(/\[SCENE_ALT:\s*[^\]]+\]/gi, '')
                .replace(/\[SCENE_STYLE:\s*[^\]]+\]/gi, '')
                .replace(/\s{2,}/g, ' ')
                .trim();
            return { cleanText };
        }

        function addPlayerAction(text) {
            const scroll = document.getElementById('narrativeScroll');
            const entry = document.createElement('div');
            entry.className = 'narrative-entry';
            entry.innerHTML = `<div class="player-action">${text}</div>`;
            scroll.appendChild(entry);
            scrollToBottom();
        }

        function addSystemMessage(text) {
            const scroll = document.getElementById('narrativeScroll');
            const entry = document.createElement('div');
            entry.className = 'narrative-entry';
            entry.innerHTML = `<div class="system-message">${text}</div>`;
            scroll.appendChild(entry);
            scrollToBottom();
        }

        function addLoadingIndicator() {
            const scroll = document.getElementById('narrativeScroll');
            const entry = document.createElement('div');
            entry.className = 'narrative-entry';
            entry.id = 'loadingIndicator';
            entry.innerHTML = `<div class="loading-indicator">GM is thinking</div>`;

        function removeLoadingIndicator() {
