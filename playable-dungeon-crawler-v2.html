        /** Read Anthropic Messages SSE and return the full assistant text. Updates the streaming narration as deltas arrive. */
        async function readAnthropicStream(response) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let buffer = '';
            let fullText = '';
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                // SSE events are separated by blank lines. Process any complete events in the buffer.
                let nl;
                while ((nl = buffer.indexOf('\n\n')) !== -1) {
                    const rawEvent = buffer.slice(0, nl);
                    buffer = buffer.slice(nl + 2);
                    for (const line of rawEvent.split('\n')) {
                        if (!line.startsWith('data:')) continue;
                        const payload = line.slice(5).trim();
                        if (!payload) continue;
                        let evt;
                        try { evt = JSON.parse(payload); } catch (e) { continue; }
                        if (evt.type === 'content_block_delta' && evt.delta && evt.delta.type === 'text_delta') {
                            fullText += evt.delta.text;
                            updateStreamingNarration(fullText);
                        } else if (evt.type === 'message_stop') {
                            // end of stream; outer loop will exit on reader.done
                        } else if (evt.type === 'error') {
                            throw new Error(evt.error && evt.error.message ? evt.error.message : 'Stream error');
                        }
                    }
                }
            }
            return fullText;
        }

        /** Build plain-text copy of narrative panel for playtest feedback. Copies to clipboard; returns the text. */
        function copyNarrativeToClipboard() {
            const scroll = document.getElementById('narrativeScroll');
            if (!scroll) return '';
            const lines = [];
            lines.push('---');
            lines.push('Narrative panel (for playtest feedback)');
            lines.push('---');
            lines.push('');
            for (const entry of scroll.querySelectorAll('.narrative-entry')) {
                if (entry.id === 'loadingIndicator') continue;
                const gm = entry.querySelector('.gm-narration');
                const player = entry.querySelector('.player-action');
                const system = entry.querySelector('.system-message');
                const callout = entry.querySelector('.mechanics-callout');
                const getText = (el) => (el && el.innerText != null ? el.innerText : (el && el.textContent != null ? el.textContent : '')).trim();
                if (gm && gm.textContent.trim()) {
                    lines.push('[GM] ' + getText(gm));
                } else if (player && player.textContent.trim()) {
                    lines.push('[Player] ' + getText(player));
                } else if (system && system.textContent.trim()) {
                    lines.push('[System] ' + getText(system));
                } else if (callout && callout.textContent.trim()) {
                    lines.push('[Callout] ' + getText(callout));
                }
            }
            const text = lines.join('\n');
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.getElementById('copyNarrativeBtn');
                    if (btn) {
                        const orig = btn.textContent;
                        btn.textContent = 'Copied!';
                        btn.disabled = true;
                        setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
                    }
                }).catch(() => {});
            }
            return text;
        }

        // ============================================
        // WEAPON DAMAGE (from character JSON)
        // ============================================
        
        /** Whether a weapon uses DEX (ranged) or STR (melee) for damage. */
        function isRangedWeapon(weapon) {
            return getWeaponTypeInfo(weapon).type === 'ranged';
        }

        /** Get weapon type (melee/ranged) and range. Works on character equipment or monster attack. */
        function getWeaponTypeInfo(weapon) {
            if (!weapon) return { type: 'melee', range: null };
            const name = (weapon.name || '').toLowerCase();
            const props = Array.isArray(weapon.properties) ? weapon.properties.join(' ') : (weapon.properties || '');
            const propsLower = props.toLowerCase();
            // Explicit range field (e.g. monster attacks)
            if (weapon.range) {
                const r = String(weapon.range).toLowerCase();
                if (r === 'melee') return { type: 'melee', range: null };
                return { type: 'ranged', range: weapon.range };
            }
            // From properties: "range 80/320" or "range 30/120"
            const rangeMatch = props.match(/range\s+(\d+(?:\/\d+)?)/i);
            if (rangeMatch) return { type: 'ranged', range: rangeMatch[1] };
            // Ammunition property implies ranged
            if (/ammunition/.test(propsLower)) return { type: 'ranged', range: 'see properties' };
            // Name-based
            if (/bow|crossbow|sling|dart|thrown/.test(name)) {
                const m = props.match(/range\s+(\d+(?:\/\d+)?)/i);
                return { type: 'ranged', range: m ? m[1] : 'see properties' };
            }
            return { type: 'melee', range: null };
        }
        
        /** Get the readied weapon object (for name, damage_type, melee/ranged). */
        function getReadiedWeaponObject() {
            const fromState = (gameState.character.equipment || []).filter(e => e.isWeapon && e.damage);
            const fromData = gameData.character && gameData.character.equipment
                ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                : [];
            const sources = [...fromState, ...fromData];
            const weapons = sources.filter(w => w.damage);
            if (!weapons.length) return null;
            const readied = gameState.readiedWeaponName;
            let weapon = readied ? weapons.find(w => w.name && w.name.toLowerCase() === readied.toLowerCase()) : null;
            if (!weapon) weapon = weapons.find(w => w.equipped) || weapons[0];
            return weapon;
        }

        /** Get readied weapon damage: dice and modifier (STR for melee, DEX for ranged). Uses gameState equipment first (includes found/bought weapons). */
        function getEquippedWeaponDamage() {
            const weapon = getReadiedWeaponObject();
            if (!weapon) return { dice: '1d8', modifier: gameState.character.abilities.str.modifier, label: '1d8', count: 1, sides: 8 };
            const useDex = isRangedWeapon(weapon);
            const mod = useDex ? gameState.character.abilities.dex.modifier : gameState.character.abilities.str.modifier;
            return parseWeaponDice(weapon.damage, mod);
        }
        
        /** Resolve dice for a roll request. Returns { type:'weapon'|'custom'|'d20', ... } */
        function getDiceForRollRequest(rollType) {
            const t = (rollType || '').trim().toLowerCase();
            if (t === 'damage') {
                return { type: 'weapon', label: getEquippedWeaponDamage().label };
            }
            // Custom dice: 2d4+2, 1d6, 3d8+1, 1d6-1, etc.
            const diceMatch = t.match(/^(\d+)d(\d+)(?:([+-])(\d+))?$/i);
            if (diceMatch) {
                const count = parseInt(diceMatch[1]);
                const sides = parseInt(diceMatch[2]);
                const modifier = diceMatch[4] ? (diceMatch[3] === '-' ? -parseInt(diceMatch[4]) : parseInt(diceMatch[4])) : 0;
                const modStr = modifier ? (modifier >= 0 ? '+' + modifier : String(modifier)) : '';
                return {
                    type: 'custom',
                    count: count,
                    sides: sides,
                    modifier,
                    label: `${count}d${sides}${modStr}`,
                    minFace: count,
                    maxFace: count * sides
                };
            }
            // Healing: lookup from character or use default 2d4+2
            if (t === 'healing' || t === 'healing potion' || t === 'healingpotion') {
                const backpack = gameData.character?.equipment?.backpack || [];
                const potion = backpack.find(i => (i.name || '').toLowerCase().includes('healing') && (i.effect || '').includes('d'));
                if (potion && potion.effect) {
                    const m = potion.effect.match(/(\d+)d(\d+)(?:\+(\d+))?/i);
                    if (m) {
                        const count = parseInt(m[1]);
                        const sides = parseInt(m[2]);
                        const modifier = m[3] ? parseInt(m[3]) : 0;
                        const modStr = modifier ? (modifier >= 0 ? '+' + modifier : String(modifier)) : '';
                        return {
                            type: 'custom',
                            count, sides, modifier,
                            label: `${count}d${sides}${modStr}`,
                            minFace: count,
                            maxFace: count * sides
                        };
                    }
                }
                return {
                    type: 'custom',
                    count: 2, sides: 4, modifier: 2,
                    label: '2d4+2',
                    minFace: 2,
                    maxFace: 8
                };
            }
            // d20 for abilities/skills
            return { type: 'd20', ability: t };
        }

        /** Parse "1d8" or "2d6" and return { dice, modifier, label } for display and rolling. */
        function parseWeaponDice(diceStr, modifier) {
            const match = (diceStr || '1d8').match(/^(\d+)d(\d+)$/i);
            const count = match ? parseInt(match[1], 10) : 1;
            const sides = match ? parseInt(match[2], 10) : 8;
            const modifierNum = typeof modifier === 'number' ? modifier : 0;
            const modStr = modifierNum >= 0 ? '+' + modifierNum : String(modifierNum);
            return {
                dice: diceStr || '1d8',
                count,
                sides,
                modifier: modifierNum,
                label: (count === 1 ? '1d' + sides : count + 'd' + sides) + (modifierNum !== 0 ? modStr : '')
            };
        }
        
        /** Roll weapon damage (e.g. 1d8+3 or 2d6+2). If isCriticalHit, dice total is doubled then modifier added. Returns { total, breakdown } for display. */
        function rollWeaponDamage(isCriticalHit = false) {
            const w = getEquippedWeaponDamage();
            const rolls = [];
            let diceTotal = 0;
            for (let i = 0; i < w.count; i++) {
                const r = Math.floor(Math.random() * w.sides) + 1;
                rolls.push(r);
                diceTotal += r;
            }
            const modStr2 = w.modifier >= 0 ? ` + ${w.modifier}` : ` - ${Math.abs(w.modifier)}`;
            const diceExpr = w.count === 1 ? `1d${w.sides}` : `${w.count}d${w.sides}`;
            const rollsStr = rolls.join(' + ');
            let total, breakdown;
            if (isCriticalHit) {
                const doubled = diceTotal * 2;
                total = doubled + w.modifier;
                breakdown = w.modifier !== 0
                    ? `${diceExpr} (${rollsStr}) → crit: ${diceTotal}×2${modStr2} = ${total}`
                    : `${diceExpr} (${rollsStr}) → crit: ${diceTotal}×2 = ${total}`;
            } else {
                total = diceTotal + w.modifier;
                breakdown = w.modifier !== 0
                    ? `${diceExpr} (${rollsStr})${modStr2} = ${total}`
                    : `${diceExpr} (${rollsStr}) = ${total}`;
            }
            return { total, breakdown, diceTotal };
        }

        /** True if this d20 roll context is for an attack roll (affects crit success → double damage; crit failure → auto-miss). */
        function isAttackRoll(diceCtx) {
            if (!diceCtx || diceCtx.type !== 'd20') return false;
            const key = (diceCtx.ability || '').toLowerCase().trim();
            if (/\battack\b|\bto hit\b|\bhit\b|\bmelee\b|\branged\b/.test(key)) return true;
            if (gameState.inCombat && /^(strength|str|dexterity|dex)$/.test(key)) return true;
            return false;
        }

        // ============================================
        // DICE ROLLING
        // ============================================
        
        /** Infer roll context type for mechanics callout (Section 2). */
        function inferRollContextType(abilityStr) {
            const a = (abilityStr || '').toLowerCase().trim();
            if (a === 'damage' || a.includes('damage')) return 'damage';
            if (a.includes('attack') || a === 'melee attack' || a === 'ranged attack') return 'attack';
            return 'ability';
        }

        function showDiceSection(prompt = "Roll requested:", rollType = null) {
            const diceSection = document.getElementById('diceSection');
            const rollPrompt = document.getElementById('rollPrompt');
            const rollBtn = document.getElementById('rollBtn');
            const diceInput = document.getElementById('diceInput');
            const signed = (n) => (n >= 0 ? `+${n}` : `${n}`);
            
            const rt = rollType || (prompt.match(/Roll\s+(.+?)(?::|$)/i)?.[1]?.trim() || '');
            const dice = getDiceForRollRequest(rt);
            const contextType = inferRollContextType(rt);
            
            if (dice.type === 'weapon') {
                const w = getEquippedWeaponDamage();
                const diceExpr = w.count === 1 ? `1d${w.sides}` : `${w.count}d${w.sides}`;
                const isCrit = gameState.lastD20Natural === 20 && gameState.lastRollWasAttack;
                const modLabel = w.modifier !== 0 ? signed(w.modifier) : '';
                if (isCrit) {
                    rollPrompt.textContent = `Critical hit! Roll for Damage (${diceExpr}${w.modifier !== 0 ? ` ${modLabel}` : ''}) — result is doubled.`;
                    rollBtn.textContent = `Roll ${diceExpr}${modLabel ? ` (${modLabel})` : ''}`;
                } else {
                    rollPrompt.textContent = `Roll for Damage (${diceExpr}${w.modifier !== 0 ? ` ${modLabel}` : ''}).`;
                    rollBtn.textContent = `Roll ${diceExpr}${modLabel ? ` (${modLabel})` : ''}`;
                }
                diceInput.placeholder = `1-${w.count * w.sides}`;
                diceInput.min = String(w.count);
                diceInput.max = String(w.count * w.sides);
            } else if (dice.type === 'custom') {
                const diceExpr = dice.count === 1 ? `1d${dice.sides}` : `${dice.count}d${dice.sides}`;
                const modLabel = dice.modifier !== 0 ? signed(dice.modifier) : '';
                rollPrompt.textContent = `Roll ${diceExpr}${modLabel ? ` (${modLabel})` : ''}.`;
                rollBtn.textContent = `Roll ${diceExpr}${modLabel ? ` (${modLabel})` : ''}`;
                diceInput.placeholder = `${dice.minFace}-${dice.maxFace}`;
                diceInput.min = String(dice.minFace);
                diceInput.max = String(dice.maxFace);
            } else {
                const isAttack = contextType === 'attack';
                const abilityInfo = getAbilityModifierForRoll(dice.ability);
                const modStr = abilityInfo && abilityInfo.modifier != null ? signed(abilityInfo.modifier) : '';
                if (isAttack) {
                    const atk = getAttackModifierForRoll(rt);
                    const totalMod = atk ? atk.modifier : (abilityInfo ? abilityInfo.modifier : 0);
                    const labelPart = atk && atk.label ? atk.label : (abilityInfo && abilityInfo.label ? abilityInfo.label : '');
                    rollPrompt.textContent = labelPart ? `Roll for Attack (1d20 ${labelPart}).` : `Roll for Attack (1d20${modStr ? ` ${modStr}` : ''}).`;
                    rollBtn.textContent = `Roll 1d20 (${signed(totalMod)})`;
                } else {
                    const label = abilityInfo && abilityInfo.label ? abilityInfo.label : (rt || 'Check');
                    rollPrompt.textContent = `Roll for Ability Check (1d20${modStr ? ` ${modStr}` : ''}).`;
                    rollBtn.textContent = `Roll 1d20 (${modStr || '0'})`;
                }
                diceInput.placeholder = '1-20';
                diceInput.min = '1';
                diceInput.max = '20';
            }
            
            diceSection.classList.add('active');
            gameState.waitingForRoll = true;
            gameState.pendingRollContext = { dice, rollType: contextType, abilityName: rt };
            disableInput(true);
        }

        function hideDiceSection() {
            const diceSection = document.getElementById('diceSection');
            diceSection.classList.remove('active');
            gameState.waitingForRoll = false;
            gameState.pendingRollContext = null;
            disableInput(false);
        }

        function getProficiencyBonus() {
            return (gameData.character && gameData.character.combat_stats && typeof gameData.character.combat_stats.proficiency_bonus === 'number')
                ? gameData.character.combat_stats.proficiency_bonus
                : 0;
        }

        /** Attack rolls use ability modifier + proficiency (melee: STR, ranged: DEX). Condition penalties are applied automatically. */
        function getAttackModifierForRoll(rollKey) {
            const key = (rollKey || '').toLowerCase();
            const char = gameState.character;
            if (!char || !char.abilities) return null;
            let useDex = false;
            if (/\branged\b/.test(key)) {
                useDex = true;
            } else if (/\bmelee\b/.test(key)) {
                useDex = false;
            } else {
                // Generic "attack": infer from readied weapon when possible
                const sources = gameData.character && gameData.character.equipment
                    ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                    : [];
                const weapons = sources.filter(w => w.damage);
                const readied = gameState.readiedWeaponName;
                let weapon = readied ? weapons.find(w => w.name && w.name.toLowerCase() === readied.toLowerCase()) : null;
                if (!weapon) weapon = weapons.find(w => w.equipped) || weapons[0];
                useDex = isRangedWeapon(weapon);
            }
            const abilityMod = useDex ? char.abilities.dex.modifier : char.abilities.str.modifier;
            const prof = getProficiencyBonus();
            const abilityLabel = useDex ? 'DEX' : 'STR';
            const baseMod = abilityMod + prof;
            const conditionMod = getConditionModifierForRoll(true, null);
            const totalMod = baseMod + conditionMod;
            const conditionLabel = conditionMod !== 0 ? ` (conditions ${conditionMod >= 0 ? '+' : ''}${conditionMod})` : '';
            return {
                modifier: totalMod,
                label: `Attack (${abilityLabel} ${abilityMod >= 0 ? '+' : ''}${abilityMod}, Prof +${prof}${conditionLabel})`
            };
        }

        /** Map roll request to modifier for display: use skill modifier if it's a skill, else ability. Condition penalties are applied automatically. */
        function getAbilityModifierForRoll(abilityName) {
            if (!abilityName || !gameState.character) return null;
            const key = abilityName.toLowerCase().trim();
            const char = gameState.character;
            // Explicit attack requests always include proficiency.
            if (/\battack\b|\bto hit\b|\bhit\b/.test(key)) {
                return getAttackModifierForRoll(key);
            }
            // In combat, Strength/Dexterity roll requests are usually attack rolls from GM flow.
            if (gameState.inCombat && (key === 'strength' || key === 'str' || key === 'dexterity' || key === 'dex')) {
                return getAttackModifierForRoll(key.includes('dex') ? 'ranged attack' : 'melee attack');
            }
            if (char.skills && typeof char.skills[key] === 'number') {
                const label = abilityName.charAt(0).toUpperCase() + abilityName.slice(1).toLowerCase();
                const conditionMod = getConditionModifierForRoll(false, null);
                const totalMod = char.skills[key] + conditionMod;
                const conditionLabel = conditionMod !== 0 ? ` (conditions ${conditionMod >= 0 ? '+' : ''}${conditionMod})` : '';
                return { modifier: totalMod, label: label + conditionLabel };
            }
            if (!char.abilities) return null;
            const keyMap = {
                strength: 'str', str: 'str', dex: 'dex', dexterity: 'dex',
                constitution: 'con', con: 'con', intelligence: 'int', int: 'int',
                wisdom: 'wis', wis: 'wis', charisma: 'cha', cha: 'cha'
            };
            const abKey = keyMap[key];
            if (!abKey || !char.abilities[abKey]) return null;
            const mod = char.abilities[abKey].modifier;
            const conditionMod = getConditionModifierForRoll(false, abKey);
            const totalMod = mod + conditionMod;
            const label = abilityName.charAt(0).toUpperCase() + abilityName.slice(1).toLowerCase();
            const conditionLabel = conditionMod !== 0 ? ` (conditions ${conditionMod >= 0 ? '+' : ''}${conditionMod})` : '';
            return { modifier: totalMod, label: label + conditionLabel };
        }

        function rollDice() {
            const ctx = gameState.pendingRollContext?.dice;
            if (!ctx) return;
            if (ctx.type === 'weapon') {
                const isCrit = gameState.lastD20Natural === 20 && gameState.lastRollWasAttack;
                const result = rollWeaponDamage(isCrit);
                // Pass the raw dice sum (not `total`). processDiceRoll's weapon branch applies the modifier and crit doubling itself;
                // passing `total` would double-count the modifier.
                processDiceRoll(result.diceTotal, ctx, { damageBreakdown: result.breakdown, isCriticalHit: isCrit });
            } else if (ctx.type === 'custom') {
                const rolls = [];
                let sum = 0;
                for (let i = 0; i < ctx.count; i++) {
                    const r = Math.floor(Math.random() * ctx.sides) + 1;
                    rolls.push(r);
                    sum += r;
                }
                const total = sum + ctx.modifier;
                const rollsStr = rolls.join(' + ');
                const modStr = ctx.modifier ? (ctx.modifier >= 0 ? ` + ${ctx.modifier}` : ` - ${Math.abs(ctx.modifier)}`) : '';
                const breakdown = ctx.modifier !== 0
                    ? `${ctx.label} (${rollsStr})${modStr} = ${total}`
                    : `${ctx.label} (${rollsStr}) = ${total}`;
                processDiceRoll(total, ctx, { customBreakdown: breakdown });
            } else {
                const d20 = Math.floor(Math.random() * 20) + 1;
                processDiceRoll(d20, ctx);
            }
        }

        function submitDiceRoll() {
            const input = document.getElementById('diceInput');
            const roll = parseInt(input.value, 10);
            const min = parseInt(input.min || 1, 10);
            const max = parseInt(input.max || 20, 10);
            const ctx = gameState.pendingRollContext?.dice;
            const isValid = !isNaN(roll) && roll >= min && roll <= max;
            
            if (isValid && ctx) {
                input.value = '';
                const opts = {};
                if (ctx.type === 'weapon' && gameState.lastD20Natural === 20 && gameState.lastRollWasAttack) opts.isCriticalHit = true;
                processDiceRoll(roll, ctx, opts);
            }
        }

        function processDiceRoll(roll, diceCtx, options = {}) {
            let message;
            let totalToSend;
            let rollMessageSuffix = '';
            const ctx = gameState.pendingRollContext?.dice || diceCtx;
            const pendingCtx = gameState.pendingRollContext;
            const rollType = (pendingCtx && pendingCtx.rollType) || inferRollContextType((pendingCtx && pendingCtx.abilityName) || '');
            if (!ctx) return;
            /** When the rules engine auto-resolves damage on an attack hit, we send a combined user message and suppress the normal "I rolled X" wording. */
            let autoResolvedMessage = null;
            
            if (ctx.type === 'weapon') {
                const isCrit = options.isCriticalHit || (gameState.lastD20Natural === 20 && gameState.lastRollWasAttack);
                const breakdown = options.damageBreakdown;
                const w = getEquippedWeaponDamage();
                const damageTotal = isCrit ? roll * 2 + w.modifier : roll + w.modifier;
                totalToSend = damageTotal;
                if (breakdown) {
                    message = isCrit
                        ? `You rolled damage (critical hit): <span class="dice-roll">${breakdown}</span>`
                        : `You rolled damage: <span class="dice-roll">${breakdown}</span>`;
                } else {
                    const modStr = w.modifier >= 0 ? ` + ${w.modifier}` : ` - ${Math.abs(w.modifier)}`;
                    message = isCrit
                        ? `You rolled damage (critical hit): <span class="dice-roll">${roll} (dice)×2${w.modifier !== 0 ? modStr : ''} = ${damageTotal}</span>`
                        : `You rolled damage: <span class="dice-roll">${w.label} = ${roll} (manual)${w.modifier !== 0 ? modStr : ''} = ${damageTotal}</span>`;
                }
                if (isCrit) rollMessageSuffix = ' Critical hit damage.';
                gameState.lastD20Natural = null;
                gameState.lastRollWasAttack = false;
            } else if (ctx.type === 'custom') {
                const breakdown = options.customBreakdown;
                if (breakdown) {
                    message = `You rolled ${ctx.label}: <span class="dice-roll">${breakdown}</span>`;
                    totalToSend = roll + (ctx.modifier || 0);
                } else {
                    totalToSend = roll + (ctx.modifier || 0);
                    const modStr = ctx.modifier ? (ctx.modifier >= 0 ? ` + ${ctx.modifier}` : ` - ${Math.abs(ctx.modifier)}`) : '';
                    message = `You rolled ${ctx.label}: <span class="dice-roll">${ctx.label} = ${roll} (manual)${modStr} = ${totalToSend}</span>`;
                }
            } else {
                gameState.lastD20Natural = roll;
                gameState.lastRollWasAttack = isAttackRoll(ctx);
                const abilityInfo = ctx.ability ? getAbilityModifierForRoll(ctx.ability) : null;
                if (abilityInfo != null && abilityInfo.modifier != null) {
                    totalToSend = roll + abilityInfo.modifier;
                    const modStr = abilityInfo.modifier >= 0 ? ` + ${abilityInfo.modifier}` : ` - ${Math.abs(abilityInfo.modifier)}`;
                    message = `You rolled d20: <span class="dice-roll">${roll} (${abilityInfo.label}${modStr}) = ${totalToSend}</span>`;
                } else {
                    totalToSend = roll;
                    message = `You rolled d20: <span class="dice-roll">${roll}</span>`;
                }
                if (roll === 20) rollMessageSuffix = ' Natural 20 (critical success).';
                else if (roll === 1) rollMessageSuffix = ' Natural 1 (critical failure).';
            }
            
            // Build mechanics callout (Section 2 format) and apply state from callouts
            const signed = (n) => (n >= 0 ? `+ ${n}` : `- ${Math.abs(n)}`);
            if (rollType === 'attack' && ctx.type !== 'weapon') {
                const enc = getFirstActiveEncounterInCurrentRoom();
                const monster = enc ? resolveMonster(enc.monster_ref) : null;
                const ac = monster && (monster.ac != null) ? monster.ac : (gameData.character && gameData.character.combat_stats ? gameData.character.combat_stats.armor_class : 13);
                const hit = totalToSend >= ac;
                const weaponObj = getReadiedWeaponObject();
                const weaponLabel = weaponObj ? `${(weaponObj.name || 'weapon').toLowerCase().replace(/\s+/g, ' ')}/${isRangedWeapon(weaponObj) ? 'ranged' : 'melee'}` : 'melee';
                const modForCallout = (ctx.ability ? getAbilityModifierForRoll(ctx.ability) : getAttackModifierForRoll('attack'));
                const modVal = modForCallout && modForCallout.modifier != null ? modForCallout.modifier : 0;
                const callout = `Attack Roll 1d20: ${roll} (${signed(modVal)}) = ${totalToSend} (${weaponLabel})\n${hit ? 'HIT' : 'MISS'}: ${totalToSend} vs AC ${ac}`;
                addMechanicsCallout(callout);
                const forcedMiss = (roll === 1);
                const isHit = !forcedMiss && hit;

                // Rules engine: on a hit, prompt the player to roll damage (same UI as before), but stash the
                // attack context so the damage submission composes a single combined user message — no separate
                // GM round-trip between attack and damage. On a miss, send the miss to the GM immediately.
                if (isHit && enc && weaponObj) {
                    const isCrit = roll === 20;
                    const mon = resolveMonster(enc.monster_ref);
                    const encName = enc.name || (mon && mon.name) || 'Enemy';
                    gameState.pendingAttackResolution = {
                        encounterId: enc.id,
                        encounterName: encName,
                        attackTotal: totalToSend,
                        attackAC: ac,
                        isCrit
                    };
                    // d20 tracking is what triggers the crit path in the damage branch; keep it set.
                    gameState.lastD20Natural = roll;
                    gameState.lastRollWasAttack = true;
                    // Show the damage prompt directly; the player's damage click will then produce the combined GM message.
                    showDiceSection('Roll Damage', 'Damage');
                    return;
                } else if (!isHit) {
                    autoResolvedMessage = `I attacked. Attack ${totalToSend} vs AC ${ac} — MISS. Narrate the miss; do not request a damage roll.`;
                }
            } else if (rollType === 'damage' && (ctx.type === 'weapon' || ctx.type === 'custom')) {
                const w = ctx.type === 'weapon' ? getEquippedWeaponDamage() : null;
                const weaponObj = ctx.type === 'weapon' ? getReadiedWeaponObject() : null;
                const damageType = (weaponObj && weaponObj.damage_type) ? weaponObj.damage_type : (ctx.type === 'custom' ? '' : 'slashing');
                const diceExpr = w ? (w.count === 1 ? `1d${w.sides}` : `${w.count}d${w.sides}`) : (ctx.label || '');
                const modVal = w ? w.modifier : (ctx.modifier || 0);
                const isCritDmg = options.isCriticalHit && ctx.type === 'weapon';
                const diceNatural = isCritDmg ? roll * 2 : roll;
                let hpLine = '';
                // Only apply damage to encounter for weapon rolls (not custom e.g. healing)
                let defeatedEncForReward = null; // used after damage callout so XP/treasure callout comes second
                if (ctx.type === 'weapon') {
                    const enc = getFirstActiveEncounterInCurrentRoom();
                    if (enc) {
                        const hpBefore = getEncounterHP(enc).current;
                        gameState.damageToEncounters[enc.id] = (gameState.damageToEncounters[enc.id] || 0) + totalToSend;
                        gameState.inCombat = true;
                        gameState.mode = 'combat';
                        const hpInfo = getEncounterHP(enc);
                        const mon = resolveMonster(enc.monster_ref);
                        hpLine = `\n${enc.name || (mon && mon.name) || 'Enemy'}: HP ${Math.max(0, hpInfo.current)}/${hpInfo.max}`;
                        const room = gameData.module && gameData.module.rooms && gameData.module.rooms[gameState.currentRoom];
                        if (room && room.encounters && room.encounters.every(e => getEncounterHP(e).defeated)) {
                            gameState.inCombat = false;
                            gameState.mode = 'exploration';
                            gameState.lastCombatRoom = gameState.currentRoom;
                        }
                        updateCharacterDisplay();
                        if (hpBefore > 0 && hpInfo.defeated && enc.on_death) defeatedEncForReward = enc;
                    }
                }
                const typeSuffix = damageType ? ` (${damageType})` : '';
                const callout = `Damage Roll ${diceExpr}: ${diceNatural} (${signed(modVal)}) = ${totalToSend}${typeSuffix}${hpLine}`;
                addMechanicsCallout(callout);
                // XP and treasure callout always after damage callout (Section 2.4)
                if (defeatedEncForReward) {
                    const enc = defeatedEncForReward;
                    const xp = enc.on_death.xp_award != null ? enc.on_death.xp_award : 0;
                    let goldAmount = 0;
                    if (enc.on_death.treasure && Array.isArray(enc.on_death.treasure)) {
                        for (const t of enc.on_death.treasure) {
                            if ((t.item || '').toLowerCase() === 'gold') {
                                goldAmount += typeof t.quantity === 'number' ? t.quantity : parseInt(t.quantity, 10) || 0;
                            } else {
                                addToInventory(t.item || 'Item', t.quantity || 1);
                            }
                        }
                    }
                    if (goldAmount > 0) addToInventory('Gold', goldAmount);
                    if (xp > 0) addXP(xp);
                    const charName = gameState.character && gameState.character.name ? gameState.character.name : 'The character';
                    const xpTreasureLine = goldAmount > 0
                        ? `${charName} gains ${xp} XP and discovers ${goldAmount} gold!`
                        : `${charName} gains ${xp} XP!`;
                    addMechanicsCallout(xpTreasureLine);
                }
                saveGame();

                // Rules engine: if this damage roll was chained from an auto-resolved attack hit,
                // compose a combined user message so the GM narrates the full HIT+damage outcome in one turn.
                if (ctx.type === 'weapon' && gameState.pendingAttackResolution) {
                    const atk = gameState.pendingAttackResolution;
                    const enc = getFirstActiveEncounterInCurrentRoom()
                        || (gameData.module && gameData.module.rooms && gameData.module.rooms[gameState.currentRoom]
                            && (gameData.module.rooms[gameState.currentRoom].encounters || []).find(e => e.id === atk.encounterId));
                    const hpInfo = enc ? getEncounterHP(enc) : null;
                    const status = hpInfo && hpInfo.defeated
                        ? `${atk.encounterName} is defeated`
                        : hpInfo
                            ? `${atk.encounterName} is still standing (${hpInfo.current}/${hpInfo.max} HP)`
                            : `${atk.encounterName}`;
                    const critNote = atk.isCrit ? ' (critical hit)' : '';
                    autoResolvedMessage = `I attacked ${atk.encounterName}. Attack ${atk.attackTotal} vs AC ${atk.attackAC} — HIT${critNote} for ${totalToSend} damage. ${status}. The app has resolved the attack and applied damage; narrate the outcome and, if any enemy remains, proceed to the monster's turn.`;
                    gameState.pendingAttackResolution = null;
                }
            } else if (rollType === 'ability' && ctx.type !== 'weapon') {
                const abilityInfo = ctx.ability ? getAbilityModifierForRoll(ctx.ability) : null;
                const abLabel = (abilityInfo && abilityInfo.label) ? abilityInfo.label.replace(/\s*\(.*\)/, '').toUpperCase().slice(0, 3) : 'CHK';
                const modVal = abilityInfo && abilityInfo.modifier != null ? abilityInfo.modifier : 0;
                const callout = `Ability Roll 1d20: ${roll} (${signed(modVal)}) = ${totalToSend} (${abLabel})\nResult: ${totalToSend} (compare to DC in narrative)`;
                addMechanicsCallout(callout);
            }
            
            // Mechanics callouts are sufficient; do not duplicate with system-message for attack/damage/ability
            const addedCallout = rollType === 'attack' || rollType === 'damage' || rollType === 'ability';
            if (!addedCallout) addSystemMessage(message);
            hideDiceSection();
            
            const rollMessage = autoResolvedMessage || `I rolled a ${totalToSend != null ? totalToSend : roll}.${rollMessageSuffix}`;
            if (rollType === 'damage' && ctx.type === 'weapon') gameState.lastUserMessageWasDiceRoll = true; // skip parsing monster damage from GM narrative (we applied it from callout)
            if (autoResolvedMessage) {
                // Attack auto-resolved (hit or miss): prompt uses 'resolved' branch — narrate, then monster turn.
                gameState.lastUserRollType = 'resolved';
                gameState.lastUserMessageWasDiceRoll = true;
            } else if (rollType === 'attack' || rollType === 'damage' || rollType === 'ability') {
                gameState.lastUserRollType = rollType; // so next GM prompt can enforce combat step
            }
            gameState.conversationHistory.push({
                role: "user",
                content: rollMessage
            });

            callAIGM();
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        
        function disableInput(disabled) {
            const input = document.getElementById('playerInput');
            input.disabled = disabled;
            if (!disabled) input.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitAction();
            }
        }

        function handleInputKeyDown(event) {
            if (event.key !== 'ArrowUp' && event.key !== 'ArrowDown') return;
            const history = gameState.commandHistory;
            if (!history.length) return;
            const input = document.getElementById('playerInput');
            if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (gameState.commandHistoryIndex === -1) {
                    gameState.commandHistoryDraft = input.value;
                    gameState.commandHistoryIndex = 0;
                } else if (gameState.commandHistoryIndex < history.length - 1) {
                    gameState.commandHistoryIndex += 1;
                }
                input.value = history[gameState.commandHistoryIndex];
            } else {
                event.preventDefault();
                if (gameState.commandHistoryIndex <= 0) {
                    gameState.commandHistoryIndex = -1;
                    input.value = gameState.commandHistoryDraft;
                } else {
                    gameState.commandHistoryIndex -= 1;
                    input.value = history[gameState.commandHistoryIndex];
                }
            }
        }

        function submitAction() {
            const input = document.getElementById('playerInput');
            const action = input.value.trim();
            
            if (!action || gameState.waitingForRoll) return;
            
            gameState.lastCombatRoom = null; // clear lingering monster panel when player takes another action
            tryParseWeaponAway(action);
            tryParseWeaponSwitch(action);
            tryParseArmorState(action);
            tryParseRetreat(action);
            gameState.torchUseParsedThisTurn = false; // reset each turn
            tryParsePackItemUse(action, true); // parse player's declared actions (e.g. "I pull out my torch and light it")
            
            addPlayerAction(action);
            input.value = '';
            gameState.commandHistoryIndex = -1;
            gameState.commandHistoryDraft = '';
            if (gameState.commandHistory[0] !== action) {
                gameState.commandHistory.unshift(action);
                if (gameState.commandHistory.length > 50) gameState.commandHistory.pop();
            }
            
            gameState.lastUserRollType = null; // player is taking a new action (not responding to a roll)
            gameState.conversationHistory.push({
                role: "user",
                content: action
            });
            
            callAIGM();
        }

        // ============================================
        // CONVERSATION HISTORY MANAGEMENT
        // ============================================
        
        function pruneConversationHistory() {
            if (gameState.conversationHistory.length > CONFIG.MAX_HISTORY_TURNS) {
                debugLog('HISTORY', `Pruning conversation history (${gameState.conversationHistory.length} turns)`);
                const intro = gameState.conversationHistory.slice(0, 2);
                const recent = gameState.conversationHistory.slice(-(CONFIG.MAX_HISTORY_TURNS - 2));
                gameState.conversationHistory = [...intro, ...recent];
                debugLog('HISTORY', `History pruned to ${gameState.conversationHistory.length} turns`);
            }
        }

        // ============================================
        // AI GM INTEGRATION
        // ============================================
        
        async function callAIGM() {
            disableInput(true);
            const loader = addLoadingIndicator();
            
            // Prune history before making call
            pruneConversationHistory();
            
            try {
                const systemPrompt = buildSystemPrompt();
                if (gameState.pendingLevelUpAck) gameState.pendingLevelUpAck = null;
                const messages = [...gameState.conversationHistory];
                
                debugLog('AI', 'Calling AI GM', { 
                    historyLength: messages.length,
                    currentRoom: gameState.currentRoom 
                });
                
                const response = await fetch(CONFIG.API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        max_tokens: CONFIG.MAX_TOKENS,
                        system: systemPrompt,
                        messages: messages,
                        stream: !!CONFIG.STREAM
                    })
                });

                if (!response.ok) {
                    const responseText = await response.text();
                    let detail = responseText;
                    try {
                        const err = JSON.parse(responseText);
                        detail = err.error?.message || err.message || (err.error && typeof err.error === 'string' ? err.error : responseText);
                    } catch (e) { /* use responseText as detail */ }
                    throw new Error(`API error: ${response.status} - ${detail}`);
                }

                let aiResponse;
                const contentType = response.headers.get('content-type') || '';
                if (CONFIG.STREAM && contentType.includes('text/event-stream')) {
                    aiResponse = await readAnthropicStream(response);
                } else {
                    const data = await response.json();
                    aiResponse = data.content[0].text;
                }
                removeLoadingIndicator();
                removeStreamingNarration();

                debugLog('AI', 'Received AI response', { length: aiResponse.length });

                gameState.conversationHistory.push({
                    role: "assistant",
                    content: aiResponse
                });

                processAIResponse(aiResponse);
                
            } catch (error) {
                removeLoadingIndicator();
                removeStreamingNarration();
                console.error('AI GM Error:', error);
                
                let errorMsg = 'Unknown error';
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = 'Server not running. Start server.js first!';
                } else if (error.message.includes('API error: 401')) {
                    errorMsg = 'Invalid API key in server.js';
                } else if (error.message.includes('API error: 429')) {
                    errorMsg = 'Rate limit exceeded. Wait a moment.';
                } else if (error.message.includes('API error: 400')) {
                    errorMsg = error.message.replace('API error: 400 - ', 'Bad request (400): ');
                } else {
                    errorMsg = error.message;
                }
                
                addErrorMessage(errorMsg);
                disableInput(false);
            }
        }

        function buildSystemPrompt() {
            const char = gameState.character;
            const room = gameData.module.rooms[gameState.currentRoom];
            // Keep mode in sync with inCombat when not explicitly in travel
            if (gameState.inCombat) gameState.mode = 'combat';
            else if (gameState.mode !== 'travel') gameState.mode = 'exploration';
            
            // Defensive check
            if (!char || !char.abilities) {
                console.error('Character not initialized properly!', gameState.character);
                throw new Error('Character data missing');
            }
            
            debugLog('PROMPT', 'Building system prompt', {
                character: char.name,
                room: room.name,
                abilities: Object.keys(char.abilities)
            });
            
            // Build encounter info if present
            let encounterInfo = '';
            if (room.encounters && room.encounters.length > 0) {
                encounterInfo = '\n\n## Active Encounters — use these EXACT stats; current HP is tracked by the app (monster is DEFEATED at 0 HP; you MUST narrate death and must NOT have it act further):\n';
                for (const enc of room.encounters) {
                    encounterInfo += buildEncounterDescription(enc, true) + '\n';
                }
            } else {
                encounterInfo = '\n\n## Active Encounters: NONE — there are no monsters in this room. Do not add or invent any monsters.\n';
            }
            
            const hasActiveEncounter = getFirstActiveEncounterInCurrentRoom() != null;
            const lastRoll = gameState.lastUserRollType;
            let combatFlowBlock = '';
            if (hasActiveEncounter) {
                let currentStep;
                if (lastRoll === 'resolved') {
                    currentStep = 'The player\'s attack was **fully resolved by the app**. The player message states the outcome (HIT + damage, or MISS). **Do NOT request any dice roll.** Narrate the outcome in flavor only, obeying the HIT/MISS stated. If the monster is defeated, narrate its death. If any enemy remains, begin the monster\'s turn in the same response with one sentence of flavor followed by **[MONSTER_ATTACK]**. If all enemies are defeated, include [COMBAT: off].';
                } else if (lastRoll === 'ability') {
                    currentStep = 'The player just submitted an **ability/skill roll**. Respond to the check in flavor, based on the total vs the relevant DC. Then continue the scene — if an enemy still acts, begin the monster\'s turn with flavor + **[MONSTER_ATTACK]**.';
                } else {
                    currentStep = 'The player sent a **free-form action** (no roll). If they are attacking, respond with flavor and **[ROLL_REQUEST: Attack]** — nothing else. If they did something else (dodge, search, speak, etc.), respond to that. Do not take the monster\'s turn unless the player\'s action clearly ends their turn (e.g. "I wait").';
                }
                combatFlowBlock = `

## COMBAT FLOW — CURRENT STEP
${currentStep}
`;
            }
            
            const layoutBlock = buildModuleLayoutForPrompt();
            const rulesetBlock = buildRulesetBlockForPrompt();
            const settingBlock = buildSettingBlockForPrompt();
            const mode = gameState.mode || 'exploration';
            let modeBlock = '';
            if (mode === 'exploration') {
                modeBlock = `
## CURRENT MODE: EXPLORATION
You have high freedom to improvise within the module and setting. Call for ability/skill checks when appropriate; honor roll results. Use the module layout and features strictly—do not add rooms or exits. Brief respites (short rest, a few hours) may be described in brief. For locations with distinct maps, adhere to the module description closely and improvise only minor details.
`;
            } else if (mode === 'travel') {
                modeBlock = `
## CURRENT MODE: TRAVEL
The player is traveling a long distance. Ask or infer their plan or destination. Narrate the journey in summary, not moment-by-moment. Respect any travel rules from the setting, rules, or module. When they arrive at the destination, include [MODE: exploration] in your response so the app returns to exploration.
`;
            }
            // Build values for {{PLACEHOLDER}} substitution into the loaded template.
            const weaponSources = gameData.character && gameData.character.equipment
                ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                : [];
            const weaponsStr = weaponSources.filter(w => w.damage).map(w => {
                const info = getWeaponTypeInfo(w);
                const typeStr = info.type === 'ranged' && info.range ? `ranged ${info.range}` : 'melee';
                return `${w.name} (${w.damage} ${w.damage_type}, ${typeStr})`;
            }).join('; ') || 'none';

            const conditionsStr = char.conditions && char.conditions.length
                ? char.conditions.map(c => {
                    const info = getConditionInfo(c.id || c.name || c);
                    return `${info.name} (${info.effect_summary})`;
                }).join('; ')
                : 'none';

            const abilityChecks = gameData.rules && gameData.rules.core_mechanics && gameData.rules.core_mechanics.ability_checks;
            const autoSuccess = abilityChecks ? abilityChecks.auto_success : 'tasks within normal capability';
            const autoFail = abilityChecks ? abilityChecks.auto_failure : 'impossible or lacking resources';
            const dcScale = abilityChecks && abilityChecks.dc_scale;
            const dcsStr = (dcScale && typeof dcScale === 'object')
                ? Object.entries(dcScale).map(([k, v]) => `${k} ${v}`).join(', ')
                : 'Easy 10, Medium 15, Hard 20';

            const levelUpBlock = gameState.pendingLevelUpAck ? `
## LEVEL-UP — ACKNOWLEDGE IN YOUR RESPONSE
The player just reached **level ${gameState.pendingLevelUpAck.level}** and gained **${gameState.pendingLevelUpAck.hpGain} max HP**. In your response you MUST:
1. Congratulate the player on leveling up.
2. Briefly explain what improved: they are now level ${gameState.pendingLevelUpAck.level}, and their max HP increased by ${gameState.pendingLevelUpAck.hpGain} (from the level-up roll + CON).
Then continue with the scene as normal. (This reminder is one-time only.)
` : '';

            const ac = getEffectiveAC();
            const values = {
                MODULE_TITLE: gameData.module.module.title,
                MODE_TITLE: mode.charAt(0).toUpperCase() + mode.slice(1),
                SETTING_BLOCK: settingBlock,
                MODE_BLOCK: modeBlock,
                RULESET_BLOCK: rulesetBlock || 'Use standard OSR-style mechanics. Attack: 1d20+mod+prof vs AC. Damage: weapon die + mod. DCs: Easy 10, Medium 15, Hard 20.',
                LAYOUT_BLOCK: layoutBlock,
                COMBAT_FLOW_BLOCK: combatFlowBlock,
                LEVEL_UP_BLOCK: levelUpBlock,
                ROOM_NAME: room.name,
                ROOM_ID: gameState.currentRoom,
                ROOM_DESCRIPTION: room.description,
                CHAR_NAME: char.name,
                CHAR_CLASS: char.class,
                CHAR_LEVEL: char.level,
                HP: char.hp,
                MAX_HP: char.maxHp,
                AC: ac,
                AC_NOTE: !gameState.armorEquipped ? '; armor is not worn' : '',
                ABILITY_MODS: `STR +${char.abilities.str.modifier} | DEX +${char.abilities.dex.modifier} | CON +${char.abilities.con.modifier} | INT +${char.abilities.int.modifier} | WIS +${char.abilities.wis.modifier} | CHA +${char.abilities.cha.modifier}`,
                WEAPONS: weaponsStr,
                READIED_WEAPON: gameState.readiedWeaponName || 'none',
                SKILLS: Object.entries(char.skills).map(([k, v]) => `${k} +${v}`).join(', '),
                CONDITIONS: conditionsStr,
                ENCOUNTER_INFO: encounterInfo,
                AUTO_SUCCESS: autoSuccess,
                AUTO_FAIL: autoFail,
                DCS: dcsStr
            };

            if (!SYSTEM_PROMPT_TEMPLATE) {
                throw new Error('System prompt template not loaded');
            }
            let out = SYSTEM_PROMPT_TEMPLATE;
            for (const [key, val] of Object.entries(values)) {
                out = out.split(`{{${key}}}`).join(val == null ? '' : String(val));
            }
            return out;
        }

        function processAIResponse(response) {
            debugLog('AI', 'Processing AI response');
            const previousRoom = gameState.currentRoom;
            const previousCombat = gameState.inCombat;
            
            // Parse optional scene directives and strip control tags from visible text.
            let scene = parseSceneDirectives(response);
            let monsterDamageAlreadyApplied = false;
            /** Deferred so display order is: GM block → callouts → outcome line (desired combat flow). */
            const pendingMonsterCallouts = [];
            let pendingMonsterOutcomeLine = null;

            // Monster attack: compute rolls and strip tags; defer adding callouts until after GM narration.
            if (/\[MONSTER_ATTACK\]/i.test(scene.cleanText)) {
                const enc = getFirstActiveEncounterInCurrentRoom();
                const monsterName = enc ? (enc.name || (resolveMonster(enc.monster_ref) && resolveMonster(enc.monster_ref).name) || 'Monster') : 'Monster';
                const attackInfo = getMonsterAttackInfoForCurrentRoom();
                const bonus = attackInfo ? attackInfo.bonus : 0;
                const weaponName = attackInfo ? attackInfo.weaponName : 'attack';
                const rangeLabel = (attackInfo && attackInfo.range && attackInfo.range !== 'melee') ? 'ranged' : 'melee';
                const d20 = Math.floor(Math.random() * 20) + 1;
                const total = d20 + bonus;
                const playerAC = getEffectiveAC();
                const hit = total >= playerAC;
                pendingMonsterCallouts.push(`Attack Roll 1d20: ${d20} (${bonus >= 0 ? '+' : ''}${bonus}) = ${total} (${weaponName}/${rangeLabel})`);
                pendingMonsterCallouts.push(hit ? `HIT: ${total} vs AC ${playerAC}` : `MISS: ${total} vs AC ${playerAC}`);
                if (hit) {
                    let formula = getMonsterDamageFormulaForCurrentRoom();
                    if (!formula) formula = getMonsterDamageFormulaFromAnyRoom();
                    if (!formula) formula = '1d6';
                    const dmgResult = rollDiceFormula(formula);
                    pendingMonsterCallouts.push(`${monsterName}: ${dmgResult.breakdown} (to you)`);
                    modifyHP(-dmgResult.total);
                    monsterDamageAlreadyApplied = true;
                    pendingMonsterOutcomeLine = 'The blow lands and wounds you. Your turn — what do you do?';
                    debugLog('PARSE', `Monster attack hit; damage: ${dmgResult.breakdown}`);
                } else {
                    pendingMonsterOutcomeLine = 'The attack misses. Your turn — what do you do?';
                }
                scene.cleanText = scene.cleanText.replace(/\[MONSTER_ATTACK\]/gi, '').replace(/\s+\./g, '.').replace(/\.\.+/g, '.').trim();
                if (monsterDamageAlreadyApplied) {
                    scene.cleanText = scene.cleanText
                        .replace(/\s*for\s+\[MONSTER_DAMAGE\]\s*damage\.?/gi, '.')
                        .replace(/\[MONSTER_DAMAGE\]/gi, '')
                        .replace(/\s+\./g, '.')
                        .replace(/\.\.+/g, '.')
                        .trim();
                }
            }

            // Monster damage (when GM uses [MONSTER_DAMAGE] without [MONSTER_ATTACK]): compute and strip; defer callout.
            if (!monsterDamageAlreadyApplied && /\[MONSTER_DAMAGE\]/i.test(scene.cleanText)) {
                let formula = getMonsterDamageFormulaForCurrentRoom();
                if (!formula) formula = getMonsterDamageFormulaFromAnyRoom();
                if (!formula) {
                    formula = '1d6';
                    debugLog('PARSE', 'No monster damage formula found; using fallback 1d6');
                }
                const result = rollDiceFormula(formula);
                const enc = getFirstActiveEncounterInCurrentRoom();
                const monsterName = enc ? (enc.name || (resolveMonster(enc.monster_ref) && resolveMonster(enc.monster_ref).name) || 'Monster') : 'Monster';
                pendingMonsterCallouts.push(`${monsterName}: ${result.breakdown} (to you)`);
                modifyHP(-result.total);
                scene.cleanText = scene.cleanText
                    .replace(/\s*for\s+\[MONSTER_DAMAGE\]\s*damage\.?/gi, '.')
                    .replace(/\[MONSTER_DAMAGE\]/gi, '')
                    .replace(/\s+\./g, '.')
                    .replace(/\.\.+/g, '.')
                    .trim();
                debugLog('PARSE', `Monster damage roll: ${result.breakdown}`);
            }
            const displayResponse = scene.cleanText
                .replace(/\[COMBAT:\s*(on|off|true|false|yes|no)\]/gi, '')
                .replace(/\[MODE:\s*(travel|exploration)\]/gi, '')
                .replace(/\[(?:DAMAGE_TO_PLAYER|HEAL_PLAYER|DAMAGE_TO_MONSTER|MONSTER_DEFEATED|MONSTER_FLED):[^\]]*\]/gi, '')
                .trim();
            
            parseStateChanges(scene.cleanText);
            saveGame();
            
            const rollRequestPattern = /\[ROLL_REQUEST:\s*([^\]]+)\]/i;
            const match = displayResponse.match(rollRequestPattern);
            
            if (gameState.isDead) {
                const textToShow = displayResponse.replace(rollRequestPattern, '').trim() || displayResponse.trim();
                showDeathOverlay(textToShow);
                disableInput(true);
            } else if (match) {
                const ability = match[1].trim();
                const abilityLower = ability.toLowerCase();
                if (abilityLower === 'damage' || abilityLower.includes('attack')) {
                    gameState.inCombat = true;
                    gameState.mode = 'combat';
                    ensureCombatRoomHasEncounters();
                    if (abilityLower === 'damage' && !gameState.readiedWeaponName) {
                        const sources = gameData.character && gameData.character.equipment
                            ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                            : [];
                        const firstWeapon = sources.find(w => w.damage);
                        if (firstWeapon) {
                            gameState.readiedWeaponName = firstWeapon.name;
                            updateCharacterDisplay();
                            debugLog('PARSE', `Readied weapon (default for damage roll): ${firstWeapon.name}`);
                        }
                    }
                }
                const formattedResponse = displayResponse.replace(rollRequestPattern, '').trim();
                if (formattedResponse) addNarration(formattedResponse);
                showDiceSection(`Roll ${ability}:`, ability);
            } else {
                // Desired order: GM block first, then monster callouts, then outcome line.
                if (displayResponse) addNarration(displayResponse);
                for (const line of pendingMonsterCallouts) addMechanicsCallout(line);
                if (pendingMonsterOutcomeLine) addNarration(pendingMonsterOutcomeLine);
                disableInput(false);
            }
        }
        
        /** Parse "goblin takes 5 damage" / "hits the goblin for 5" and update tracked monster HP. Checks all rooms so we record damage even if currentRoom was wrong. */
        function parseMonsterDamage(text) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return;
            if (!gameState.damageToEncounters) gameState.damageToEncounters = {};
            let roomWithUpdate = null;
            for (const [roomId, room] of Object.entries(rooms)) {
                if (!room || !room.encounters || room.encounters.length === 0) continue;
                for (const enc of room.encounters) {
                    const monster = resolveMonster(enc.monster_ref);
                    if (!monster) continue;
                    // Match encounter name, monster name, and first word of monster (e.g. "goblin" from "Goblin Warrior") so "the goblin takes 8 damage" parses.
                    const nameList = [enc.name, monster.name].filter(Boolean);
                    const firstWord = (monster.name || '').split(/\s+/)[0];
                    if (firstWord && !nameList.includes(firstWord)) nameList.push(firstWord);
                    // When using a generic short name (first word), only match in current room so we don't apply damage to same-named monsters in other rooms.
                    if (firstWord && nameList.includes(firstWord) && roomId !== gameState.currentRoom) continue;
                    const escapedNames = nameList.map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
                    if (!escapedNames) continue;
                    const patterns = [
                        new RegExp(`(?:the\\s+)?(?:${escapedNames})\\s+takes\\s+(\\d+)\\s+(?:damage|HP)?`, 'gi'),
                        new RegExp(`(?:hits?|strikes?|deals?)\\s+(?:the\\s+)?(?:${escapedNames})\\s+for\\s+(\\d+)\\s*(?:damage|HP)?`, 'gi'),
                        new RegExp(`(\\d+)\\s+(?:damage|HP)\\s+(?:to|against)\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi'),
                        new RegExp(`(?:deal|deals?|dealt)\\s+(?:the\\s+)?(?:${escapedNames})\\s+(\\d+)\\s+(?:damage|HP)?`, 'gi'),
                        new RegExp(`(?:deal|deals?|dealt)\\s+(\\d+)\\s+(?:damage|HP)\\s+(?:to|against)\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi')
                    ];
                    for (const re of patterns) {
                        let m;
                        re.lastIndex = 0;
                        while ((m = re.exec(text)) !== null) {
                            const damage = parseInt(m[1], 10);
                            gameState.damageToEncounters[enc.id] = (gameState.damageToEncounters[enc.id] || 0) + damage;
                            gameState.inCombat = true;
                            gameState.mode = 'combat';
                            roomWithUpdate = roomId;
                            debugLog('PARSE', `Monster damage: ${enc.name} +${damage} (total: ${gameState.damageToEncounters[enc.id]}/${monster.hp})`);
                        }
                    }
                    // NOTE: Narrative death/flee detection removed — the GM frequently uses dramatic death
                    // language on non-lethal hits (e.g. "collapses" for a blow that leaves 13 HP).
                    // Monster defeat is now driven ONLY by HP math (damage >= monster.hp) or an
                    // explicit [MONSTER_DEFEATED: id] / [MONSTER_FLED: id] tag from the GM.
                    // See parseExplicitStateTags for tag handling.
                }
            }
            if (roomWithUpdate) {
                const room = rooms[roomWithUpdate];
                gameState.currentRoom = roomWithUpdate;
                if (room && room.encounters && room.encounters.length > 0) {
                    const allDefeated = room.encounters.every(enc => getEncounterHP(enc).defeated);
                    if (allDefeated) {
                        gameState.inCombat = false;
                        gameState.mode = 'exploration';
                        gameState.lastCombatRoom = roomWithUpdate;
                        debugLog('PARSE', 'Combat ended: all enemies defeated');
                    } else {
                        // Still in active combat in this room.
                        gameState.inCombat = true;
                        gameState.mode = 'combat';
                    }
                }
            }
        }

        /** Normalize ids/names for robust tag target matching. */
        function normalizeEntityToken(s) {
            return String(s || '').toLowerCase().replace(/[^a-z0-9]+/g, '');
        }

        /** Find encounter by explicit tag token (encounter id/name/monster_ref/monster name). Prefers current room. */
        function findEncounterForStateTag(targetToken) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return null;
            const token = normalizeEntityToken(targetToken);
            if (!token) return null;

            function scanRoom(roomId) {
                const room = rooms[roomId];
                if (!room || !room.encounters) return null;
                for (const enc of room.encounters) {
                    const monster = resolveMonster(enc.monster_ref);
                    const candidates = [
                        enc.id,
                        enc.name,
                        enc.monster_ref,
                        monster && monster.id,
                        monster && monster.name
                    ];
                    if (candidates.some(c => normalizeEntityToken(c) === token)) {
                        return { roomId, room, encounter: enc, monster };
                    }
                }
                return null;
            }

            if (gameState.currentRoom) {
                const cur = scanRoom(gameState.currentRoom);
                if (cur) return cur;
            }
            for (const roomId of Object.keys(rooms)) {
                if (roomId === gameState.currentRoom) continue;
                const hit = scanRoom(roomId);
                if (hit) return hit;
            }
            return null;
        }

        /**
         * Parse explicit state tags (authoritative) and apply directly.
         * Supported tags:
         * - [DAMAGE_TO_PLAYER: 4]
         * - [HEAL_PLAYER: 6]
         * - [DAMAGE_TO_MONSTER: goblin_fighter, 5]
         * - [MONSTER_DEFEATED: goblin_fighter]
         * - [MONSTER_FLED: goblin_scout]
         */
        function parseExplicitStateTags(text) {
            const out = {
                text,
                hasPlayerDamageTag: false,
                hasPlayerHealTag: false,
                hasMonsterDamageTag: false
            };
            if (!text) return out;

            let roomWithUpdate = null;
            let m;

            const dmgPlayerRe = /\[DAMAGE_TO_PLAYER:\s*(\d+)\s*\]/gi;
            while ((m = dmgPlayerRe.exec(text)) !== null) {
                out.hasPlayerDamageTag = true;
                const damage = parseInt(m[1], 10);
                if (damage >= 1 && damage <= 999) {
                    if (!gameState.combatStateFromTag) {
                        gameState.inCombat = true;
                        gameState.mode = 'combat';
                        ensureCombatRoomHasEncounters();
                    }
                    modifyHP(-damage);
                    debugLog('PARSE', `Tag damage TO PLAYER: ${damage}`);
                }
            }

            const healPlayerRe = /\[HEAL_PLAYER:\s*(\d+)\s*\]/gi;
            while ((m = healPlayerRe.exec(text)) !== null) {
                out.hasPlayerHealTag = true;
                const healing = parseInt(m[1], 10);
                if (healing >= 1 && healing <= 999) {
                    modifyHP(healing);
                    debugLog('PARSE', `Tag healing TO PLAYER: ${healing}`);
                }
            }

            const dmgMonsterRe = /\[DAMAGE_TO_MONSTER:\s*([^,\]]+)\s*,\s*(\d+)\s*\]/gi;
            while ((m = dmgMonsterRe.exec(text)) !== null) {
                out.hasMonsterDamageTag = true;
                const target = m[1].trim();
                const damage = parseInt(m[2], 10);
                if (!(damage >= 1 && damage <= 999)) continue;
                const found = findEncounterForStateTag(target);
                if (!found) {
                    debugLog('PARSE', `Tag damage to monster ignored (no target match): ${target}`);
                    continue;
                }
                gameState.damageToEncounters[found.encounter.id] = (gameState.damageToEncounters[found.encounter.id] || 0) + damage;
                gameState.inCombat = true;
                gameState.mode = 'combat';
                roomWithUpdate = found.roomId;
                debugLog('PARSE', `Tag damage TO MONSTER: ${found.encounter.name} +${damage}`);
            }

            const defeatedMonsterRe = /\[MONSTER_DEFEATED:\s*([^\]]+)\s*\]/gi;
            while ((m = defeatedMonsterRe.exec(text)) !== null) {
                out.hasMonsterDamageTag = true;
                const target = m[1].trim();
                const found = findEncounterForStateTag(target);
                if (!found) {
                    debugLog('PARSE', `Tag monster defeated ignored (no target match): ${target}`);
                    continue;
                }
                const hp = getEncounterHP(found.encounter);
                const currentDamage = gameState.damageToEncounters[found.encounter.id] || 0;
                gameState.damageToEncounters[found.encounter.id] = Math.max(currentDamage, hp.max);
                gameState.inCombat = true;
                gameState.mode = 'combat';
                roomWithUpdate = found.roomId;
                debugLog('PARSE', `Tag monster defeated: ${found.encounter.name} (set to 0/${hp.max})`);
            }

            const fledMonsterRe = /\[MONSTER_FLED:\s*([^\]]+)\s*\]/gi;
            while ((m = fledMonsterRe.exec(text)) !== null) {
                out.hasMonsterDamageTag = true;
                const target = m[1].trim();
                const found = findEncounterForStateTag(target);
                if (!found) {
                    debugLog('PARSE', `Tag monster fled ignored (no target match): ${target}`);
                    continue;
                }
                const hp = getEncounterHP(found.encounter);
                const currentDamage = gameState.damageToEncounters[found.encounter.id] || 0;
                gameState.damageToEncounters[found.encounter.id] = Math.max(currentDamage, hp.max);
                gameState.inCombat = true;
                gameState.mode = 'combat';
                roomWithUpdate = found.roomId;
                debugLog('PARSE', `Tag monster fled (tracked as defeated): ${found.encounter.name} (set to 0/${hp.max})`);
            }

            if (roomWithUpdate) {
                gameState.currentRoom = roomWithUpdate;
                // Do NOT call ensureCombatRoomHasEncounters() here: it would jump to another room with
                // active encounters (e.g. morale_chamber) when this room just ended combat, making Scout/Fighter appear early.
                const room = gameData.module && gameData.module.rooms && gameData.module.rooms[roomWithUpdate];
                if (room && room.encounters && room.encounters.length > 0) {
                    const allDefeated = room.encounters.every(enc => getEncounterHP(enc).defeated);
                    if (allDefeated) {
                        gameState.inCombat = false;
                        gameState.mode = 'exploration';
                        gameState.lastCombatRoom = roomWithUpdate;
                        debugLog('PARSE', 'Combat ended: all enemies defeated (explicit tag)');
                    }
                }
            }

            out.text = text.replace(/\[(?:DAMAGE_TO_PLAYER|HEAL_PLAYER|DAMAGE_TO_MONSTER|MONSTER_DEFEATED|MONSTER_FLED):[^\]]*\]/gi, ' ');
            return out;
        }
        
        /** If narrative indicates the player entered a different room, update currentRoom so combat indicator etc. are correct. */
        function tryParseRoomChange(text) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms || !text) return;
            const t = text.toLowerCase();
            const normalized = t.replace(/\bmoral chamber\b/g, 'morale chamber');
            const movementWord = /\b(?:enter|reach|arrive|step into|are now in|find yourself in|head (?:in)?to|go (?:in)?to)\b/.test(t);
            if (!movementWord) return;
            for (const [roomId, room] of Object.entries(rooms)) {
                if (!room) continue;
                if (roomId === gameState.currentRoom) continue;
                const roomName = (room.name || '').toLowerCase();
                const roomIdPhrase = roomId.replace(/_/g, ' ').toLowerCase();
                if (roomName && normalized.includes(roomName)) {
                    gameState.currentRoom = roomId;
                    updateCharacterDisplay();
                    debugLog('PARSE', `Room changed to: ${roomId} (${room.name})`);
                    return;
                }
                if (roomIdPhrase && normalized.includes(roomIdPhrase)) {
                    gameState.currentRoom = roomId;
                    updateCharacterDisplay();
                    debugLog('PARSE', `Room changed to: ${roomId} (id phrase "${roomIdPhrase}")`);
                    return;
                }
            }
        }
        
        /** Parse [COMBAT: on] and [COMBAT: off] — GM explicitly sets combat state. Takes precedence over heuristics. */
        function tryParseCombatTag(text) {
            if (!text) return;
            const onMatch = text.match(/\[COMBAT:\s*(on|true|yes)\]/i);
            const offMatch = text.match(/\[COMBAT:\s*(off|false|no)\]/i);
            if (onMatch) {
                gameState.inCombat = true;
                gameState.mode = 'combat';
                gameState.combatStateFromTag = true;
                ensureCombatRoomHasEncounters();
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat state: on (GM tag)');
            } else if (offMatch) {
                gameState.inCombat = false;
                gameState.mode = 'exploration';
                gameState.lastCombatRoom = gameState.currentRoom;
                gameState.combatStateFromTag = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat state: off (GM tag)');
            }
        }

        /** Fallback: if GM says combat begins/starts (and no explicit tag), set in-combat. */
        function tryParseCombatBegins(text) {
            if (!text) return;
            if (text.match(/\[COMBAT:\s*(on|off|true|false)\]/i)) return; // GM used tag, skip heuristic
            const t = text.toLowerCase();
            if (/\bcombat\s+(?:begins?|starts?)\b/.test(t) || /\b(?:the\s+)?(?:fight|battle)\s+(?:begins?|starts?|is\s+on)\b/.test(t) || /\b(?:you\s+are\s+)(?:in\s+)?combat\b/.test(t)) {
                gameState.inCombat = true;
                gameState.mode = 'combat';
                ensureCombatRoomHasEncounters();
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat began (GM narrative fallback)');
            }
        }
        
        /** If narrative or player message indicates retreat/flee, end combat. */
        function tryParseRetreat(text) {
            if (!text) return;
            const t = text.toLowerCase();
            const gmNarrative = /\b(?:you\s+)(?:run|retreat|flee|escape|withdraw|manage to|succeed in)\b/.test(t) ||
                /\b(?:you\s+)(?:run|retreat|flee|escape)\s+(?:away|safely|back)/.test(t) ||
                /\b(?:run\s+away|retreat|fled|escape|withdraw)\b.*\b(?:safely|successfully|manage)\b/.test(t);
            const playerDeclares = /\b(?:i\s+)(?:run\s+away|retreat|flee|escape|withdraw|disengage)\b/.test(t) ||
                /\b(?:i'll\s+)(?:run\s+away|retreat|flee|escape)\b/.test(t);
            if (gmNarrative || playerDeclares) {
                gameState.inCombat = false;
                gameState.mode = 'exploration';
                gameState.lastCombatRoom = gameState.currentRoom;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat ended: retreat/flee');
            }
        }
        
        /** If text mentions removing or donning armor, update armorEquipped and AC. */
        function tryParseArmorState(text) {
            const t = text.toLowerCase();
            if (/\b(?:remove|take off|doff|strip off|unequip)\s+(?:your?)?\s*(?:armor|chain mail|mail)\b/i.test(t) ||
                /\b(?:you\s+)?(?:remove|doff)\s+(?:your?)?\s*(?:armor|chain mail)\b/i.test(t)) {
                gameState.armorEquipped = false;
                updateCharacterDisplay();
                debugLog('PARSE', 'Armor removed; AC now unarmored');
            } else if (/\b(?:put on|don|equip|wear)\s+(?:your?)?\s*(?:armor|chain mail|mail)\b/i.test(t) ||
                /\b(?:you\s+)?(?:don|put on)\s+(?:your?)?\s*(?:armor|chain mail)\b/i.test(t)) {
                gameState.armorEquipped = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Armor donned');
            }
        }

        /** Parse [CONDITION: add id] and [CONDITION: remove id]; optionally narrative phrases for known condition ids. */
        function tryParseConditions(text) {
            if (!text) return;
            const ids = getConditionIdsFromRules();
            const tagAdd = /\[CONDITION:\s*add\s+([^\]]+)\]/gi;
            const tagRemove = /\[CONDITION:\s*remove\s+([^\]]+)\]/gi;
            let m;
            while ((m = tagAdd.exec(text)) !== null) {
