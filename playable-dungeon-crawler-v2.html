<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dungeon Crawler - v2 Testing Build</title>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://kit.fontawesome.com/f4b50dbafe.js" crossorigin="anonymous"></script>

    <!-- v1 refactor — module scaffolding (Stage 1a). Each file attaches to a window
         namespace so the main inline script below can call into it as it is filled in
         over later stages. Order matters: base engines first, then UI modules, then
         bootstrap. -->
    <script src="./scripts/rules-engine.js"></script>
    <script src="./scripts/pack-loader.js"></script>
    <script src="./scripts/game-state.js"></script>
    <script src="./scripts/prompt-builder.js"></script>
    <script src="./scripts/response-parser.js"></script>
    <script src="./scripts/llm-proxy.js"></script>
    <script src="./scripts/ui-character.js"></script>
    <script src="./scripts/ui-encounters.js"></script>
    <script src="./scripts/ui-narrative.js"></script>
    <script src="./scripts/ui-features.js"></script>
    <script src="./scripts/ui-hazards.js"></script>
    <script src="./scripts/ui-connections.js"></script>
    <script src="./scripts/ui-dice.js"></script>
    <script src="./scripts/main.js"></script>
</head>
<body>
    <!-- Template placeholders - populated by template loader -->
    <div id="template-loading-overlay"></div>
    <div id="template-debug-panel"></div>
    <div class="app-container" id="app-container"></div>

    <script>
        // ============================================
        // TEMPLATE LOADER
        // ============================================
        
        const TEMPLATES = {
            'loading-overlay': './templates/loading-overlay.html',
            'debug-panel': './templates/debug-panel.html',
            'character-panel': './templates/character-panel.html',
            'narrative-panel': './templates/narrative-panel.html',
            'encounter-panel': './templates/encounter-panel.html'
        };

        const SYSTEM_PROMPT_URL = './ai-gm-system-prompt.md';
        /** GM system prompt template (loaded at startup). Dynamic values filled in by buildSystemPrompt() via {{PLACEHOLDER}} substitution. */
        let SYSTEM_PROMPT_TEMPLATE = '';

        async function loadTemplate(name) {
            const response = await fetch(TEMPLATES[name]);
            if (!response.ok) throw new Error(`Failed to load template: ${name}`);
            return await response.text();
        }

        async function loadAllTemplates() {
            try {
                const [loadingOverlay, characterPanel, narrativePanel, encounterPanel, systemPrompt] = await Promise.all([
                    loadTemplate('loading-overlay'),
                    loadTemplate('character-panel'),
                    loadTemplate('narrative-panel'),
                    loadTemplate('encounter-panel'),
                    fetch(SYSTEM_PROMPT_URL).then(r => {
                        if (!r.ok) throw new Error('Failed to load GM system prompt');
                        return r.text();
                    })
                ]);

                document.getElementById('template-loading-overlay').outerHTML = loadingOverlay;
                // Debug panel removed for Phase 2; re-enable later when enhanced (was: debug-panel template)

                const appContainer = document.getElementById('app-container');
                appContainer.innerHTML = characterPanel + narrativePanel + encounterPanel;

                SYSTEM_PROMPT_TEMPLATE = systemPrompt;
                window.SYSTEM_PROMPT_TEMPLATE = systemPrompt;  // expose for extracted prompt-builder

                return true;
            } catch (error) {
                console.error('Template loading failed:', error);
                document.body.innerHTML = `
                    <div style="color: #e8dcc4; background: #1a1410; padding: 40px; text-align: center; min-height: 100vh;">
                        <h2 style="color: #c85050;">Template Loading Error</h2>
                        <p style="margin-top: 20px;">Failed to load UI templates. Please ensure template files exist in ./templates/</p>
                        <p style="margin-top: 10px; color: #8a7a6a;">${error.message}</p>
                    </div>
                `;
                return false;
            }
        }
    </script>

    <script>
        // ============================================
        // CONFIGURATION & DEBUG
        // ============================================
        
        const CONFIG = {
            DEBUG_MODE: true,
            /** Game Pack manifest: references setting, rules, bestiary, adventure_module, items, character. */
            GAME_PACK: './game_pack_village_three_knots.json',
            API_ENDPOINT: '/api/messages',
            /** Stream GM responses via SSE; set false to fall back to single-shot JSON. */
            STREAM: true,
            /** GM model; overridden by server from /api/config (system-level AI_MODEL). */
            MODEL: 'claude-sonnet-4-5',
            /** Max tokens per GM reply. Lower = less output cost. Easily configurable via Debug Panel → API / Usage. */
            MAX_TOKENS: 1200,
            /** Conversation turns sent with each request. Lower = less input cost. Easily configurable via Debug Panel → API / Usage. */
            MAX_HISTORY_TURNS: 10
        };
        // Stage 1e: expose to extracted modules.
        window.CONFIG = CONFIG;

        /** Condition id (lowercase) -> Font Awesome icon classes. Add/change icons here for each condition from rules.combat.conditions. */
        const CONDITION_ICONS = {
            poisoned: 'fa-sharp-duotone fa-light fa-flask-round-poison',
            blessed: 'fa-sharp-duotone fa-light fa-sparkles',
            stunned: 'fa-sharp-duotone fa-light fa-ban',
            wounded: 'fa-sharp-duotone fa-light fa-bandage',
            exhausted: 'fa-sharp-duotone fa-light fa-face-weary'
        };
        const CONDITION_ICON_DEFAULT = 'fa-sharp-duotone fa-light fa-circle-question';
        // Stage 1e-v: expose to ui-character.js
        window.CONDITION_ICONS = CONDITION_ICONS;
        window.CONDITION_ICON_DEFAULT = CONDITION_ICON_DEFAULT;

        /** Sync Debug Panel API/Usage inputs with CONFIG and update CONFIG when user changes them. */
        function initApiUsageConfig() {
            const maxTokensEl = document.getElementById('configMaxTokens');
            const historyTurnsEl = document.getElementById('configHistoryTurns');
            if (!maxTokensEl || !historyTurnsEl) return;
            maxTokensEl.value = CONFIG.MAX_TOKENS;
            historyTurnsEl.value = CONFIG.MAX_HISTORY_TURNS;
            function applyMaxTokens() {
                const v = parseInt(maxTokensEl.value, 10);
                if (!isNaN(v)) {
                    CONFIG.MAX_TOKENS = Math.max(500, Math.min(8000, v));
                    maxTokensEl.value = CONFIG.MAX_TOKENS;
                }
            }
            function applyHistoryTurns() {
                const v = parseInt(historyTurnsEl.value, 10);
                if (!isNaN(v)) {
                    CONFIG.MAX_HISTORY_TURNS = Math.max(2, Math.min(50, v));
                    historyTurnsEl.value = CONFIG.MAX_HISTORY_TURNS;
                }
            }
            maxTokensEl.addEventListener('change', applyMaxTokens);
            maxTokensEl.addEventListener('blur', applyMaxTokens);
            historyTurnsEl.addEventListener('change', applyHistoryTurns);
            historyTurnsEl.addEventListener('blur', applyHistoryTurns);
        }

        // Debug logging function
        function debugLog(category, message, data = null) {
            if (!CONFIG.DEBUG_MODE) return;
            
            const timestamp = new Date().toLocaleTimeString();
            const prefix = `[${timestamp}] [${category}]`;
            
            console.log(prefix, message, data || '');
            
            // Update debug panel parse log if it's a parse event
            if (category === 'PARSE') {
                const logDiv = document.getElementById('debugParseLog');
                if (logDiv) {
                    const entry = document.createElement('div');
                    entry.textContent = `${timestamp} ${message}`;
                    entry.style.marginBottom = '2px';
                    logDiv.insertBefore(entry, logDiv.firstChild);
                    
                    // Keep only last 20 entries
                    while (logDiv.children.length > 20) {
                        logDiv.removeChild(logDiv.lastChild);
                    }
                }
            }
        }

        // ============================================
        // GAME DATA & STATE
        // ============================================
        
        const gameData = {
            character: null,
            setting: null,
            rules: null,
            bestiary: null,
            module: null
        };
        // Stage 1e: expose to extracted modules. Same object, two access paths
        // (lexical `gameData` for inline code, `window.gameData` for scripts/*.js).
        window.gameData = gameData;

        const gameState = {
            character: null,
            currentRoom: null,
            triggeredEvents: [],
            conversationHistory: [],
            waitingForRoll: false,
            pendingRollContext: null,
            /** Damage dealt to each encounter by id (e.g. goblin_guard: 5). Used to show current monster HP. */
            damageToEncounters: {},
            /** True when combat has started (either side attacked). Cleared when all nearby enemies defeated, player dies, or player retreats. */
            inCombat: false,
            /** Current pillar: 'exploration' | 'combat' | 'travel'. Exactly one active; drives mode-specific prompt. */
            mode: 'exploration',
            /** Items put in use during play (e.g. Torch (lit) when player lights one from pack). Shown in Equipped. */
            equippedInUse: [],
            /** Set when we parse torch use from player message; skip GM parse for same turn to avoid double-count. */
            torchUseParsedThisTurn: false,
            /** After a d20 roll: natural value (1-20) and whether it was an attack roll (for crit damage / auto-miss). */
            lastD20Natural: null,
            lastRollWasAttack: false,
            /** When combat ends, store currentRoom here so monster panel can linger until player takes another action. Cleared in submitAction(). */
            lastCombatRoom: null,
            /** Encounter panel history (newest encountered first). Entries persist and update status (active/defeated). */
            encounterHistory: [],
            /** Command history for Up/Down navigation (newest first; max 50). */
            commandHistory: [],
            commandHistoryIndex: -1,
            commandHistoryDraft: '',
            /** True when character has died; death overlay shown, input disabled until choice. */
            isDead: false,
            /** True when the last user message was a dice roll submit; skip parsing monster damage from GM narrative to avoid double-count. */
            lastUserMessageWasDiceRoll: false,
            /** Last roll type: 'resolved' (attack auto-resolved by rules engine) | 'ability' | null (free-form). Drives the current-step hint in the combat prompt. */
            lastUserRollType: null,
        };
        // Stage 1e: expose to extracted modules.
        window.gameState = gameState;

        // ============================================
        // DATA LOADING
        // ============================================
        
        // Stage 1d: data load now flows through the v1 pipeline.
        //   PackLoader.loadPack() -> raw v1 gameData (manifest + 6 archetypes + sidecars, validated)
        //   GameState.init()      -> pre-v1-shaped shim the legacy renderers read
        // The shimmed object is copied onto the existing const-bound `gameData`
        // by property mutation so every downstream access continues to work.
        async function loadGameData() {
            try {
                const v1 = await PackLoader.loadPack(CONFIG.GAME_PACK, updateLoadingStatus);
                const shim = GameState.init(v1);
                Object.assign(gameData, shim);
                debugLog('DATA', 'Pack loaded:', v1.manifest && v1.manifest.id);
                return true;
            } catch (error) {
                console.error('Failed to load game data:', error);
                Main.showError(error);
                return false;
            }
        }

        // Thin wrapper kept so callers later in the monolith (initializeGameStateFromData,
        // finishGameStart) can keep calling updateLoadingStatus without caring that the
        // real implementation lives in scripts/main.js now. Retired during Stage 1e+.
        function updateLoadingStatus(message) {
            Main.setStatus(message);
        }




        // ============================================
        // INITIALIZATION
        // ============================================
        
        async function initializeGame() {
            debugLog('INIT', 'Starting game initialization');
            
            // Load all data files
            const loaded = await loadGameData();
            if (!loaded) {
                alert('Failed to load game data. Check console for details and ensure all JSON files are in the same directory.');
                return;
            }
            if (hasValidSave()) {
                showStartChoice();
                return;
            }
            initializeGameStateFromData();
            finishGameStart(true);
        }

        function initializeGameStateFromData() {
            updateLoadingStatus('Initializing game state...');
            gameState.isDead = false;
            gameState.triggeredEvents = [];
            gameState.conversationHistory = [];
            gameState.damageToEncounters = {};
            gameState.inCombat = false;
            gameState.mode = 'exploration';
            gameState.equippedInUse = [];
            gameState.lastCombatRoom = null;
            gameState.encounterHistory = [];
            gameState.commandHistory = [];
            gameState.commandHistoryIndex = -1;
            gameState.commandHistoryDraft = '';
            gameState.pendingLevelUpAck = null;
            gameState.character = {
                name: gameData.character.basic_info.name,
                class: gameData.character.basic_info.class,
                level: gameData.character.basic_info.level,
                hp: gameData.character.combat_stats.hit_points.current,
                maxHp: gameData.character.combat_stats.hit_points.maximum,
                ac: gameData.character.combat_stats.armor_class,
                xp: gameData.character.experience.current,
                abilities: {},
                skills: {},
                equipment: [],
                inventory: [],
                conditions: []
            };
            
            // Convert abilities (map full names to short names)
            const abilityNameMap = {
                strength: 'str', dexterity: 'dex', constitution: 'con',
                intelligence: 'int', wisdom: 'wis', charisma: 'cha'
            };
            for (const [key, value] of Object.entries(gameData.character.ability_scores)) {
                const shortKey = abilityNameMap[key] || key;
                gameState.character.abilities[shortKey] = {
                    score: value.score,
                    modifier: value.modifier
                };
            }
            
            debugLog('INIT', 'Character abilities initialized', gameState.character.abilities);
            
            // Convert skills
            for (const [key, value] of Object.entries(gameData.character.skills)) {
                gameState.character.skills[key] = value.modifier;
            }
            
            // Convert equipment: weapons and armor only (no torch, light sources, etc.)
            for (const item of [...gameData.character.equipment.worn, ...gameData.character.equipment.wielded, ...gameData.character.equipment.carried]) {
                const isWeapon = !!item.damage;
                const isArmor = (item.type || '').toLowerCase() === 'armor';
                if (!isWeapon && !isArmor) continue; // skip torch, light sources, etc.
                const typeInfo = isWeapon ? getWeaponTypeInfo(item) : { type: null, range: null };
                let stats = '';
                if (item.damage) {
                    const base = `${item.damage} ${item.damage_type}`;
                    stats = typeInfo.type === 'ranged' && typeInfo.range
                        ? `${base} (ranged ${typeInfo.range})`
                        : `${base} (${typeInfo.type || 'melee'})`;
                } else {
                    stats = item.properties ? item.properties.join(' - ') : '';
                }
                const eq = {
                    name: item.name,
                    stats,
                    equipped: item.equipped !== undefined ? item.equipped : false,
                    isWeapon,
                    isArmor,
                    weaponType: typeInfo.type,
                    weaponRange: typeInfo.range
                };
                if (isArmor && item.ac != null) eq.ac = item.ac;
                if (isWeapon && item.damage) {
                    eq.damage = item.damage;
                    eq.damage_type = item.damage_type || '';
                    eq.range = item.range || (typeInfo.range ? String(typeInfo.range) : 'melee');
                    eq.properties = item.properties;
                }
                gameState.character.equipment.push(eq);
            }
            // Convert inventory
            for (const item of gameData.character.equipment.backpack) {
                gameState.character.inventory.push({
                    name: item.name,
                    quantity: item.quantity
                });
            }
            
            // Add coins
            const coins = gameData.character.equipment.coin;
            gameState.character.inventory.push({
                name: 'Gold',
                quantity: `${coins.gold}gp`
            });
            
            // Set starting room
            gameState.currentRoom = gameData.module.module.starting_room;
            gameState.readiedWeaponName = null;
            gameState.armorEquipped = true;
        }

        function showStartChoice() {
            const overlay = document.getElementById('loadingOverlay');
            if (!overlay) return;
            const meta = getSaveMetadata();
            const savedAt = meta && meta.savedAt ? new Date(meta.savedAt).toLocaleString() : '';
            overlay.innerHTML = `
                <h2>Saved game found</h2>
                <p class="start-choice-p">Continue your adventure or start a new game.</p>
                ${savedAt ? `<p class="start-choice-meta">Saved: ${savedAt}</p>` : ''}
                <div class="start-choice-buttons">
                    <button type="button" class="primary-button" id="btnContinue">Continue</button>
                    <button type="button" class="secondary-button" id="btnNewGame">New game</button>
                </div>
            `;
            document.getElementById('btnContinue').onclick = () => {
                if (loadGame()) {
                    finishGameStart(false);
                } else {
                    initializeGameStateFromData();
                    finishGameStart(true);
                }
            };
            document.getElementById('btnNewGame').onclick = () => {
                // if (!confirm('Are you sure? Your saved progress will be lost.')) return;
                initializeGameStateFromData();
                finishGameStart(true);
            };
        }

        function finishGameStart(showWelcome) {
            hideDeathOverlay();
            updateLoadingStatus('Rendering interface...');
            initializeCharacterSheet();
            document.getElementById('dungeonTitle').textContent = gameData.module.module.title;
            const modeEl = document.getElementById('modeIndicator');
            if (modeEl) {
                modeEl.textContent = 'Exploration';
                modeEl.className = 'mode-indicator mode-exploration';
            }
            document.getElementById('loadingOverlay').style.display = 'none';
            initApiUsageConfig();
            document.getElementById('playerInput').disabled = false;
            if (showWelcome) {
                const startingRoom = gameData.module.rooms[gameState.currentRoom];
                addSystemMessage(`Welcome to ${gameData.module.module.title}!`);
                addNarration(startingRoom.description);
                if (startingRoom.features) {
                    for (const feature of startingRoom.features) {
                        if (feature.triggers && feature.triggers.includes('on_entry') && feature.text) {
                            addNarration(feature.text);
                        }
                    }
                }
                addSystemMessage('Press Ctrl+Shift+D to toggle debug panel. Type your action and press Enter.');
            } else {
                addSystemMessage('Game loaded.');
                addResumeContext();
            }
            document.getElementById('playerInput').focus();
            const copyBtn = document.getElementById('copyNarrativeBtn');
            if (copyBtn) copyBtn.onclick = () => copyNarrativeToClipboard();
            debugLog('INIT', 'Game initialization complete');
        }

        // ============================================
        // CHARACTER SHEET DISPLAY
        // ============================================
        




        // ============================================
        // INPUT HANDLING
        // ============================================
        
        function disableInput(disabled) {
            const input = document.getElementById('playerInput');
            input.disabled = disabled;
            if (!disabled) input.focus();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitAction();
            }
        }

        function handleInputKeyDown(event) {
            if (event.key !== 'ArrowUp' && event.key !== 'ArrowDown') return;
            const history = gameState.commandHistory;
            if (!history.length) return;
            const input = document.getElementById('playerInput');
            if (event.key === 'ArrowUp') {
                event.preventDefault();
                if (gameState.commandHistoryIndex === -1) {
                    gameState.commandHistoryDraft = input.value;
                    gameState.commandHistoryIndex = 0;
                } else if (gameState.commandHistoryIndex < history.length - 1) {
                    gameState.commandHistoryIndex += 1;
                }
                input.value = history[gameState.commandHistoryIndex];
            } else {
                event.preventDefault();
                if (gameState.commandHistoryIndex <= 0) {
                    gameState.commandHistoryIndex = -1;
                    input.value = gameState.commandHistoryDraft;
                } else {
                    gameState.commandHistoryIndex -= 1;
                    input.value = history[gameState.commandHistoryIndex];
                }
            }
        }

        function submitAction() {
            const input = document.getElementById('playerInput');
            const action = input.value.trim();
            
            if (!action || gameState.waitingForRoll) return;
            
            gameState.lastCombatRoom = null; // clear lingering monster panel when player takes another action
            tryParseWeaponAway(action);
            tryParseWeaponSwitch(action);
            tryParseArmorState(action);
            tryParseRetreat(action);
            gameState.torchUseParsedThisTurn = false; // reset each turn
            tryParsePackItemUse(action, true); // parse player's declared actions (e.g. "I pull out my torch and light it")
            
            addPlayerAction(action);
            input.value = '';
            gameState.commandHistoryIndex = -1;
            gameState.commandHistoryDraft = '';
            if (gameState.commandHistory[0] !== action) {
                gameState.commandHistory.unshift(action);
                if (gameState.commandHistory.length > 50) gameState.commandHistory.pop();
            }
            
            gameState.lastUserRollType = null; // player is taking a new action (not responding to a roll)
            gameState.conversationHistory.push({
                role: "user",
                content: action
            });
            
            callAIGM();
        }




        // ============================================
        // TEST UTILITIES
        // ============================================
        
        const TestUtils = {
            modifyHP(amount) {
                modifyHP(amount);
                addSystemMessage(`[DEBUG] HP adjusted by ${amount}`);
            },
            
            fullHeal() {
                gameState.character.hp = gameState.character.maxHp;
                updateCharacterDisplay();
                addSystemMessage('[DEBUG] Fully healed');
            },
            
            addXP(amount) {
                addXP(amount);
            },
            
            addPotion() {
                addToInventory('Healing Potion', 1);
                addSystemMessage('[DEBUG] Added healing potion');
            },
            
            addGold(amount) {
                addToInventory('Gold', amount);
                addSystemMessage(`[DEBUG] Added ${amount} gold`);
            },
            
            teleportToRoom(roomId) {
                if (gameData.module.rooms[roomId]) {
                    gameState.currentRoom = roomId;
                    const room = gameData.module.rooms[roomId];
                    addSystemMessage(`[DEBUG] Teleported to ${room.name}`);
                    addNarration(room.description);
                } else {
                    addSystemMessage(`[DEBUG] Room ${roomId} not found`);
                }
            },
            
            logState() {
                console.table({
                    HP: `${gameState.character.hp}/${gameState.character.maxHp}`,
                    XP: gameState.character.xp,
                    Room: gameState.currentRoom,
                    Gold: gameState.character.inventory.find(i => i.name.includes('Gold'))?.quantity || '0gp'
                });
                console.log('Full state:', gameState);
            },
            
            clearHistory() {
                gameState.conversationHistory = [];
                addSystemMessage('[DEBUG] Conversation history cleared');
            }
        };
        
        // Expose to console
        window.test = TestUtils;

        // ============================================
        // DEBUG PANEL TOGGLE
        // ============================================
        
        // Debug panel toggle disabled for Phase 2 (panel removed from layout)
        // document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.shiftKey && e.key === 'D') { ... } });

        // ============================================
        // START GAME
        // ============================================
        
        window.addEventListener('load', async () => {
            console.log('[INIT] Page loaded, loading templates...');
            const templatesLoaded = await loadAllTemplates();
            if (!templatesLoaded) {
                console.error('[INIT] Template loading failed, cannot start game');
                return;
            }
            console.log('[INIT] Templates loaded, fetching server config');
            try {
                const configRes = await fetch('/api/config');
                if (configRes.ok) {
                    const config = await configRes.json();
                    if (config.model) CONFIG.MODEL = config.model;
                }
            } catch (e) {
                console.warn('[INIT] Could not fetch /api/config, using default MODEL');
            }
            console.log('[INIT] Initializing game');
            debugLog('INIT', 'Page loaded, initializing game');
            initializeGame();
        });
    </script>
</body>
</html>
