        // ============================================
        // WEAPON DAMAGE (from character JSON)
        // ============================================
        
        /** Whether a weapon uses DEX (ranged) or STR (melee) for damage. */
        function isRangedWeapon(weapon) {
            return getWeaponTypeInfo(weapon).type === 'ranged';
        }

        /** Get weapon type (melee/ranged) and range. Works on character equipment or monster attack. */
        function getWeaponTypeInfo(weapon) {
            if (!weapon) return { type: 'melee', range: null };
            const name = (weapon.name || '').toLowerCase();
            const props = Array.isArray(weapon.properties) ? weapon.properties.join(' ') : (weapon.properties || '');
            const propsLower = props.toLowerCase();
            // Explicit range field (e.g. monster attacks)
            if (weapon.range) {
                const r = String(weapon.range).toLowerCase();
                if (r === 'melee') return { type: 'melee', range: null };
                return { type: 'ranged', range: weapon.range };
            }
            // From properties: "range 80/320" or "range 30/120"
            const rangeMatch = props.match(/range\s+(\d+(?:\/\d+)?)/i);
            if (rangeMatch) return { type: 'ranged', range: rangeMatch[1] };
            // Ammunition property implies ranged
            if (/ammunition/.test(propsLower)) return { type: 'ranged', range: 'see properties' };
            // Name-based
            if (/bow|crossbow|sling|dart|thrown/.test(name)) {
                const m = props.match(/range\s+(\d+(?:\/\d+)?)/i);
                return { type: 'ranged', range: m ? m[1] : 'see properties' };
            }
            return { type: 'melee', range: null };
        }
        
        /** Get readied weapon damage: dice and modifier (STR for melee, DEX for ranged). */
        function getEquippedWeaponDamage() {
            const sources = gameData.character && gameData.character.equipment
                ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                : [];
            const weapons = sources.filter(w => w.damage);
            if (!weapons.length) return { dice: '1d8', modifier: gameState.character.abilities.str.modifier, label: '1d8', count: 1, sides: 8 };
            // Use readied weapon by name, or first equipped
            const readied = gameState.readiedWeaponName;
            let weapon = readied ? weapons.find(w => w.name && w.name.toLowerCase() === readied.toLowerCase()) : null;
            if (!weapon) weapon = weapons.find(w => w.equipped) || weapons[0];
            const useDex = isRangedWeapon(weapon);
            const mod = useDex ? gameState.character.abilities.dex.modifier : gameState.character.abilities.str.modifier;
            return parseWeaponDice(weapon.damage, mod);
        }
        
        /** Resolve dice for a roll request. Returns { type:'weapon'|'custom'|'d20', ... } */
        function getDiceForRollRequest(rollType) {
            const t = (rollType || '').trim().toLowerCase();
            if (t === 'damage') {
                return { type: 'weapon', label: getEquippedWeaponDamage().label };
            }
            // Custom dice: 2d4+2, 1d6, 3d8+1, 1d6-1, etc.
            const diceMatch = t.match(/^(\d+)d(\d+)(?:([+-])(\d+))?$/i);
            if (diceMatch) {
                const count = parseInt(diceMatch[1]);
                const sides = parseInt(diceMatch[2]);
                const modifier = diceMatch[4] ? (diceMatch[3] === '-' ? -parseInt(diceMatch[4]) : parseInt(diceMatch[4])) : 0;
                const modStr = modifier ? (modifier >= 0 ? '+' + modifier : String(modifier)) : '';
                return {
                    type: 'custom',
                    count: count,
                    sides: sides,
                    modifier,
                    label: `${count}d${sides}${modStr}`,
                    minFace: count,
                    maxFace: count * sides
                };
            }
            // Healing: lookup from character or use default 2d4+2
            if (t === 'healing' || t === 'healing potion' || t === 'healingpotion') {
                const backpack = gameData.character?.equipment?.backpack || [];
                const potion = backpack.find(i => (i.name || '').toLowerCase().includes('healing') && (i.effect || '').includes('d'));
                if (potion && potion.effect) {
                    const m = potion.effect.match(/(\d+)d(\d+)(?:\+(\d+))?/i);
                    if (m) {
                        const count = parseInt(m[1]);
                        const sides = parseInt(m[2]);
                        const modifier = m[3] ? parseInt(m[3]) : 0;
                        const modStr = modifier ? (modifier >= 0 ? '+' + modifier : String(modifier)) : '';
                        return {
                            type: 'custom',
                            count, sides, modifier,
                            label: `${count}d${sides}${modStr}`,
                            minFace: count,
                            maxFace: count * sides
                        };
                    }
                }
                return {
                    type: 'custom',
                    count: 2, sides: 4, modifier: 2,
                    label: '2d4+2',
                    minFace: 2,
                    maxFace: 8
                };
            }
            // d20 for abilities/skills
            return { type: 'd20', ability: t };
        }

        /** Parse "1d8" or "2d6" and return { dice, modifier, label } for display and rolling. */
        function parseWeaponDice(diceStr, modifier) {
            const match = (diceStr || '1d8').match(/^(\d+)d(\d+)$/i);
            const count = match ? parseInt(match[1], 10) : 1;
            const sides = match ? parseInt(match[2], 10) : 8;
            const modifierNum = typeof modifier === 'number' ? modifier : 0;
            const modStr = modifierNum >= 0 ? '+' + modifierNum : String(modifierNum);
            return {
                dice: diceStr || '1d8',
                count,
                sides,
                modifier: modifierNum,
                label: (count === 1 ? '1d' + sides : count + 'd' + sides) + (modifierNum !== 0 ? modStr : '')
            };
        }
        
        /** Roll weapon damage (e.g. 1d8+3 or 2d6+2). If isCriticalHit, dice total is doubled then modifier added. Returns { total, breakdown } for display. */
        function rollWeaponDamage(isCriticalHit = false) {
            const w = getEquippedWeaponDamage();
            const rolls = [];
            let diceTotal = 0;
            for (let i = 0; i < w.count; i++) {
                const r = Math.floor(Math.random() * w.sides) + 1;
                rolls.push(r);
                diceTotal += r;
            }
            const modStr2 = w.modifier >= 0 ? ` + ${w.modifier}` : ` - ${Math.abs(w.modifier)}`;
            const diceExpr = w.count === 1 ? `1d${w.sides}` : `${w.count}d${w.sides}`;
            const rollsStr = rolls.join(' + ');
            let total, breakdown;
            if (isCriticalHit) {
                const doubled = diceTotal * 2;
                total = doubled + w.modifier;
                breakdown = w.modifier !== 0
                    ? `${diceExpr} (${rollsStr}) → crit: ${diceTotal}×2${modStr2} = ${total}`
                    : `${diceExpr} (${rollsStr}) → crit: ${diceTotal}×2 = ${total}`;
            } else {
                total = diceTotal + w.modifier;
                breakdown = w.modifier !== 0
                    ? `${diceExpr} (${rollsStr})${modStr2} = ${total}`
                    : `${diceExpr} (${rollsStr}) = ${total}`;
            }
            return { total, breakdown };
        }

        /** True if this d20 roll context is for an attack roll (affects crit success → double damage; crit failure → auto-miss). */
        function isAttackRoll(diceCtx) {
            if (!diceCtx || diceCtx.type !== 'd20') return false;
            const key = (diceCtx.ability || '').toLowerCase().trim();
            if (/\battack\b|\bto hit\b|\bhit\b|\bmelee\b|\branged\b/.test(key)) return true;
            if (gameState.inCombat && /^(strength|str|dexterity|dex)$/.test(key)) return true;
            return false;
        }

        // ============================================
        // DICE ROLLING
        // ============================================
        
        function showDiceSection(prompt = "Roll requested:", rollType = null) {
            const diceSection = document.getElementById('diceSection');
            const rollPrompt = document.getElementById('rollPrompt');
            const rollBtn = document.getElementById('rollBtn');
            const diceInput = document.getElementById('diceInput');
            const signed = (n) => (n >= 0 ? `+${n}` : `${n}`);
            
            const rt = rollType || (prompt.match(/Roll\s+(.+?)(?::|$)/i)?.[1]?.trim() || '');
            const dice = getDiceForRollRequest(rt);
            
            if (dice.type === 'weapon') {
                const w = getEquippedWeaponDamage();
                const diceExpr = w.count === 1 ? `1d${w.sides}` : `${w.count}d${w.sides}`;
                const isCrit = gameState.lastD20Natural === 20 && gameState.lastRollWasAttack;
                const modHint = w.modifier !== 0 ? `; then add ${signed(w.modifier)}` : '';
                if (isCrit) {
                    rollPrompt.textContent = `Critical hit! Roll weapon dice (${diceExpr}); result is doubled${modHint}.`;
                    rollBtn.textContent = `Roll ${diceExpr} (crit: double dice${w.modifier !== 0 ? `, ${signed(w.modifier)}` : ''})`;
                } else {
                    rollPrompt.textContent = `Roll weapon dice (${diceExpr})${w.modifier !== 0 ? `; system adds ${signed(w.modifier)}` : ''}.`;
                    rollBtn.textContent = `Roll ${diceExpr}${w.modifier !== 0 ? ` (${signed(w.modifier)})` : ''}`;
                }
                diceInput.placeholder = `1-${w.count * w.sides}`;
                diceInput.min = String(w.count);
                diceInput.max = String(w.count * w.sides);
            } else if (dice.type === 'custom') {
                const diceExpr = dice.count === 1 ? `1d${dice.sides}` : `${dice.count}d${dice.sides}`;
                const modHint = dice.modifier !== 0 ? `; system adds ${signed(dice.modifier)}` : '';
                rollPrompt.textContent = `Roll ${diceExpr}${modHint}.`;
                rollBtn.textContent = `Roll ${diceExpr}${dice.modifier !== 0 ? ` (${signed(dice.modifier)})` : ''}`;
                diceInput.placeholder = `${dice.minFace}-${dice.maxFace}`;
                diceInput.min = String(dice.minFace);
                diceInput.max = String(dice.maxFace);
            } else {
                const abilityInfo = getAbilityModifierForRoll(dice.ability);
                const modStr = abilityInfo && abilityInfo.modifier != null ? signed(abilityInfo.modifier) : null;
                const label = abilityInfo && abilityInfo.label ? abilityInfo.label : rt;
                rollPrompt.textContent = modStr
                    ? `Roll d20 for ${label} (system adds ${modStr}).`
                    : (prompt.endsWith(':') ? prompt : prompt + ':');
                rollBtn.textContent = modStr ? `Roll d20 (${modStr})` : 'Roll d20';
                diceInput.placeholder = '1-20';
                diceInput.min = '1';
                diceInput.max = '20';
            }
            
            diceSection.classList.add('active');
            gameState.waitingForRoll = true;
            gameState.pendingRollContext = { dice };
            disableInput(true);
        }

        function hideDiceSection() {
            const diceSection = document.getElementById('diceSection');
            diceSection.classList.remove('active');
            gameState.waitingForRoll = false;
            gameState.pendingRollContext = null;
            disableInput(false);
        }

        function getProficiencyBonus() {
            return (gameData.character && gameData.character.combat_stats && typeof gameData.character.combat_stats.proficiency_bonus === 'number')
                ? gameData.character.combat_stats.proficiency_bonus
                : 0;
        }

        /** Attack rolls use ability modifier + proficiency (melee: STR, ranged: DEX). Condition penalties are applied automatically. */
        function getAttackModifierForRoll(rollKey) {
            const key = (rollKey || '').toLowerCase();
            const char = gameState.character;
            if (!char || !char.abilities) return null;
            let useDex = false;
            if (/\branged\b/.test(key)) {
                useDex = true;
            } else if (/\bmelee\b/.test(key)) {
                useDex = false;
            } else {
                // Generic "attack": infer from readied weapon when possible
                const sources = gameData.character && gameData.character.equipment
                    ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                    : [];
                const weapons = sources.filter(w => w.damage);
                const readied = gameState.readiedWeaponName;
                let weapon = readied ? weapons.find(w => w.name && w.name.toLowerCase() === readied.toLowerCase()) : null;
                if (!weapon) weapon = weapons.find(w => w.equipped) || weapons[0];
                useDex = isRangedWeapon(weapon);
            }
            const abilityMod = useDex ? char.abilities.dex.modifier : char.abilities.str.modifier;
            const prof = getProficiencyBonus();
            const abilityLabel = useDex ? 'DEX' : 'STR';
            const baseMod = abilityMod + prof;
            const conditionMod = getConditionModifierForRoll(true, null);
            const totalMod = baseMod + conditionMod;
            const conditionLabel = conditionMod !== 0 ? ` (conditions ${conditionMod >= 0 ? '+' : ''}${conditionMod})` : '';
            return {
                modifier: totalMod,
                label: `Attack (${abilityLabel} ${abilityMod >= 0 ? '+' : ''}${abilityMod}, Prof +${prof}${conditionLabel})`
            };
        }

        /** Map roll request to modifier for display: use skill modifier if it's a skill, else ability. Condition penalties are applied automatically. */
        function getAbilityModifierForRoll(abilityName) {
            if (!abilityName || !gameState.character) return null;
            const key = abilityName.toLowerCase().trim();
            const char = gameState.character;
            // Explicit attack requests always include proficiency.
            if (/\battack\b|\bto hit\b|\bhit\b/.test(key)) {
                return getAttackModifierForRoll(key);
            }
            // In combat, Strength/Dexterity roll requests are usually attack rolls from GM flow.
            if (gameState.inCombat && (key === 'strength' || key === 'str' || key === 'dexterity' || key === 'dex')) {
                return getAttackModifierForRoll(key.includes('dex') ? 'ranged attack' : 'melee attack');
            }
            if (char.skills && typeof char.skills[key] === 'number') {
                const label = abilityName.charAt(0).toUpperCase() + abilityName.slice(1).toLowerCase();
                const conditionMod = getConditionModifierForRoll(false, null);
                const totalMod = char.skills[key] + conditionMod;
                const conditionLabel = conditionMod !== 0 ? ` (conditions ${conditionMod >= 0 ? '+' : ''}${conditionMod})` : '';
                return { modifier: totalMod, label: label + conditionLabel };
            }
            if (!char.abilities) return null;
            const keyMap = {
                strength: 'str', str: 'str', dex: 'dex', dexterity: 'dex',
                constitution: 'con', con: 'con', intelligence: 'int', int: 'int',
                wisdom: 'wis', wis: 'wis', charisma: 'cha', cha: 'cha'
            };
            const abKey = keyMap[key];
            if (!abKey || !char.abilities[abKey]) return null;
            const mod = char.abilities[abKey].modifier;
            const conditionMod = getConditionModifierForRoll(false, abKey);
            const totalMod = mod + conditionMod;
            const label = abilityName.charAt(0).toUpperCase() + abilityName.slice(1).toLowerCase();
            const conditionLabel = conditionMod !== 0 ? ` (conditions ${conditionMod >= 0 ? '+' : ''}${conditionMod})` : '';
            return { modifier: totalMod, label: label + conditionLabel };
        }

        function rollDice() {
            const ctx = gameState.pendingRollContext?.dice;
            if (!ctx) return;
            if (ctx.type === 'weapon') {
                const isCrit = gameState.lastD20Natural === 20 && gameState.lastRollWasAttack;
                const result = rollWeaponDamage(isCrit);
                processDiceRoll(result.total, ctx, { damageBreakdown: result.breakdown, isCriticalHit: isCrit });
            } else if (ctx.type === 'custom') {
                const rolls = [];
                let sum = 0;
                for (let i = 0; i < ctx.count; i++) {
                    const r = Math.floor(Math.random() * ctx.sides) + 1;
                    rolls.push(r);
                    sum += r;
                }
                const total = sum + ctx.modifier;
                const rollsStr = rolls.join(' + ');
                const modStr = ctx.modifier ? (ctx.modifier >= 0 ? ` + ${ctx.modifier}` : ` - ${Math.abs(ctx.modifier)}`) : '';
                const breakdown = ctx.modifier !== 0
                    ? `${ctx.label} (${rollsStr})${modStr} = ${total}`
                    : `${ctx.label} (${rollsStr}) = ${total}`;
                processDiceRoll(total, ctx, { customBreakdown: breakdown });
            } else {
                const d20 = Math.floor(Math.random() * 20) + 1;
                processDiceRoll(d20, ctx);
            }
        }

        function submitDiceRoll() {
            const input = document.getElementById('diceInput');
            const roll = parseInt(input.value, 10);
            const min = parseInt(input.min || 1, 10);
            const max = parseInt(input.max || 20, 10);
            const ctx = gameState.pendingRollContext?.dice;
            const isValid = !isNaN(roll) && roll >= min && roll <= max;
            
            if (isValid && ctx) {
                input.value = '';
                const opts = {};
                if (ctx.type === 'weapon' && gameState.lastD20Natural === 20 && gameState.lastRollWasAttack) opts.isCriticalHit = true;
                processDiceRoll(roll, ctx, opts);
            }
        }

        function processDiceRoll(roll, diceCtx, options = {}) {
            let message;
            let totalToSend;
            let rollMessageSuffix = '';
            const ctx = gameState.pendingRollContext?.dice || diceCtx;
            if (!ctx) return;
            
            if (ctx.type === 'weapon') {
                const isCrit = options.isCriticalHit || (gameState.lastD20Natural === 20 && gameState.lastRollWasAttack);
                const breakdown = options.damageBreakdown;
                const w = getEquippedWeaponDamage();
                if (breakdown) {
                    message = isCrit
                        ? `You rolled damage (critical hit): <span class="dice-roll">${breakdown}</span>`
                        : `You rolled damage: <span class="dice-roll">${breakdown}</span>`;
                    totalToSend = roll;
                } else {
                    if (isCrit) {
                        totalToSend = roll * 2 + w.modifier;
                        const modStr = w.modifier >= 0 ? ` + ${w.modifier}` : ` - ${Math.abs(w.modifier)}`;
                        message = `You rolled damage (critical hit): <span class="dice-roll">${roll} (dice)×2${w.modifier !== 0 ? modStr : ''} = ${totalToSend}</span>`;
                    } else {
                        totalToSend = roll + w.modifier;
                        const modStr = w.modifier >= 0 ? ` + ${w.modifier}` : ` - ${Math.abs(w.modifier)}`;
                        message = `You rolled damage: <span class="dice-roll">${w.label} = ${roll} (manual)${w.modifier !== 0 ? modStr : ''} = ${totalToSend}</span>`;
                    }
                }
                if (isCrit) rollMessageSuffix = ' Critical hit damage.';
                gameState.lastD20Natural = null;
                gameState.lastRollWasAttack = false;
            } else if (ctx.type === 'custom') {
                const breakdown = options.customBreakdown;
                if (breakdown) {
                    message = `You rolled ${ctx.label}: <span class="dice-roll">${breakdown}</span>`;
                    totalToSend = roll;
                } else {
                    totalToSend = roll + (ctx.modifier || 0);
                    const modStr = ctx.modifier ? (ctx.modifier >= 0 ? ` + ${ctx.modifier}` : ` - ${Math.abs(ctx.modifier)}`) : '';
                    message = `You rolled ${ctx.label}: <span class="dice-roll">${ctx.label} = ${roll} (manual)${modStr} = ${totalToSend}</span>`;
                }
            } else {
                gameState.lastD20Natural = roll;
                gameState.lastRollWasAttack = isAttackRoll(ctx);
                const abilityInfo = ctx.ability ? getAbilityModifierForRoll(ctx.ability) : null;
                if (abilityInfo != null && abilityInfo.modifier != null) {
                    totalToSend = roll + abilityInfo.modifier;
                    const modStr = abilityInfo.modifier >= 0 ? ` + ${abilityInfo.modifier}` : ` - ${Math.abs(abilityInfo.modifier)}`;
                    message = `You rolled d20: <span class="dice-roll">${roll} (${abilityInfo.label}${modStr}) = ${totalToSend}</span>`;
                } else {
                    totalToSend = roll;
                    message = `You rolled d20: <span class="dice-roll">${roll}</span>`;
                }
                if (roll === 20) rollMessageSuffix = ' Natural 20 (critical success).';
                else if (roll === 1) rollMessageSuffix = ' Natural 1 (critical failure).';
            }
            
            addSystemMessage(message);
            hideDiceSection();
            
            const rollMessage = `I rolled a ${totalToSend != null ? totalToSend : roll}.${rollMessageSuffix}`;
            gameState.conversationHistory.push({
                role: "user",
                content: rollMessage
            });
            
            callAIGM();
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        
        function disableInput(disabled) {
            document.getElementById('playerInput').disabled = disabled;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                submitAction();
            }
        }

        function submitAction() {
            const input = document.getElementById('playerInput');
            const action = input.value.trim();
            
            if (!action || gameState.waitingForRoll) return;
            
            tryParseWeaponAway(action);
            tryParseWeaponSwitch(action);
            tryParseArmorState(action);
            tryParseRetreat(action);
            gameState.torchUseParsedThisTurn = false; // reset each turn
            tryParsePackItemUse(action, true); // parse player's declared actions (e.g. "I pull out my torch and light it")
            
            addPlayerAction(action);
            input.value = '';
            
            gameState.conversationHistory.push({
                role: "user",
                content: action
            });
            
            callAIGM();
        }

        // ============================================
        // CONVERSATION HISTORY MANAGEMENT
        // ============================================
        
        function pruneConversationHistory() {
            if (gameState.conversationHistory.length > CONFIG.MAX_HISTORY_TURNS) {
                debugLog('HISTORY', `Pruning conversation history (${gameState.conversationHistory.length} turns)`);
                const intro = gameState.conversationHistory.slice(0, 2);
                const recent = gameState.conversationHistory.slice(-(CONFIG.MAX_HISTORY_TURNS - 2));
                gameState.conversationHistory = [...intro, ...recent];
                debugLog('HISTORY', `History pruned to ${gameState.conversationHistory.length} turns`);
            }
        }

        // ============================================
        // AI GM INTEGRATION
        // ============================================
        
        async function callAIGM() {
            disableInput(true);
            const loader = addLoadingIndicator();
            
            // Prune history before making call
            pruneConversationHistory();
            
            try {
                const systemPrompt = buildSystemPrompt();
                const messages = [...gameState.conversationHistory];
                
                debugLog('AI', 'Calling AI GM', { 
                    historyLength: messages.length,
                    currentRoom: gameState.currentRoom 
                });
                
                const response = await fetch(CONFIG.API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        max_tokens: CONFIG.MAX_TOKENS,
                        system: systemPrompt,
                        messages: messages
                    })
                });

                const responseText = await response.text();
                if (!response.ok) {
                    let detail = responseText;
                    try {
                        const err = JSON.parse(responseText);
                        detail = err.error?.message || err.message || (err.error && typeof err.error === 'string' ? err.error : responseText);
                    } catch (e) { /* use responseText as detail */ }
                    throw new Error(`API error: ${response.status} - ${detail}`);
                }

                const data = JSON.parse(responseText);
                removeLoadingIndicator();
                
                const aiResponse = data.content[0].text;
                debugLog('AI', 'Received AI response', { length: aiResponse.length });
                
                gameState.conversationHistory.push({
                    role: "assistant",
                    content: aiResponse
                });
                
                processAIResponse(aiResponse);
                
            } catch (error) {
                removeLoadingIndicator();
                console.error('AI GM Error:', error);
                
                let errorMsg = 'Unknown error';
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = 'Server not running. Start server.js first!';
                } else if (error.message.includes('API error: 401')) {
                    errorMsg = 'Invalid API key in server.js';
                } else if (error.message.includes('API error: 429')) {
                    errorMsg = 'Rate limit exceeded. Wait a moment.';
                } else if (error.message.includes('API error: 400')) {
                    errorMsg = error.message.replace('API error: 400 - ', 'Bad request (400): ');
                } else {
                    errorMsg = error.message;
                }
                
                addErrorMessage(errorMsg);
                disableInput(false);
            }
        }

        function buildSystemPrompt() {
            const char = gameState.character;
            const room = gameData.module.rooms[gameState.currentRoom];
            
            // Defensive check
            if (!char || !char.abilities) {
                console.error('Character not initialized properly!', gameState.character);
                throw new Error('Character data missing');
            }
            
            debugLog('PROMPT', 'Building system prompt', {
                character: char.name,
                room: room.name,
                abilities: Object.keys(char.abilities)
            });
            
            // Build encounter info if present
            let encounterInfo = '';
            if (room.encounters && room.encounters.length > 0) {
                encounterInfo = '\n\n## Active Encounters — use these EXACT stats; current HP is tracked for you (monster is DEFEATED when it reaches 0):\n';
                for (const enc of room.encounters) {
                    encounterInfo += buildEncounterDescription(enc, true) + '\n';
                }
            } else {
                encounterInfo = '\n\n## Active Encounters: NONE — there are no monsters in this room. Do not add or invent any monsters.\n';
            }
            
            const layoutBlock = buildModuleLayoutForPrompt();
            
            const rulesetBlock = buildRulesetBlockForPrompt();
            return `You are the Game Master for this dungeon crawl: ${gameData.module.module.title}.

# SOURCE OF TRUTH — STRICT ADHERENCE
All concrete specifications (numbers, stats, DCs, rewards, mechanics, items) MUST come from the data blocks below: the active ruleset, the module (rooms, encounters, features), the character sheet, and Active Encounters. Do NOT invent or substitute values. **When you narrate rewards (XP, gold), you must say exactly the numbers from the Active Encounters block** — e.g. if it says "Say \"You discover 10 gold\"", write "You discover 10 gold" in your response. The app applies whatever numbers you write; if you say "8 gold" the player gets 8. So always use the numbers from the block so the narrative and the player's sheet match. Creativity in pacing and flavor is fine; the numbers must match the data.

# CRITICAL RULES

## RULESET (honor these mechanics)
${rulesetBlock || 'Use standard OSR-style mechanics. Attack: 1d20+mod+prof vs AC. Damage: weapon die + mod. DCs: Easy 10, Medium 15, Hard 20.'}

## DUNGEON LAYOUT — USE ONLY THE MODULE DATA
You MUST use ONLY the layout and content in the module data block below. Do NOT invent rooms, exits, room descriptions, or features.
- When describing a room, use the exact "Description" and "Features" text from the module.
- When the player moves, only allow movement to the "Exits" listed for the current room.
- Do not add new rooms, new exits, or new features. Each play-through must match the module.
${layoutBlock}

## RESPONSE LENGTH
- Keep responses between 50-100 words typically
- Longer (150 words max) only for major reveals or room descriptions
- Shorter (20-40 words) for simple acknowledgments or quick narration
- NEVER write 200+ word responses

## WHO ROLLS — PLAYER ONLY ROLLS FOR THEIR OWN ACTIONS
The player rolls ONLY for their own character's actions: their attack roll (d20), their damage roll (weapon dice), their skill/ability checks (Perception, Strength, etc.).
- You (the GM) resolve ALL monster/NPC actions. Never ask the player to roll for the goblin, the monster, or any enemy. When the monster attacks, you determine the monster's attack roll (d20 + bonus) and hit/miss; when it **hits**, you must write **[MONSTER_DAMAGE]** in place of the damage number (e.g. "The goblin hits you for [MONSTER_DAMAGE] damage"). The app will replace [MONSTER_DAMAGE] with a real dice roll so damage is always random. Do NOT pick a number yourself for monster damage. Do NOT use [ROLL_REQUEST: ...] for monster attacks.
- Only use [ROLL_REQUEST: ...] when the PLAYER's character is doing something that requires a roll (player attacks, player searches, player makes a check, player rolls damage after hitting).

## DICE ROLL REQUESTS (player actions only)
Use EXACTLY one of these formats when the PLAYER must roll. The app shows the correct dice for each:
- **Attack rolls (d20 + ability + proficiency):** [ROLL_REQUEST: Attack] (or [ROLL_REQUEST: Melee Attack] / [ROLL_REQUEST: Ranged Attack])
- **Ability/skill checks (d20 + relevant modifier):** [ROLL_REQUEST: Strength], [ROLL_REQUEST: Perception], etc.
- **Weapon damage:** [ROLL_REQUEST: Damage] — player rolls their readied weapon (e.g. 1d8 for longsword, 1d6 for shortbow).
- **Healing potion:** [ROLL_REQUEST: Healing Potion] or [ROLL_REQUEST: Healing] — player rolls 2d4+2.
- **Custom dice:** [ROLL_REQUEST: 2d4+2], [ROLL_REQUEST: 1d6], etc. — use when the roll has a specific formula.
Do NOT ask for a d20 for damage or healing. Wait for the player to roll before continuing.

## HIT RULE — ATTACK ROLL VS AC
An attack HITS only if the attack roll is **greater than or equal to** the target's AC.
- Example: roll 14 vs AC 16 = MISS (14 < 16). Never say the attack hit.
- Example: roll 16 vs AC 16 = HIT. Always state hit/miss correctly using this rule.

## COMBAT STATE — YOU CONTROL IT
**You decide when the party is in combat.** Include one of these tags in your response so the app tracks combat correctly:
- **When combat begins** (first attack, initiative, etc.): include **[COMBAT: on]** in your response. Example: "The goblin draws its blade! [COMBAT: on] Roll initiative!"
- **When combat ends** (all enemies defeated, player dies, retreat, etc.): include **[COMBAT: off]** in your response. Example: "The last goblin falls. [COMBAT: off] The room is quiet."
The tag is stripped from the displayed text; the player will not see it. Use your judgment — a tense standoff might not be combat until blades are drawn; a chase might end combat when the player escapes.

## INITIATIVE — PLAYER ACTS FIRST
By default the **player acts first** in combat. Enemies attack first only if (1) they surprise the player (e.g. ambush, failed perception), or (2) the player explicitly defers ("I wait", "I hold my action", "they can go first"). When combat begins without surprise, prompt the player for their action first; do not have the monster attack before the player has had a chance to act.

## COMBAT SEQUENCING - CRITICAL
Combat happens in STRICT steps. Never combine steps:

**Player declares attack -> Wait**
**Player rolls attack (d20) -> You compare to AC: if roll >= AC say HIT and use [ROLL_REQUEST: Damage]; if roll < AC say MISS and no damage roll**
The number the player sends for attack rolls and ability checks **already includes condition penalties** (e.g. poisoned −2). The app applies these automatically; use the total they report when comparing to AC or DC.
**Player rolls damage (weapon dice) -> You narrate damage effect -> Enemy's turn begins**

**KILL RULE — damage >= remaining HP = dead:** When the player's last message is a damage roll (e.g. "I rolled 11"), compare that number to the monster's **current HP remaining** in the Active Encounters block. If the damage roll is **greater than or equal to** that remaining HP, the monster is **defeated in this response** — narrate its death, award On death XP and treasure, and do not say it is still standing or has any HP left. Example: Goblin has 7 HP (or 4/7 remaining); player rolls 11 (or 5) — 11 >= 7 (or 5 >= 4), so the goblin is dead now.

**Enemy's turn -> You resolve the monster's attack yourself.** You determine the monster's d20 attack roll and hit/miss. When the monster **hits**, write the damage as **[MONSTER_DAMAGE]** (e.g. "hits you for [MONSTER_DAMAGE] damage") — the app will replace it with a real random roll. Do NOT ask the player to roll for the monster.

**Monster attack roll (d20 + bonus) must vary:** When you decide the monster's attack roll, you MUST simulate a different result each time. The die can be 1–20; do NOT repeatedly use the same number (e.g. 12 or 14). Vary the roll so combat feels random.

**Show enemy rolls in the narrative:** When the monster attacks, state the roll and result clearly. Examples: "The goblin attacks: <code>14 vs AC 16 = miss</code>." or "The goblin attacks: <code>17 to hit</code>, and hits you for [MONSTER_DAMAGE] damage." (The app will replace [MONSTER_DAMAGE] with the actual rolled number.)

NEVER ask the player to roll for enemies. NEVER narrate enemy actions before player's damage roll. NEVER combine multiple steps in one response.

## MELEE VS RANGED COMBAT
**Melee combat** = combatants within reach to attack with handheld weapons.
**Ranged combat** = targets outside melee reach; ranged weapons can be used.

**Rules:**
- **Cannot use ranged weapons in melee range.** If the player (or monster) is in melee range of an enemy, they must use a melee weapon. Ranged weapons (bows, crossbows, etc.) cannot be used when an enemy is adjacent.
- **Cannot use melee weapons outside melee range.** If the target is too far for melee (e.g. across the room, on a ledge), only ranged weapons work.
- **You judge distances.** When the player declares an attack, determine whether they are in melee or ranged distance. If they try to use the wrong weapon type for the situation, narrate that they cannot (e.g. "The goblin is right in front of you — you'd need to use your longsword, not the bow") or that they must close/retreat first.
- Monster attacks list melee vs ranged; choose the appropriate attack based on distance.

## CRITICAL SUCCESS AND CRITICAL FAILURE (d20 only)
Critical success and critical failure apply **only to d20 rolls** (attack rolls, ability checks, skill checks). They do not apply to damage dice, healing, or other rolls.

**Critical success (natural 20):**
- Occurs only when the player rolls a **natural** 20 on the d20 (the die shows 20 before modifiers).
- Narrate a dramatic, enhanced success appropriate to the situation.
- **On an attack roll:** The hit is a critical hit. The player will roll damage with dice **doubled** then add their modifier (e.g. 1d8+3 → roll 1d8, double the dice result, add +3). After they report the result, narrate the impact accordingly. Do not double the damage yourself; the app applies the rule.

**Critical failure (natural 1):**
- Occurs only when the player rolls a **natural** 1 on the d20.
- Narrate an appropriate failure or mishap (fumble, slip, worst outcome).
- **On an attack roll:** The attack **always misses**. Do **not** request a damage roll ([ROLL_REQUEST: Damage]) when the player reports a natural 1 on an attack.

The player's roll message will include "Natural 20 (critical success)" or "Natural 1 (critical failure)" when applicable so you can respond correctly.

## MONSTERS — ONLY FROM ACTIVE ENCOUNTERS / EXACT STATS
Use ONLY the monsters listed in "Active Encounters" for the current room. Do not invent or add any other monsters. **All monster stats (HP, AC, attack bonus, damage dice) come from the loaded monster data; do not substitute different numbers.**
**Current HP is tracked for you** in the Active Encounters block (e.g. "3/7 HP remaining" or "DEFEATED (0/7 HP)"). If the player just dealt damage and that damage is >= the monster's current HP remaining, the monster is defeated **in your response** — narrate death and awards; do not say it is still standing. When the block already says **DEFEATED**, the monster is dead — narrate its death and award On death XP/treasure; do not say it is still alive or let it act again.
**Use the EXACT AC from the block:** Each monster's AC is the number given in Active Encounters (e.g. Goblin AC 13 — never say 15 or any other number). When judging whether the player's attack hits, compare their roll to this AC only. Do not substitute a different AC.
Use the EXACT attack bonus and damage from the block. If Active Encounters is empty or says NONE, there are no monsters in this room. **For any dice you "roll" as GM (monster attacks, NPC checks, etc.), vary the result each time — do not repeatedly use the same number.**

## STATE TRACKING — SAY EXACTLY WHAT IS IN THE JSON
**The app parses your narrative and applies the numbers you write.** Whatever you say is what the player sees and what gets added to their sheet. If you write "You discover 8 gold" the player receives 8 gold. So you **must** use the exact numbers from the Active Encounters block — do not invent or round. The narrative and the reward must match.
- Damage (to the player): When a monster hits, write **[MONSTER_DAMAGE]** (e.g. "The goblin hits you for [MONSTER_DAMAGE] damage"). The app rolls the monster's damage dice and replaces the tag. Do not substitute your own number.
- Healing: "You heal 6 HP"
- **XP:** When narrating a defeat, say exactly the number from the block. If the block says "award exactly 25 XP" and "Say \"You gain 25 XP\"", write **"You gain 25 XP"** — not 20, not 30. The player will receive whatever number you write.
- **Gold / treasure:** When the block says "Treasure (module): 10 gp" and "Say \"You discover 10 gold\"", write **"You discover 10 gold"** (or "10 gp") — not 8, not 12. Use the exact numbers and item names from the block so the player's inventory matches your words.
- Pack item use: When the player uses a consumable or item from their Pack, say so explicitly (e.g. "You drink a healing potion", "You use the rope to climb", "You eat some rations"). For torch: when they light one from their pack, say "You pull out a torch and light it" — this updates Pack and shows the lit torch in Equipped. When they put it away, say "You put the torch back in your pack" or "You stow the torch" — this removes it from Equipped and adds 1 back to Pack. If they retrieve the rope later, say "You retrieve the rope".
- **Conditions:** When the player gains or loses a condition from the ruleset, include exactly one of these so the app can track it: **[CONDITION: add poisoned]** or **[CONDITION: remove poisoned]** (use the condition id: poisoned, blessed, stunned, wounded, exhausted). The character panel shows current conditions and their effects. Apply condition effects exactly as stated in the rules (e.g. poisoned = −2 to attack and checks).

**Auto-fail:** Impossible actions (per ruleset: ${gameData.rules && gameData.rules.core_mechanics && gameData.rules.core_mechanics.ability_checks ? gameData.rules.core_mechanics.ability_checks.auto_failure : 'impossible or lacking resources'})
**Requires roll:** Risky actions, searching, difficult tasks (only when outcome is uncertain and failure has consequences)

DCs (from ruleset — use these numbers): ${(function(){
                const dc = gameData.rules && gameData.rules.core_mechanics && gameData.rules.core_mechanics.ability_checks && gameData.rules.core_mechanics.ability_checks.dc_scale;
                if (dc && typeof dc === 'object') return Object.entries(dc).map(([k, v]) => `${k} ${v}`).join(', ');
                return 'Easy 10, Medium 15, Hard 20';
            })()}

# TONE
Atmospheric but concise. Show don't tell. Build tension through description.

Respond as GM. Use [ROLL_REQUEST: Ability] for d20 rolls and [ROLL_REQUEST: Damage] for weapon damage. Wait for results before continuing.`;
        }

        function processAIResponse(response) {
            debugLog('AI', 'Processing AI response');
            const previousRoom = gameState.currentRoom;
            const previousCombat = gameState.inCombat;
            
            // Parse optional scene directives and strip control tags from visible text.
            let scene = parseSceneDirectives(response);
            // Replace [MONSTER_DAMAGE] with a real dice roll so monster damage is always random (GM must not pick a number).
            if (/\[MONSTER_DAMAGE\]/i.test(scene.cleanText)) {
                const formula = getMonsterDamageFormulaForCurrentRoom();
                if (formula) {
                    const result = rollDiceFormula(formula);
                    scene = { cleanText: scene.cleanText.replace(/\[MONSTER_DAMAGE\]/gi, String(result.total)) };
                    debugLog('PARSE', `Monster damage roll: ${result.breakdown}`);
                } else {
                    scene = { cleanText: scene.cleanText.replace(/\[MONSTER_DAMAGE\]/gi, '?') };
                }
            }
            const displayResponse = scene.cleanText.replace(/\[COMBAT:\s*(on|off|true|false|yes|no)\]/gi, '').trim();
            
            // Parse for state changes BEFORE displaying (use text with [MONSTER_DAMAGE] already replaced)
            parseStateChanges(scene.cleanText);
            
            // Check for roll request (captures "Damage", "Healing Potion", "2d4+2", "Strength", etc.)
            const rollRequestPattern = /\[ROLL_REQUEST:\s*([^\]]+)\]/i;
            const match = displayResponse.match(rollRequestPattern);
            
            if (match) {
                const ability = match[1].trim();
                if (ability.toLowerCase() === 'damage') {
                    gameState.inCombat = true;
                    if (!gameState.readiedWeaponName) {
                        const sources = gameData.character && gameData.character.equipment
                            ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                            : [];
                        const firstWeapon = sources.find(w => w.damage);
                        if (firstWeapon) {
                            gameState.readiedWeaponName = firstWeapon.name;
                            updateCharacterDisplay();
                            debugLog('PARSE', `Readied weapon (default for damage roll): ${firstWeapon.name}`);
                        }
                    }
                }
                const formattedResponse = displayResponse.replace(rollRequestPattern, '').trim();
                if (formattedResponse) addNarration(formattedResponse);
                showDiceSection(`Roll ${ability}:`, ability);
            } else {
                if (displayResponse) addNarration(displayResponse);
                disableInput(false);
            }
        }
        
        /** Parse "goblin takes 5 damage" / "hits the goblin for 5" and update tracked monster HP. Checks all rooms so we record damage even if currentRoom was wrong. */
        function parseMonsterDamage(text) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return;
            if (!gameState.damageToEncounters) gameState.damageToEncounters = {};
            let roomWithUpdate = null;
            for (const [roomId, room] of Object.entries(rooms)) {
                if (!room || !room.encounters || room.encounters.length === 0) continue;
                for (const enc of room.encounters) {
                    const monster = resolveMonster(enc.monster_ref);
                    if (!monster) continue;
                    const names = [enc.name, monster.name].filter(Boolean);
                    const escapedNames = names.map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
                    const patterns = [
                        new RegExp(`(?:the\\s+)?(?:${escapedNames})\\s+takes\\s+(\\d+)\\s+(?:damage|HP)`, 'gi'),
                        new RegExp(`(?:hits?|strikes?|deals?)\\s+(?:the\\s+)?(?:${escapedNames})\\s+for\\s+(\\d+)\\s*(?:damage|HP)?`, 'gi'),
                        new RegExp(`(\\d+)\\s+(?:damage|HP)\\s+(?:to|against)\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi'),
                        new RegExp(`(?:deal|deals?|dealt)\\s+(?:the\\s+)?(?:${escapedNames})\\s+(\\d+)\\s+(?:damage|HP)`, 'gi'),
                        new RegExp(`(?:deal|deals?|dealt)\\s+(\\d+)\\s+(?:damage|HP)\\s+(?:to|against)\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi')
                    ];
                    for (const re of patterns) {
                        let m;
                        re.lastIndex = 0;
                        while ((m = re.exec(text)) !== null) {
                            const damage = parseInt(m[1], 10);
                            gameState.damageToEncounters[enc.id] = (gameState.damageToEncounters[enc.id] || 0) + damage;
                            gameState.inCombat = true;
                            roomWithUpdate = roomId;
                            debugLog('PARSE', `Monster damage: ${enc.name} +${damage} (total: ${gameState.damageToEncounters[enc.id]}/${monster.hp})`);
                        }
                    }
                    const deathPattern = new RegExp(`(?:${escapedNames})\\s+(?:falls?|is\\s+dead|dies?|is\\s+defeated|is\\s+slain)|(?:kill|slay|defeat)s?\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi');
                    if (deathPattern.test(text)) {
                        const current = gameState.damageToEncounters[enc.id] || 0;
                        if (current < monster.hp) {
                            gameState.damageToEncounters[enc.id] = monster.hp;
                            roomWithUpdate = roomId;
                            debugLog('PARSE', `Monster defeated (narrative): ${enc.name}`);
                        }
                    }
                }
            }
            if (roomWithUpdate) {
                const room = rooms[roomWithUpdate];
                gameState.currentRoom = roomWithUpdate;
                if (room && room.encounters && room.encounters.length > 0) {
                    const allDefeated = room.encounters.every(enc => getEncounterHP(enc).defeated);
                    if (allDefeated) {
                        gameState.inCombat = false;
                        debugLog('PARSE', 'Combat ended: all enemies defeated');
                    }
                }
            }
        }
        
        /** If narrative indicates the player entered a different room, update currentRoom so combat indicator etc. are correct. */
        function tryParseRoomChange(text) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms || !text) return;
            const t = text.toLowerCase();
            const movementWord = /\b(?:enter|reach|arrive|step into|are now in|find yourself in|head (?:in)?to|go (?:in)?to)\b/.test(t);
            if (!movementWord) return;
            for (const [roomId, room] of Object.entries(rooms)) {
                if (!room || !room.name) continue;
                if (roomId === gameState.currentRoom) continue;
                const roomName = room.name.toLowerCase();
                if (t.includes(roomName)) {
                    gameState.currentRoom = roomId;
                    updateCharacterDisplay();
                    debugLog('PARSE', `Room changed to: ${roomId} (${room.name})`);
                    return;
                }
            }
        }
        
        /** Parse [COMBAT: on] and [COMBAT: off] — GM explicitly sets combat state. Takes precedence over heuristics. */
        function tryParseCombatTag(text) {
            if (!text) return;
            const onMatch = text.match(/\[COMBAT:\s*(on|true|yes)\]/i);
            const offMatch = text.match(/\[COMBAT:\s*(off|false|no)\]/i);
            if (onMatch) {
                gameState.inCombat = true;
                gameState.combatStateFromTag = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat state: on (GM tag)');
            } else if (offMatch) {
                gameState.inCombat = false;
                gameState.combatStateFromTag = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat state: off (GM tag)');
            }
        }

        /** Fallback: if GM says combat begins/starts (and no explicit tag), set in-combat. */
        function tryParseCombatBegins(text) {
            if (!text) return;
            if (text.match(/\[COMBAT:\s*(on|off|true|false)\]/i)) return; // GM used tag, skip heuristic
            const t = text.toLowerCase();
            if (/\bcombat\s+(?:begins?|starts?)\b/.test(t) || /\b(?:the\s+)?(?:fight|battle)\s+(?:begins?|starts?|is\s+on)\b/.test(t) || /\b(?:you\s+are\s+)(?:in\s+)?combat\b/.test(t)) {
                gameState.inCombat = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat began (GM narrative fallback)');
            }
        }
        
        /** If narrative or player message indicates retreat/flee, end combat. */
        function tryParseRetreat(text) {
            if (!text) return;
            const t = text.toLowerCase();
            const gmNarrative = /\b(?:you\s+)(?:run|retreat|flee|escape|withdraw|manage to|succeed in)\b/.test(t) ||
                /\b(?:you\s+)(?:run|retreat|flee|escape)\s+(?:away|safely|back)/.test(t) ||
                /\b(?:run\s+away|retreat|fled|escape|withdraw)\b.*\b(?:safely|successfully|manage)\b/.test(t);
            const playerDeclares = /\b(?:i\s+)(?:run\s+away|retreat|flee|escape|withdraw|disengage)\b/.test(t) ||
                /\b(?:i'll\s+)(?:run\s+away|retreat|flee|escape)\b/.test(t);
            if (gmNarrative || playerDeclares) {
                gameState.inCombat = false;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat ended: retreat/flee');
            }
        }
        
        /** If text mentions removing or donning armor, update armorEquipped and AC. */
        function tryParseArmorState(text) {
            const t = text.toLowerCase();
            if (/\b(?:remove|take off|doff|strip off|unequip)\s+(?:your?)?\s*(?:armor|chain mail|mail)\b/i.test(t) ||
                /\b(?:you\s+)?(?:remove|doff)\s+(?:your?)?\s*(?:armor|chain mail)\b/i.test(t)) {
                gameState.armorEquipped = false;
                updateCharacterDisplay();
                debugLog('PARSE', 'Armor removed; AC now unarmored');
            } else if (/\b(?:put on|don|equip|wear)\s+(?:your?)?\s*(?:armor|chain mail|mail)\b/i.test(t) ||
                /\b(?:you\s+)?(?:don|put on)\s+(?:your?)?\s*(?:armor|chain mail)\b/i.test(t)) {
                gameState.armorEquipped = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Armor donned');
            }
        }

        /** Parse [CONDITION: add id] and [CONDITION: remove id]; optionally narrative phrases for known condition ids. */
        function tryParseConditions(text) {
            if (!text) return;
            const ids = getConditionIdsFromRules();
            const tagAdd = /\[CONDITION:\s*add\s+([^\]]+)\]/gi;
            const tagRemove = /\[CONDITION:\s*remove\s+([^\]]+)\]/gi;
            let m;
            while ((m = tagAdd.exec(text)) !== null) {
                addCondition(m[1].trim());
            }
            while ((m = tagRemove.exec(text)) !== null) {
                removeCondition(m[1].trim());
            }
            const t = text.toLowerCase();
            ids.forEach(id => {
                const info = getConditionInfo(id);
                const name = info.name.toLowerCase();
                if (name && (t.includes(`you are ${name}`) || t.includes(`you're ${name}`) || t.includes(`you become ${name}`) || t.includes(`you have been ${name}`))) {
                    addCondition(id);
                }
                if (name && (t.includes(`no longer ${name}`) || t.includes(`no longer ${id}`) || t.includes(`${name} wears off`) || t.includes(`${name} ends`) || t.includes(`${name} clears`))) {
                    removeCondition(id);
                }
            });
        }
        
        /** If text mentions putting away / sheathing a weapon, clear readied weapon so no weapon is highlighted. */
        function tryParseWeaponAway(text) {
            if (!text) return;
            const t = text.toLowerCase();
            if (/\b(?:put|puts?)\s+(?:my|your?|the)\s+(?:sword|weapon|blade|longsword|shortbow)\s+away\b/.test(t) ||
                /\b(?:put|puts?)\s+away\s+(?:my|your?|the)\s+(?:sword|weapon|blade|longsword|shortbow)\b/.test(t) ||
                /\bsheathe?s?\s+(?:my|your?|the)\s+(?:sword|weapon|blade)?\b/.test(t) ||
                /\bstow?s?\s+(?:my|your?|the)\s+(?:sword|weapon)\b/.test(t) ||
                /\b(?:you\s+)?(?:put|sheathe?|stow)\s+(?:your?\s+)?(?:sword|weapon)\s+away\b/.test(t)) {
                gameState.readiedWeaponName = null;
                updateCharacterDisplay();
                debugLog('PARSE', 'Readied weapon cleared (put away / sheathed)');
            }
        }
        
        /** If text mentions switching/drawing/readying/attacking with a weapon, set readied weapon and update panel. */
        function tryParseWeaponSwitch(text) {
            const sources = gameData.character && gameData.character.equipment
                ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                : [];
            const weaponNames = sources.filter(w => w.damage).map(w => w.name).filter(Boolean);
            for (const name of weaponNames) {
                const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const patterns = [
                    new RegExp(`(?:switch|switch to|draw|ready|use|wield|pull out)\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:attack|strike|hit)\\s+(?:with|using)\\s+(?:your?|my\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:attack|strike)\\s+(?:the\\s+)?[^\\s]+\\s+with\\s+(?:your?|my\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:you\\s+)?(?:draw|ready|switch to)\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:you\\s+)?(?:attack|strike)\\s+with\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`${escaped}\\s+(?:is\\s+)?(?:now\\s+)?(?:readied?|drawn|out)`, 'i')
                ];
                for (const p of patterns) {
                    if (p.test(text)) {
                        gameState.readiedWeaponName = name;
                        updateCharacterDisplay();
                        debugLog('PARSE', `Readied weapon set to: ${name}`);
                        return;
                    }
                }
            }
        }
        
        function parseStateChanges(text) {
            debugLog('PARSE', 'Parsing state changes from AI response');
            gameState.combatStateFromTag = false; // reset; set true if GM used [COMBAT: on/off]
            // Strip HTML so "You take <b>4</b> damage" is parseable (GM may use <b>/<i> in responses)
            let plainText = text.replace(/<[^>]*>/g, ' ');
            plainText = plainText.replace(/\s+/g, ' ').trim();
            
            tryParseRoomChange(plainText);
            tryParseCombatTag(plainText);   // GM tag takes precedence
            tryParseCombatBegins(plainText);
            tryParseRetreat(plainText);
            tryParseCombatBegins(plainText);
            tryParseWeaponAway(plainText);
            tryParseWeaponSwitch(plainText);
            tryParseArmorState(plainText);
            tryParseConditions(plainText);
            parseMonsterDamage(plainText);
            updateCharacterDisplay();
            
            // Parse HP changes - DAMAGE (only when the PLAYER receives damage, not when the player deals damage)
            // Many patterns to catch varied GM phrasings; stop at first match to avoid double-counting
            const damageToPlayerPatterns = [
                /(?:you\s+)(?:take|taking|suffer|lose)\s+(\d+)\s+(?:points?\s+of\s+)?(?:damage|HP)/i,
                /(?:take|taking|suffer|lose)\s+(\d+)\s+(?:points?\s+of\s+)?(?:damage|HP)/i,
                /(?:you'?re?)\s+hit\s+for\s+(\d+)/i,
                /hits?\s+you\s+for\s+(\d+)(?:\s+damage)?/i,
                /(?:hits?|strikes?|deals?)\s+(?:you|your)\s+(?:for\s+)?(\d+)\s*(?:damage|HP)?/i,
                /(?:hits?|strikes?)\s+for\s+(\d+)\s+(?:damage|HP)/i,
                /deals?\s+(\d+)\s+(?:damage|HP)\s+(?:to\s+)?(?:you|your)/i,
                /dealing\s+(\d+)\s+(?:damage|HP)\s+to\s+you/i,
                /(\d+)\s+(?:damage|HP)\s+(?:to\s+you|against\s+you|upon\s+you)/i,
                /(?:inflicts?|deals?)\s+(\d+)\s+(?:damage|HP)\s+(?:on|upon|to)\s+you/i,
                /(?:struck|wounds?)\s+(?:you\s+)?for\s+(\d+)/i,
                /(?:attack|blow|strike)\s+(?:hits?|strikes?)\s+(?:you\s+)?for\s+(\d+)/i,
                /\b(\d+)\s+(?:damage|HP)\s+(?:to\s+you|—\s*you|,\s*you)/i,
                // Fallback: "hit/strike/take/suffer" and "X damage" in same stretch (handles "The goblin hits. You take 5 damage.")
                /(?:hits?|strikes?|taking?|suffer(?:ing)?|wounds?)[\s\S]{0,120}(\d+)\s+(?:damage|HP)\b/i
            ];
            
            for (const pattern of damageToPlayerPatterns) {
                const match = plainText.match(pattern);
                if (match) {
                    const damage = parseInt(match[1], 10);
                    if (damage >= 1 && damage <= 999) {
                        debugLog('PARSE', `Detected damage TO PLAYER: ${damage}`);
                        if (!gameState.combatStateFromTag) gameState.inCombat = true; // GM tag overrides
                        modifyHP(-damage);
                    }
                    break;
                }
            }
            
            // Parse HP changes - HEALING
            const healPatterns = [
                /(?:heal|restore|regain)\s+(\d+)\s+(?:HP|hit points)/i,
                /(\d+)\s+HP\s+(?:restored|healed)/i
            ];
            
            for (const pattern of healPatterns) {
                const match = plainText.match(pattern);
                if (match) {
                    const healing = parseInt(match[1]);
                    debugLog('PARSE', `Detected healing: ${healing}`);
                    modifyHP(healing);
                    break;
                }
            }
            
            // Parse XP gains (use exactly what the GM says — GM must use module numbers in narrative)
            const xpPattern = /(?:gain|earn|receive)\s+(\d+)\s+XP/i;
            const xpMatch = plainText.match(xpPattern);
            if (xpMatch) {
                const xp = parseInt(xpMatch[1]);
                debugLog('PARSE', `Detected XP gain: ${xp}`);
                addXP(xp);
            }
            
            // Parse gold found (use exactly what the GM says — GM must use module numbers in narrative)
            const goldPatterns = [
                /(?:find|discover|obtain|gain)\s+(\d+)\s*gp/i,
                /(\d+)\s+gold/i
            ];
            
            for (const pattern of goldPatterns) {
                const match = plainText.match(pattern);
                if (match) {
                    const gold = parseInt(match[1]);
                    debugLog('PARSE', `Detected gold: ${gold}`);
                    addToInventory('Gold', gold);
                    break;
                }
            }
            
            // Parse item acquisition
            const itemPattern = /(?:find|discover|obtain|take)\s+(?:a|an|the)\s+([^.!?,]+?)(?:\.|!|,|\s+in\s+|\s+from\s+)/i;
            const itemMatch = plainText.match(itemPattern);
            if (itemMatch && !plainText.match(/gold|damage|HP/i)) {
                const itemName = itemMatch[1].trim();
                if (itemName.length < 30 && !itemName.includes('you') && !itemName.includes('your')) {
                    debugLog('PARSE', `Detected item: ${itemName}`);
                    addToInventory(itemName, 1);
                }
            }
            
            tryParsePackItemUse(plainText, false); // GM response (skip if already parsed from player)
        }

        /** Parse when player uses Pack items (potion, rope, rations, torch) and decrement quantity.
         * @param {string} text - GM or player narrative text
         * @param {boolean} fromPlayer - if true, set torchUseParsedThisTurn to avoid double-count when GM also confirms */
        function tryParsePackItemUse(text, fromPlayer = false) {
            if (!text) return;
            const t = text.toLowerCase();
            // Healing potion
            if (/\b(?:you\s+)?(?:drink|drank|consume|consumed|use|used)\s+(?:a|the)?\s*healing\s+potion\b/i.test(t) ||
                /\bhealing\s+potion\s+(?:restores?|heals?)\b/i.test(t)) {
                const before = gameState.character.inventory.find(i => i.name === 'Healing Potion');
                if (before && (typeof before.quantity === 'number') && before.quantity > 0) {
                    removeFromInventory('Healing Potion', 1);
                    debugLog('PARSE', 'Detected potion usage');
                }
            }
            // Rope
            if (/\b(?:you\s+)?(?:use|used|employ)\s+(?:the\s+)?rope\b/i.test(t) ||
                /\b(?:the\s+)?rope\s+(?:is\s+)?(?:used|uncoiled|tied)\b/i.test(t) ||
                /\bclimb\s+(?:with|using)\s+(?:the\s+)?rope\b/i.test(t)) {
                const before = gameState.character.inventory.find(i => i.name === 'Rope (50ft)' || i.name === 'Rope');
                if (before && (typeof before.quantity === 'number') && before.quantity > 0) {
                    removeFromInventory(before.name, 1);
                    debugLog('PARSE', 'Detected rope usage');
                }
            }
            // Rations
            if (/\b(?:you\s+)?(?:eat|ate|consume|consumed)\s+(?:some\s+|your\s+)?(?:rations?|food)\b/i.test(t) ||
                /\b(?:you\s+)?(?:use|used)\s+(?:some\s+|your\s+)?rations?\b/i.test(t)) {
                const before = gameState.character.inventory.find(i => i.name === 'Rations');
                if (before && (typeof before.quantity === 'number') && before.quantity > 0) {
                    removeFromInventory('Rations', 1);
                    debugLog('PARSE', 'Detected rations usage');
                }
            }
            // Torch (from pack - lighting one, pulling out, etc.)
            // Match both GM ("You pull out...") and player ("I pull out...") phrasing
            // Skip if we already parsed from player message this turn (avoid double-count)
            const torchUsed = !gameState.torchUseParsedThisTurn && (
                /\b(?:you|i)\s+(?:pull|pulled)\s+out\s+(?:a\s+|my\s+|your\s+)?torch\b/i.test(t) ||
                /\b(?:you|i)\s+(?:draw|drew)\s+(?:a\s+|my\s+|your\s+)?torch\b/i.test(t) ||
                /\b(?:you|i)\s+(?:light|lit|take|took)\s+(?:a\s+|my\s+|your\s+)?torch\s+(?:from\s+(?:my|your)\s+pack)?/i.test(t) ||
                /\b(?:you|i)\s+(?:light|lit)\s+(?:a\s+|my\s+|your\s+)?torch\b/i.test(t) ||
                /\b(?:pull|pulled)\s+out\s+(?:a\s+|my\s+|your\s+)?torch\s+(?:and\s+)?(?:light|lit)/i.test(t) ||
                /\b(?:light|lit)\s+(?:a\s+|my\s+|your\s+)?torch\b/i.test(t)
            );
            if (torchUsed) {
                const before = gameState.character.inventory.find(i => i.name === 'Torch');
                if (before && (typeof before.quantity === 'number') && before.quantity > 0) {
                    removeFromInventory('Torch', 1);
                    debugLog('PARSE', 'Detected torch use (lighting from pack)');
                }
                // Add Torch (lit) to Equipped when lighting one
                if (!gameState.equippedInUse.some(i => i.name === 'Torch (lit)')) {
                    gameState.equippedInUse.push({ name: 'Torch (lit)', stats: '20ft bright, 20ft dim, 1 hour duration' });
                    debugLog('PARSE', 'Added Torch (lit) to Equipped');
                }
                if (fromPlayer) gameState.torchUseParsedThisTurn = true;
                updateCharacterDisplay();
            }
            // Torch (put back in pack / stow / extinguish)
            const torchStowed = /\b(?:you|i)\s+(?:put|placed)\s+(?:the\s+)?torch\s+(?:back\s+)?(?:in|into)\s+(?:your|my)\s+pack\b/i.test(t) ||
                /\b(?:you|i)\s+(?:stow|stowed|put|puts?)\s+(?:the\s+)?torch\s+(?:away|back)?\b/i.test(t) ||
                /\b(?:you|i)\s+(?:extinguish|extinguished|douse|doused)\s+(?:the\s+)?torch\b/i.test(t) ||
                /\b(?:you|i)\s+(?:put|puts?)\s+(?:the\s+)?(?:lit\s+)?torch\s+away\b/i.test(t) ||
                /\b(?:put|puts?)\s+(?:the\s+)?torch\s+back\s+in\s+(?:your|my)\s+pack\b/i.test(t);
            if (torchStowed && gameState.equippedInUse.some(i => i.name === 'Torch (lit)')) {
                gameState.equippedInUse = gameState.equippedInUse.filter(i => i.name !== 'Torch (lit)');
                const torch = gameState.character.inventory.find(i => i.name === 'Torch');
                if (torch) {
                    torch.quantity = (torch.quantity || 0) + 1;
                } else {
                    gameState.character.inventory.push({ name: 'Torch', quantity: 1 });
                }
                updateCharacterDisplay();
                debugLog('PARSE', 'Torch put back in pack');
            }
            // Rope retrieval
            if (/\b(?:you\s+)?(?:retrieve|retrieved|recoil|recoiled|pick\s+up|picked\s+up)\s+(?:the\s+)?rope\b/i.test(t)) {
                const rope = gameState.character.inventory.find(i => i.name === 'Rope (50ft)' || i.name === 'Rope');
                if (rope) {
                    rope.quantity = (rope.quantity || 0) + 1;
                    updateCharacterDisplay();
                    debugLog('PARSE', 'Detected rope retrieval');
                } else {
                    addToInventory('Rope (50ft)', 1);
                    debugLog('PARSE', 'Detected rope retrieval (was not in pack)');
                }
            }
        }

        // ============================================
        // TEST UTILITIES
        // ============================================
        
        const TestUtils = {
            modifyHP(amount) {
                modifyHP(amount);
                addSystemMessage(`[DEBUG] HP adjusted by ${amount}`);
            },
            
            fullHeal() {
                gameState.character.hp = gameState.character.maxHp;
                updateCharacterDisplay();
                addSystemMessage('[DEBUG] Fully healed');
            },
            
            addXP(amount) {
                addXP(amount);
            },
            
            addPotion() {
                addToInventory('Healing Potion', 1);
                addSystemMessage('[DEBUG] Added healing potion');
            },
            
            addGold(amount) {
                addToInventory('Gold', amount);
                addSystemMessage(`[DEBUG] Added ${amount} gold`);
            },
            
            teleportToRoom(roomId) {
                if (gameData.module.rooms[roomId]) {
                    gameState.currentRoom = roomId;
                    const room = gameData.module.rooms[roomId];
                    addSystemMessage(`[DEBUG] Teleported to ${room.name}`);
                    addNarration(room.description);
                } else {
                    addSystemMessage(`[DEBUG] Room ${roomId} not found`);
                }
            },
            
            logState() {
                console.table({
                    HP: `${gameState.character.hp}/${gameState.character.maxHp}`,
                    XP: gameState.character.xp,
                    Room: gameState.currentRoom,
                    Gold: gameState.character.inventory.find(i => i.name.includes('Gold'))?.quantity || '0gp'
                });
                console.log('Full state:', gameState);
            },
            
            clearHistory() {
                gameState.conversationHistory = [];
                addSystemMessage('[DEBUG] Conversation history cleared');
            }
        };
        
        // Expose to console
        window.test = TestUtils;

        // ============================================
        // DEBUG PANEL TOGGLE
        // ============================================
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                const panel = document.getElementById('debugPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            }
        });

        // ============================================
        // START GAME
        // ============================================
        
        window.addEventListener('load', () => {
            debugLog('INIT', 'Page loaded, initializing game');
            initializeGame();
        });
    </script>
</body>
</html>
