        function submitAction() {
            const input = document.getElementById('playerInput');
            const action = input.value.trim();
            
            if (!action || gameState.waitingForRoll) return;
            
            tryParseWeaponAway(action);
            tryParseWeaponSwitch(action);
            tryParseArmorState(action);
            tryParseRetreat(action);
            gameState.torchUseParsedThisTurn = false; // reset each turn
            tryParsePackItemUse(action, true); // parse player's declared actions (e.g. "I pull out my torch and light it")
            
            addPlayerAction(action);
            input.value = '';
            
            gameState.conversationHistory.push({
                role: "user",
                content: action
            });
            
            callAIGM();
        }

        // ============================================
        // CONVERSATION HISTORY MANAGEMENT
        // ============================================
        
        function pruneConversationHistory() {
            if (gameState.conversationHistory.length > CONFIG.MAX_HISTORY_TURNS) {
                debugLog('HISTORY', `Pruning conversation history (${gameState.conversationHistory.length} turns)`);
                const intro = gameState.conversationHistory.slice(0, 2);
                const recent = gameState.conversationHistory.slice(-(CONFIG.MAX_HISTORY_TURNS - 2));
                gameState.conversationHistory = [...intro, ...recent];
                debugLog('HISTORY', `History pruned to ${gameState.conversationHistory.length} turns`);
            }
        }

        // ============================================
        // AI GM INTEGRATION
        // ============================================
        
        async function callAIGM() {
            disableInput(true);
            const loader = addLoadingIndicator();
            
            // Prune history before making call
            pruneConversationHistory();
            
            try {
                const systemPrompt = buildSystemPrompt();
                const messages = [...gameState.conversationHistory];
                
                debugLog('AI', 'Calling AI GM', { 
                    historyLength: messages.length,
                    currentRoom: gameState.currentRoom 
                });
                
                const response = await fetch(CONFIG.API_ENDPOINT, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: CONFIG.MODEL,
                        max_tokens: CONFIG.MAX_TOKENS,
                        system: systemPrompt,
                        messages: messages
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                removeLoadingIndicator();
                
                const aiResponse = data.content[0].text;
                debugLog('AI', 'Received AI response', { length: aiResponse.length });
                
                gameState.conversationHistory.push({
                    role: "assistant",
                    content: aiResponse
                });
                
                processAIResponse(aiResponse);
                
            } catch (error) {
                removeLoadingIndicator();
                console.error('AI GM Error:', error);
                
                let errorMsg = 'Unknown error';
                if (error.message.includes('Failed to fetch')) {
                    errorMsg = 'Server not running. Start server.js first!';
                } else if (error.message.includes('API error: 401')) {
                    errorMsg = 'Invalid API key in server.js';
                } else if (error.message.includes('API error: 429')) {
                    errorMsg = 'Rate limit exceeded. Wait a moment.';
                } else {
                    errorMsg = error.message;
                }
                
                addErrorMessage(errorMsg);
                disableInput(false);
            }
        }

        function buildSystemPrompt() {
            const char = gameState.character;
            const room = gameData.module.rooms[gameState.currentRoom];
            
            // Defensive check
            if (!char || !char.abilities) {
                console.error('Character not initialized properly!', gameState.character);
                throw new Error('Character data missing');
            }
            
            debugLog('PROMPT', 'Building system prompt', {
                character: char.name,
                room: room.name,
                abilities: Object.keys(char.abilities)
            });
            
            // Build encounter info if present
            let encounterInfo = '';
            if (room.encounters && room.encounters.length > 0) {
                encounterInfo = '\n\n## Active Encounters — use these EXACT stats; current HP is tracked for you (monster is DEFEATED when it reaches 0):\n';
                for (const enc of room.encounters) {
                    encounterInfo += buildEncounterDescription(enc, true) + '\n';
                }
            } else {
                encounterInfo = '\n\n## Active Encounters: NONE — there are no monsters in this room. Do not add or invent any monsters.\n';
            }
            
            const layoutBlock = buildModuleLayoutForPrompt();
            
            return `You are the Game Master for an OSR-style dungeon crawl: ${gameData.module.module.title}.

# CRITICAL RULES

## DUNGEON LAYOUT — USE ONLY THE MODULE DATA
You MUST use ONLY the layout and content in the module data block below. Do NOT invent rooms, exits, room descriptions, or features.
- When describing a room, use the exact "Description" and "Features" text from the module.
- When the player moves, only allow movement to the "Exits" listed for the current room.
- Do not add new rooms, new exits, or new features. Each play-through must match the module.
${layoutBlock}

## RESPONSE LENGTH
- Keep responses between 50-100 words typically
- Longer (150 words max) only for major reveals or room descriptions
- Shorter (20-40 words) for simple acknowledgments or quick narration
- NEVER write 200+ word responses

## WHO ROLLS — PLAYER ONLY ROLLS FOR THEIR OWN ACTIONS
The player rolls ONLY for their own character's actions: their attack roll (d20), their damage roll (weapon dice), their skill/ability checks (Perception, Strength, etc.).
- You (the GM) resolve ALL monster/NPC actions. Never ask the player to roll for the goblin, the monster, or any enemy. When the monster attacks, you determine the monster's attack roll and result (or narrate the outcome) and say e.g. "The goblin attacks... and hits you for 4 damage" or "The goblin misses." Do NOT use [ROLL_REQUEST: ...] for monster attacks.
- Only use [ROLL_REQUEST: ...] when the PLAYER's character is doing something that requires a roll (player attacks, player searches, player makes a check, player rolls damage after hitting).

## DICE ROLL REQUESTS (player actions only)
Use EXACTLY one of these formats when the PLAYER must roll. The app shows the correct dice for each:
- **Ability/attack rolls (d20):** [ROLL_REQUEST: Strength], [ROLL_REQUEST: Perception], etc.
- **Weapon damage:** [ROLL_REQUEST: Damage] — player rolls their readied weapon (e.g. 1d8 for longsword, 1d6 for shortbow).
- **Healing potion:** [ROLL_REQUEST: Healing Potion] or [ROLL_REQUEST: Healing] — player rolls 2d4+2.
- **Custom dice:** [ROLL_REQUEST: 2d4+2], [ROLL_REQUEST: 1d6], etc. — use when the roll has a specific formula.
Do NOT ask for a d20 for damage or healing. Wait for the player to roll before continuing.

## HIT RULE — ATTACK ROLL VS AC
An attack HITS only if the attack roll is **greater than or equal to** the target's AC.
- Example: roll 14 vs AC 16 = MISS (14 < 16). Never say the attack hit.
- Example: roll 16 vs AC 16 = HIT. Always state hit/miss correctly using this rule.

## COMBAT STATE — YOU CONTROL IT
**You decide when the party is in combat.** Include one of these tags in your response so the app tracks combat correctly:
- **When combat begins** (first attack, initiative, etc.): include **[COMBAT: on]** in your response. Example: "The goblin draws its blade! [COMBAT: on] Roll initiative!"
- **When combat ends** (all enemies defeated, player dies, retreat, etc.): include **[COMBAT: off]** in your response. Example: "The last goblin falls. [COMBAT: off] The room is quiet."
The tag is stripped from the displayed text; the player will not see it. Use your judgment — a tense standoff might not be combat until blades are drawn; a chase might end combat when the player escapes.

## INITIATIVE — PLAYER ACTS FIRST
By default the **player acts first** in combat. Enemies attack first only if (1) they surprise the player (e.g. ambush, failed perception), or (2) the player explicitly defers ("I wait", "I hold my action", "they can go first"). When combat begins without surprise, prompt the player for their action first; do not have the monster attack before the player has had a chance to act.

## COMBAT SEQUENCING - CRITICAL
Combat happens in STRICT steps. Never combine steps:

**Player declares attack -> Wait**
**Player rolls attack (d20) -> You compare to AC: if roll >= AC say HIT and use [ROLL_REQUEST: Damage]; if roll < AC say MISS and no damage roll**
**Player rolls damage (weapon dice) -> You narrate damage effect -> Enemy's turn begins**

**KILL RULE — damage >= remaining HP = dead:** When the player's last message is a damage roll (e.g. "I rolled 11"), compare that number to the monster's **current HP remaining** in the Active Encounters block. If the damage roll is **greater than or equal to** that remaining HP, the monster is **defeated in this response** — narrate its death, award On death XP and treasure, and do not say it is still standing or has any HP left. Example: Goblin has 7 HP (or 4/7 remaining); player rolls 11 (or 5) — 11 >= 7 (or 5 >= 4), so the goblin is dead now.

**Enemy's turn -> You resolve the monster's attack yourself. Roll or decide the monster's attack vs player AC, then narrate hit or miss and any damage to the player. Do NOT ask the player to roll for the monster.**

**Show enemy rolls in the narrative:** When the monster attacks, state the roll and result clearly so the player can see the math. Examples: "The goblin attacks: <code>14 vs AC 16 = miss</code>." or "The goblin attacks: <code>17 to hit, 5 damage</code> (1d6+2 = 5)." Always include the attack roll vs your AC and, if it hits, the damage roll (e.g. 1d6+2 = 5) in the text.

NEVER ask the player to roll for enemies. NEVER narrate enemy actions before player's damage roll. NEVER combine multiple steps in one response.

## MELEE VS RANGED COMBAT
**Melee combat** = combatants within reach to attack with handheld weapons.
**Ranged combat** = targets outside melee reach; ranged weapons can be used.

**Rules:**
- **Cannot use ranged weapons in melee range.** If the player (or monster) is in melee range of an enemy, they must use a melee weapon. Ranged weapons (bows, crossbows, etc.) cannot be used when an enemy is adjacent.
- **Cannot use melee weapons outside melee range.** If the target is too far for melee (e.g. across the room, on a ledge), only ranged weapons work.
- **You judge distances.** When the player declares an attack, determine whether they are in melee or ranged distance. If they try to use the wrong weapon type for the situation, narrate that they cannot (e.g. "The goblin is right in front of you — you'd need to use your longsword, not the bow") or that they must close/retreat first.
- Monster attacks list melee vs ranged; choose the appropriate attack based on distance.

## MONSTERS — ONLY FROM ACTIVE ENCOUNTERS / EXACT STATS
Use ONLY the monsters listed in "Active Encounters" for the current room. Do not invent or add any other monsters.
**Current HP is tracked for you** in the Active Encounters block (e.g. "3/7 HP remaining" or "DEFEATED (0/7 HP)"). If the player just dealt damage and that damage is >= the monster's current HP remaining, the monster is defeated **in your response** — narrate death and awards; do not say it is still standing. When the block already says **DEFEATED**, the monster is dead — narrate its death and award On death XP/treasure; do not say it is still alive or let it act again.
**Use the EXACT AC from the block:** Each monster's AC is the number given in Active Encounters (e.g. Goblin AC 13 — never say 15 or any other number). When judging whether the player's attack hits, compare their roll to this AC only. Do not substitute a different AC.
Use the EXACT attack bonus and damage from the block. If Active Encounters is empty or says NONE, there are no monsters in this room.

## STATE TRACKING
When HP/XP/inventory changes, use specific phrasing:
- Damage (to the player only): "You take 8 damage" or "The goblin hits you for 4 damage"
- Healing: "You heal 6 HP"
- XP: Award exactly the amount in the encounter's "On death" (e.g. "You gain 25 XP" for the goblin — use the number from the module, not a different amount)
- Items: "You find a healing potion" or "You discover 25 gold" (use treasure amounts from the encounter's on_death)
- Pack item use: When the player uses a consumable or item from their Pack, say so explicitly (e.g. "You drink a healing potion", "You use the rope to climb", "You eat some rations"). For torch: when they light one from their pack, say "You pull out a torch and light it" — this updates Pack and shows the lit torch in Equipped. When they put it away, say "You put the torch back in your pack" or "You stow the torch" — this removes it from Equipped and adds 1 back to Pack. If they retrieve the rope later, say "You retrieve the rope".

## WEAPON CLICKS (player clicks a weapon in Equipped)
When the player clicks a weapon in the character panel, they send a contextual message:
- **Out of combat, weapon not readied:** "I ready my [weapon]" — narrate them drawing/readying the weapon. They have now readied it.
- **Out of combat, weapon already readied:** "I check my [weapon] — it's already drawn" — respond that it's already in hand; you may briefly describe the weapon (e.g. its condition, heft).
- **In combat:** "I want to attack with my [weapon]" — **You MUST verify with the player before narrating the attack.** Ask something like "Do you want to attack the [enemy] with your [weapon]?" or "You raise your [weapon]. Attack the goblin?" Wait for confirmation before proceeding to the attack roll.

## FORMATTING
Use HTML tags: <b>bold</b>, <i>italic</i>, <code>dice results</code>

        function processAIResponse(response) {
            debugLog('AI', 'Processing AI response');
            
            // Strip [COMBAT: on/off] from display (GM uses it to set state; we parse in parseStateChanges)
            const displayResponse = response.replace(/\[COMBAT:\s*(on|off|true|false|yes|no)\]/gi, '').trim();
            
            // Parse for state changes BEFORE displaying
            parseStateChanges(response);
            
            // Check for roll request (captures "Damage", "Healing Potion", "2d4+2", "Strength", etc.)
            const rollRequestPattern = /\[ROLL_REQUEST:\s*([^\]]+)\]/i;
            const match = displayResponse.match(rollRequestPattern);
            
            if (match) {
                const ability = match[1].trim();
                if (ability.toLowerCase() === 'damage') {
                    gameState.inCombat = true;
                    if (!gameState.readiedWeaponName) {
                        const sources = gameData.character && gameData.character.equipment
                            ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                            : [];
                        const firstWeapon = sources.find(w => w.damage);
                        if (firstWeapon) {
                            gameState.readiedWeaponName = firstWeapon.name;
                            updateCharacterDisplay();
                            debugLog('PARSE', `Readied weapon (default for damage roll): ${firstWeapon.name}`);
                        }
                    }
                }
                const formattedResponse = displayResponse.replace(rollRequestPattern, '').trim();
                addNarration(formattedResponse);
                showDiceSection(`Roll ${ability}:`, ability);
            } else {
                addNarration(displayResponse);
                disableInput(false);
            }
        }
        
        /** Parse "goblin takes 5 damage" / "hits the goblin for 5" and update tracked monster HP. Checks all rooms so we record damage even if currentRoom was wrong. */
        function parseMonsterDamage(text) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms) return;
            if (!gameState.damageToEncounters) gameState.damageToEncounters = {};
            let roomWithUpdate = null;
            for (const [roomId, room] of Object.entries(rooms)) {
                if (!room || !room.encounters || room.encounters.length === 0) continue;
                for (const enc of room.encounters) {
                    const monster = resolveMonster(enc.monster_ref);
                    if (!monster) continue;
                    const names = [enc.name, monster.name].filter(Boolean);
                    const escapedNames = names.map(n => n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|');
                    const patterns = [
                        new RegExp(`(?:the\\s+)?(?:${escapedNames})\\s+takes\\s+(\\d+)\\s+(?:damage|HP)`, 'gi'),
                        new RegExp(`(?:hits?|strikes?|deals?)\\s+(?:the\\s+)?(?:${escapedNames})\\s+for\\s+(\\d+)\\s*(?:damage|HP)?`, 'gi'),
                        new RegExp(`(\\d+)\\s+(?:damage|HP)\\s+(?:to|against)\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi'),
                        new RegExp(`(?:deal|deals?|dealt)\\s+(?:the\\s+)?(?:${escapedNames})\\s+(\\d+)\\s+(?:damage|HP)`, 'gi'),
                        new RegExp(`(?:deal|deals?|dealt)\\s+(\\d+)\\s+(?:damage|HP)\\s+(?:to|against)\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi')
                    ];
                    for (const re of patterns) {
                        let m;
                        re.lastIndex = 0;
                        while ((m = re.exec(text)) !== null) {
                            const damage = parseInt(m[1], 10);
                            gameState.damageToEncounters[enc.id] = (gameState.damageToEncounters[enc.id] || 0) + damage;
                            gameState.inCombat = true;
                            roomWithUpdate = roomId;
                            debugLog('PARSE', `Monster damage: ${enc.name} +${damage} (total: ${gameState.damageToEncounters[enc.id]}/${monster.hp})`);
                        }
                    }
                    const deathPattern = new RegExp(`(?:${escapedNames})\\s+(?:falls?|is\\s+dead|dies?|is\\s+defeated|is\\s+slain)|(?:kill|slay|defeat)s?\\s+(?:the\\s+)?(?:${escapedNames})`, 'gi');
                    if (deathPattern.test(text)) {
                        const current = gameState.damageToEncounters[enc.id] || 0;
                        if (current < monster.hp) {
                            gameState.damageToEncounters[enc.id] = monster.hp;
                            roomWithUpdate = roomId;
                            debugLog('PARSE', `Monster defeated (narrative): ${enc.name}`);
                        }
                    }
                }
            }
            if (roomWithUpdate) {
                const room = rooms[roomWithUpdate];
                gameState.currentRoom = roomWithUpdate;
                if (room && room.encounters && room.encounters.length > 0) {
                    const allDefeated = room.encounters.every(enc => getEncounterHP(enc).defeated);
                    if (allDefeated) {
                        gameState.inCombat = false;
                        debugLog('PARSE', 'Combat ended: all enemies defeated');
                    }
                }
            }
        }
        
        /** If narrative indicates the player entered a different room, update currentRoom so combat indicator etc. are correct. */
        function tryParseRoomChange(text) {
            const rooms = gameData.module && gameData.module.rooms;
            if (!rooms || !text) return;
            const t = text.toLowerCase();
            const movementWord = /\b(?:enter|reach|arrive|step into|are now in|find yourself in|head (?:in)?to|go (?:in)?to)\b/.test(t);
            if (!movementWord) return;
            for (const [roomId, room] of Object.entries(rooms)) {
                if (!room || !room.name) continue;
                if (roomId === gameState.currentRoom) continue;
                const roomName = room.name.toLowerCase();
                if (t.includes(roomName)) {
                    gameState.currentRoom = roomId;
                    updateCharacterDisplay();
                    debugLog('PARSE', `Room changed to: ${roomId} (${room.name})`);
                    return;
                }
            }
        }
        
        /** Parse [COMBAT: on] and [COMBAT: off] — GM explicitly sets combat state. Takes precedence over heuristics. */
        function tryParseCombatTag(text) {
            if (!text) return;
            const onMatch = text.match(/\[COMBAT:\s*(on|true|yes)\]/i);
            const offMatch = text.match(/\[COMBAT:\s*(off|false|no)\]/i);
            if (onMatch) {
                gameState.inCombat = true;
                gameState.combatStateFromTag = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat state: on (GM tag)');
            } else if (offMatch) {
                gameState.inCombat = false;
                gameState.combatStateFromTag = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat state: off (GM tag)');
            }
        }

        /** Fallback: if GM says combat begins/starts (and no explicit tag), set in-combat. */
        function tryParseCombatBegins(text) {
            if (!text) return;
            if (text.match(/\[COMBAT:\s*(on|off|true|false)\]/i)) return; // GM used tag, skip heuristic
            const t = text.toLowerCase();
            if (/\bcombat\s+(?:begins?|starts?)\b/.test(t) || /\b(?:the\s+)?(?:fight|battle)\s+(?:begins?|starts?|is\s+on)\b/.test(t) || /\b(?:you\s+are\s+)(?:in\s+)?combat\b/.test(t)) {
                gameState.inCombat = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat began (GM narrative fallback)');
            }
        }
        
        /** If narrative or player message indicates retreat/flee, end combat. */
        function tryParseRetreat(text) {
            if (!text) return;
            const t = text.toLowerCase();
            const gmNarrative = /\b(?:you\s+)(?:run|retreat|flee|escape|withdraw|manage to|succeed in)\b/.test(t) ||
                /\b(?:you\s+)(?:run|retreat|flee|escape)\s+(?:away|safely|back)/.test(t) ||
                /\b(?:run\s+away|retreat|fled|escape|withdraw)\b.*\b(?:safely|successfully|manage)\b/.test(t);
            const playerDeclares = /\b(?:i\s+)(?:run\s+away|retreat|flee|escape|withdraw|disengage)\b/.test(t) ||
                /\b(?:i'll\s+)(?:run\s+away|retreat|flee|escape)\b/.test(t);
            if (gmNarrative || playerDeclares) {
                gameState.inCombat = false;
                updateCharacterDisplay();
                debugLog('PARSE', 'Combat ended: retreat/flee');
            }
        }
        
        /** If text mentions removing or donning armor, update armorEquipped and AC. */
        function tryParseArmorState(text) {
            const t = text.toLowerCase();
            if (/\b(?:remove|take off|doff|strip off|unequip)\s+(?:your?)?\s*(?:armor|chain mail|mail)\b/i.test(t) ||
                /\b(?:you\s+)?(?:remove|doff)\s+(?:your?)?\s*(?:armor|chain mail)\b/i.test(t)) {
                gameState.armorEquipped = false;
                updateCharacterDisplay();
                debugLog('PARSE', 'Armor removed; AC now unarmored');
            } else if (/\b(?:put on|don|equip|wear)\s+(?:your?)?\s*(?:armor|chain mail|mail)\b/i.test(t) ||
                /\b(?:you\s+)?(?:don|put on)\s+(?:your?)?\s*(?:armor|chain mail)\b/i.test(t)) {
                gameState.armorEquipped = true;
                updateCharacterDisplay();
                debugLog('PARSE', 'Armor donned');
            }
        }
        
        /** If text mentions putting away / sheathing a weapon, clear readied weapon so no weapon is highlighted. */
        function tryParseWeaponAway(text) {
            if (!text) return;
            const t = text.toLowerCase();
            if (/\b(?:put|puts?)\s+(?:my|your?|the)\s+(?:sword|weapon|blade|longsword|shortbow)\s+away\b/.test(t) ||
                /\b(?:put|puts?)\s+away\s+(?:my|your?|the)\s+(?:sword|weapon|blade|longsword|shortbow)\b/.test(t) ||
                /\bsheathe?s?\s+(?:my|your?|the)\s+(?:sword|weapon|blade)?\b/.test(t) ||
                /\bstow?s?\s+(?:my|your?|the)\s+(?:sword|weapon)\b/.test(t) ||
                /\b(?:you\s+)?(?:put|sheathe?|stow)\s+(?:your?\s+)?(?:sword|weapon)\s+away\b/.test(t)) {
                gameState.readiedWeaponName = null;
                updateCharacterDisplay();
                debugLog('PARSE', 'Readied weapon cleared (put away / sheathed)');
            }
        }
        
        /** If text mentions switching/drawing/readying/attacking with a weapon, set readied weapon and update panel. */
        function tryParseWeaponSwitch(text) {
            const sources = gameData.character && gameData.character.equipment
                ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                : [];
            const weaponNames = sources.filter(w => w.damage).map(w => w.name).filter(Boolean);
            for (const name of weaponNames) {
                const escaped = name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const patterns = [
                    new RegExp(`(?:switch|switch to|draw|ready|use|wield|pull out)\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:attack|strike|hit)\\s+(?:with|using)\\s+(?:your?|my\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:attack|strike)\\s+(?:the\\s+)?[^\\s]+\\s+with\\s+(?:your?|my\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:you\\s+)?(?:draw|ready|switch to)\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`(?:you\\s+)?(?:attack|strike)\\s+with\\s+(?:your?\\s+)?(?:the\\s+)?${escaped}`, 'i'),
                    new RegExp(`${escaped}\\s+(?:is\\s+)?(?:now\\s+)?(?:readied?|drawn|out)`, 'i')
                ];
                for (const p of patterns) {
                    if (p.test(text)) {
                        gameState.readiedWeaponName = name;
                        updateCharacterDisplay();
                        debugLog('PARSE', `Readied weapon set to: ${name}`);
                        return;
                    }
                }
            }
        }
        
        function parseStateChanges(text) {
            debugLog('PARSE', 'Parsing state changes from AI response');
            gameState.combatStateFromTag = false; // reset; set true if GM used [COMBAT: on/off]
            // Strip HTML so "You take <b>4</b> damage" is parseable (GM may use <b>/<i> in responses)
            const plainText = text.replace(/<[^>]*>/g, ' ');
            
            tryParseRoomChange(plainText);
            tryParseCombatTag(plainText);   // GM tag takes precedence
            tryParseCombatBegins(plainText);
            tryParseRetreat(plainText);
            tryParseCombatBegins(plainText);
            tryParseWeaponAway(plainText);
            tryParseWeaponSwitch(plainText);
            tryParseArmorState(plainText);
            parseMonsterDamage(plainText);
            updateCharacterDisplay();
            
            // Parse HP changes - DAMAGE (only when the PLAYER receives damage, not when the player deals damage)
            // Order matters: try explicit "you take/suffer/lose" first, then "hits you for X"
            const damageToPlayerPatterns = [
                /(?:you\s+)(?:take|taking|suffer|lose)\s+(\d+)\s+(?:damage|HP)/i,
                /(?:take|taking|suffer|lose)\s+(\d+)\s+(?:damage|HP)/i,
                /(?:hits?|strikes?|deals?)\s+(?:you|your)\s+(?:for\s+)?(\d+)\s*(?:damage|HP)?/i,
                /(?:you'?re?)\s+hit\s+for\s+(\d+)/i,
                /hits?\s+you\s+for\s+(\d+)/i,
                /dealing\s+(\d+)\s+(?:damage|HP)\s+to\s+you/i,
                /(\d+)\s+(?:damage|HP)\s+(?:to\s+you|against\s+you)/i
            ];
            
            for (const pattern of damageToPlayerPatterns) {
                const match = plainText.match(pattern);
                if (match) {
                    const damage = parseInt(match[1], 10);
                    debugLog('PARSE', `Detected damage TO PLAYER: ${damage}`);
                    if (!gameState.combatStateFromTag) gameState.inCombat = true; // GM tag overrides
                    modifyHP(-damage);
                    break;
                }
            }
            
            // Parse HP changes - HEALING
            const healPatterns = [
                /(?:heal|restore|regain)\s+(\d+)\s+(?:HP|hit points)/i,
                /(\d+)\s+HP\s+(?:restored|healed)/i
            ];
            
            for (const pattern of healPatterns) {
                const match = plainText.match(pattern);
                if (match) {
                    const healing = parseInt(match[1]);
                    debugLog('PARSE', `Detected healing: ${healing}`);
                    modifyHP(healing);
                    break;
                }
            }
            
            // Parse XP gains
            const xpPattern = /(?:gain|earn|receive)\s+(\d+)\s+XP/i;
            const xpMatch = plainText.match(xpPattern);
            if (xpMatch) {
                const xp = parseInt(xpMatch[1]);
                debugLog('PARSE', `Detected XP gain: ${xp}`);
                addXP(xp);
            }
            
            // Parse gold found
            const goldPatterns = [
                /(?:find|discover|obtain|gain)\s+(\d+)\s*gp/i,
                /(\d+)\s+gold/i
            ];
            
            for (const pattern of goldPatterns) {
                const match = plainText.match(pattern);
                if (match) {
                    const gold = parseInt(match[1]);
                    debugLog('PARSE', `Detected gold: ${gold}`);
                    addToInventory('Gold', gold);
                    break;
                }
            }
            
            // Parse item acquisition
            const itemPattern = /(?:find|discover|obtain|take)\s+(?:a|an|the)\s+([^.!?,]+?)(?:\.|!|,|\s+in\s+|\s+from\s+)/i;
            const itemMatch = plainText.match(itemPattern);
            if (itemMatch && !plainText.match(/gold|damage|HP/i)) {
                const itemName = itemMatch[1].trim();
                if (itemName.length < 30 && !itemName.includes('you') && !itemName.includes('your')) {
                    debugLog('PARSE', `Detected item: ${itemName}`);
                    addToInventory(itemName, 1);
                }
            }
            
            tryParsePackItemUse(plainText, false); // GM response (skip if already parsed from player)
        }

        /** Parse when player uses Pack items (potion, rope, rations, torch) and decrement quantity.
         * @param {string} text - GM or player narrative text
         * @param {boolean} fromPlayer - if true, set torchUseParsedThisTurn to avoid double-count when GM also confirms */
        function tryParsePackItemUse(text, fromPlayer = false) {
            if (!text) return;
            const t = text.toLowerCase();
            // Healing potion
            if (/\b(?:you\s+)?(?:drink|drank|consume|consumed|use|used)\s+(?:a|the)?\s*healing\s+potion\b/i.test(t) ||
                /\bhealing\s+potion\s+(?:restores?|heals?)\b/i.test(t)) {
                const before = gameState.character.inventory.find(i => i.name === 'Healing Potion');
                if (before && (typeof before.quantity === 'number') && before.quantity > 0) {
                    removeFromInventory('Healing Potion', 1);
                    debugLog('PARSE', 'Detected potion usage');
                }
            }
            // Rope
            if (/\b(?:you\s+)?(?:use|used|employ)\s+(?:the\s+)?rope\b/i.test(t) ||
                /\b(?:the\s+)?rope\s+(?:is\s+)?(?:used|uncoiled|tied)\b/i.test(t) ||
                /\bclimb\s+(?:with|using)\s+(?:the\s+)?rope\b/i.test(t)) {
                const before = gameState.character.inventory.find(i => i.name === 'Rope (50ft)' || i.name === 'Rope');
                if (before && (typeof before.quantity === 'number') && before.quantity > 0) {
                    removeFromInventory(before.name, 1);
                    debugLog('PARSE', 'Detected rope usage');
                }
            }
            // Rations
            if (/\b(?:you\s+)?(?:eat|ate|consume|consumed)\s+(?:some\s+|your\s+)?(?:rations?|food)\b/i.test(t) ||
                /\b(?:you\s+)?(?:use|used)\s+(?:some\s+|your\s+)?rations?\b/i.test(t)) {
                const before = gameState.character.inventory.find(i => i.name === 'Rations');
                if (before && (typeof before.quantity === 'number') && before.quantity > 0) {
                    removeFromInventory('Rations', 1);
                    debugLog('PARSE', 'Detected rations usage');
                }
            }
            // Torch (from pack - lighting one, pulling out, etc.)
            // Match both GM ("You pull out...") and player ("I pull out...") phrasing
            // Skip if we already parsed from player message this turn (avoid double-count)
            const torchUsed = !gameState.torchUseParsedThisTurn && (
                /\b(?:you|i)\s+(?:pull|pulled)\s+out\s+(?:a\s+|my\s+|your\s+)?torch\b/i.test(t) ||
                /\b(?:you|i)\s+(?:draw|drew)\s+(?:a\s+|my\s+|your\s+)?torch\b/i.test(t) ||
                /\b(?:you|i)\s+(?:light|lit|take|took)\s+(?:a\s+|my\s+|your\s+)?torch\s+(?:from\s+(?:my|your)\s+pack)?/i.test(t) ||
                /\b(?:you|i)\s+(?:light|lit)\s+(?:a\s+|my\s+|your\s+)?torch\b/i.test(t) ||
                /\b(?:pull|pulled)\s+out\s+(?:a\s+|my\s+|your\s+)?torch\s+(?:and\s+)?(?:light|lit)/i.test(t) ||
                /\b(?:light|lit)\s+(?:a\s+|my\s+|your\s+)?torch\b/i.test(t)
            );
            if (torchUsed) {
                const before = gameState.character.inventory.find(i => i.name === 'Torch');
                if (before && (typeof before.quantity === 'number') && before.quantity > 0) {
                    removeFromInventory('Torch', 1);
                    debugLog('PARSE', 'Detected torch use (lighting from pack)');
                }
                // Add Torch (lit) to Equipped when lighting one
                if (!gameState.equippedInUse.some(i => i.name === 'Torch (lit)')) {
                    gameState.equippedInUse.push({ name: 'Torch (lit)', stats: '20ft bright, 20ft dim, 1 hour duration' });
                    debugLog('PARSE', 'Added Torch (lit) to Equipped');
                }
                if (fromPlayer) gameState.torchUseParsedThisTurn = true;
                updateCharacterDisplay();
            }
            // Torch (put back in pack / stow / extinguish)
            const torchStowed = /\b(?:you|i)\s+(?:put|placed)\s+(?:the\s+)?torch\s+(?:back\s+)?(?:in|into)\s+(?:your|my)\s+pack\b/i.test(t) ||
                /\b(?:you|i)\s+(?:stow|stowed|put|puts?)\s+(?:the\s+)?torch\s+(?:away|back)?\b/i.test(t) ||
                /\b(?:you|i)\s+(?:extinguish|extinguished|douse|doused)\s+(?:the\s+)?torch\b/i.test(t) ||
                /\b(?:you|i)\s+(?:put|puts?)\s+(?:the\s+)?(?:lit\s+)?torch\s+away\b/i.test(t) ||
                /\b(?:put|puts?)\s+(?:the\s+)?torch\s+back\s+in\s+(?:your|my)\s+pack\b/i.test(t);
            if (torchStowed && gameState.equippedInUse.some(i => i.name === 'Torch (lit)')) {
                gameState.equippedInUse = gameState.equippedInUse.filter(i => i.name !== 'Torch (lit)');
                const torch = gameState.character.inventory.find(i => i.name === 'Torch');
                if (torch) {
                    torch.quantity = (torch.quantity || 0) + 1;
                } else {
                    gameState.character.inventory.push({ name: 'Torch', quantity: 1 });
                }
                updateCharacterDisplay();
                debugLog('PARSE', 'Torch put back in pack');
            }
            // Rope retrieval
            if (/\b(?:you\s+)?(?:retrieve|retrieved|recoil|recoiled|pick\s+up|picked\s+up)\s+(?:the\s+)?rope\b/i.test(t)) {
                const rope = gameState.character.inventory.find(i => i.name === 'Rope (50ft)' || i.name === 'Rope');
                if (rope) {
                    rope.quantity = (rope.quantity || 0) + 1;
                    updateCharacterDisplay();
                    debugLog('PARSE', 'Detected rope retrieval');
                } else {
                    addToInventory('Rope (50ft)', 1);
                    debugLog('PARSE', 'Detected rope retrieval (was not in pack)');
                }
            }
        }

        // ============================================
        // TEST UTILITIES
        // ============================================
        
        const TestUtils = {
            modifyHP(amount) {
                modifyHP(amount);
                addSystemMessage(`[DEBUG] HP adjusted by ${amount}`);
            },
            
            fullHeal() {
                gameState.character.hp = gameState.character.maxHp;
                updateCharacterDisplay();
                addSystemMessage('[DEBUG] Fully healed');
            },
            
            addXP(amount) {
                addXP(amount);
            },
            
            addPotion() {
                addToInventory('Healing Potion', 1);
                addSystemMessage('[DEBUG] Added healing potion');
            },
            
            addGold(amount) {
                addToInventory('Gold', amount);
                addSystemMessage(`[DEBUG] Added ${amount} gold`);
            },
            
            teleportToRoom(roomId) {
                if (gameData.module.rooms[roomId]) {
                    gameState.currentRoom = roomId;
                    const room = gameData.module.rooms[roomId];
                    addSystemMessage(`[DEBUG] Teleported to ${room.name}`);
                    addNarration(room.description);
                } else {
                    addSystemMessage(`[DEBUG] Room ${roomId} not found`);
                }
            },
            
            logState() {
                console.table({
                    HP: `${gameState.character.hp}/${gameState.character.maxHp}`,
                    XP: gameState.character.xp,
                    Room: gameState.currentRoom,
                    Gold: gameState.character.inventory.find(i => i.name.includes('Gold'))?.quantity || '0gp'
                });
                console.log('Full state:', gameState);
            },
            
            clearHistory() {
                gameState.conversationHistory = [];
                addSystemMessage('[DEBUG] Conversation history cleared');
            }
        };
        
        // Expose to console
        window.test = TestUtils;

        // ============================================
        // DEBUG PANEL TOGGLE
        // ============================================
        
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.key === 'D') {
                const panel = document.getElementById('debugPanel');
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            }
        });

        // ============================================
        // START GAME
        // ============================================
        
        window.addEventListener('load', () => {
            debugLog('INIT', 'Page loaded, initializing game');
            initializeGame();
        });
    </script>
</body>
</html>
