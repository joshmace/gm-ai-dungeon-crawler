<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Dungeon Crawler - v2 Testing Build</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Crimson Text', 'Georgia', serif;
            background: linear-gradient(to bottom, #1a1410 0%, #2d2416 100%);
            color: #e8dcc4;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 20px;
            transition: all 0.3s ease;
            padding-left: 280px;
        }

        /* Character Panel - Fixed Full Height */
        .character-panel {
            width: 260px;
            background: rgba(25, 20, 15, 0.9);
            border: 2px solid #5a4a3a;
            border-radius: 8px;
            overflow-y: auto;
            overflow-x: hidden;
            flex-shrink: 0;
            position: fixed;
            left: 20px;
            top: 20px;
            bottom: 20px;
            transition: all 0.3s ease;
        }

        .character-panel::-webkit-scrollbar {
            width: 8px;
        }

        .character-panel::-webkit-scrollbar-track {
            background: #1a1410;
        }

        .character-panel::-webkit-scrollbar-thumb {
            background: #5a4a3a;
            border-radius: 4px;
        }

        .character-header {
            background: linear-gradient(to bottom, #3d2f1f, #2a1f15);
            padding: 12px;
            border-bottom: 2px solid #5a4a3a;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .character-header.in-combat {
            background: linear-gradient(to bottom, #4a1a1a, #2a0f0f);
            border: 2px solid #c03030;
            border-bottom-color: #c03030;
            box-shadow: 0 0 10px rgba(192, 48, 48, 0.3);
        }

        .character-header.in-combat .character-name {
            color: #ff6b6b;
        }

        .character-portrait {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #d4af37;
            background: linear-gradient(135deg, #5a4a3a, #3a2a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
            color: #d4af37;
            margin: 0 auto 8px auto;
        }

        .character-name {
            font-size: 1.1em;
            color: #d4af37;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .character-class {
            color: #b8a888;
            font-size: 0.85em;
        }

        .quick-stats {
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            border-bottom: 1px solid #5a4a3a;
        }

        .stat-box {
            background: rgba(61, 47, 31, 0.4);
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            padding: 8px 6px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.7em;
            color: #8a7a6a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 3px;
        }

        .stat-value {
            font-size: 1.2em;
            color: #e8dcc4;
            font-weight: bold;
        }

        .stat-value.hp {
            color: #c85050;
        }

        .stat-value.ac {
            color: #7a9aba;
        }

        .status-line {
            padding: 6px 12px;
            border-bottom: 1px solid #5a4a3a;
            font-size: 0.8em;
            color: #c85050;
            min-height: 22px;
        }
        .status-line:empty {
            display: none;
        }
        .conditions {
            padding: 8px 12px;
            border-bottom: 1px solid #5a4a3a;
            min-height: 35px;
        }

        .condition-tag {
            display: inline-block;
            background: rgba(200, 80, 80, 0.3);
            border: 1px solid #c85050;
            padding: 2px 6px;
            border-radius: 8px;
            font-size: 0.7em;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .condition-tag.buff {
            background: rgba(80, 150, 80, 0.3);
            border-color: #509650;
        }

        .xp-progress {
            padding: 10px 12px;
            border-bottom: 1px solid #5a4a3a;
        }

        .xp-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7em;
            color: #8a7a6a;
            margin-bottom: 4px;
        }

        .xp-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(61, 47, 31, 0.5);
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            overflow: hidden;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(to right, #d4af37, #f4cf57);
            border-radius: 3px;
            transition: width 0.5s ease;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.5);
        }

        .section-header {
            color: #d4af37;
            font-size: 0.85em;
            padding: 10px 12px 6px 12px;
            border-bottom: 1px solid #5a4a3a;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(61, 47, 31, 0.2);
        }

        .ability-scores {
            padding: 10px 12px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            border-bottom: 1px solid #5a4a3a;
        }

        .ability-score {
            background: rgba(61, 47, 31, 0.3);
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            padding: 8px 6px;
            text-align: center;
        }

        .ability-name {
            font-size: 0.7em;
            color: #8a7a6a;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .ability-value {
            font-size: 1.4em;
            color: #e8dcc4;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .ability-modifier {
            font-size: 0.9em;
            color: #d4af37;
        }

        .skills-list {
            padding: 10px 12px;
            border-bottom: 1px solid #5a4a3a;
        }

        .skill-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 6px;
            background: rgba(61, 47, 31, 0.2);
            border-radius: 3px;
            margin-bottom: 4px;
            font-size: 0.85em;
        }

        .skill-item:last-child {
            margin-bottom: 0;
        }

        .skill-name {
            color: #b8a888;
        }

        .skill-modifier {
            color: #d4af37;
            font-weight: bold;
        }

        .equipment-section, .inventory-section {
            padding: 10px 12px;
            border-bottom: 1px solid #5a4a3a;
        }

        .equipment-item, .inventory-item {
            background: rgba(61, 47, 31, 0.3);
            border: 1px solid #5a4a3a;
            border-radius: 4px;
            padding: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85em;
        }

        .equipment-item:hover, .inventory-item:hover {
            background: rgba(61, 47, 31, 0.5);
            border-color: #8b7355;
        }

        .equipment-weapon {
            cursor: pointer;
            border-left: 3px solid #8b7355;
        }

        .equipment-weapon:hover {
            border-left-color: #d4af37;
        }

        .equipment-name, .item-name {
            color: #e8dcc4;
            font-weight: bold;
            margin-bottom: 3px;
        }

        .equipment-stats {
            font-size: 0.75em;
            color: #b8a888;
        }

        .inventory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 8px;
        }

        .item-quantity {
            background: rgba(90, 74, 58, 0.5);
            padding: 1px 6px;
            border-radius: 8px;
            font-size: 0.85em;
            color: #b8a888;
        }

        /* Narrative Panel */
        .narrative-panel {
            flex: 1;
            background: rgba(25, 20, 15, 0.8);
            border: 2px solid #5a4a3a;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 20px;
            bottom: 20px;
            right: 20px;
            left: 300px;
        }

        .narrative-header {
            background: linear-gradient(to bottom, #3d2f1f, #2a1f15);
            padding: 15px 25px;
            border-bottom: 2px solid #5a4a3a;
            flex-shrink: 0;
        }

        .narrative-header h1 {
            font-size: 1.6em;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-weight: 400;
            letter-spacing: 2px;
        }

        .narrative-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scroll-behavior: smooth;
        }

        .narrative-scroll::-webkit-scrollbar {
            width: 10px;
        }

        .narrative-scroll::-webkit-scrollbar-track {
            background: #1a1410;
        }

        .narrative-scroll::-webkit-scrollbar-thumb {
            background: #5a4a3a;
            border-radius: 5px;
        }

        .narrative-entry {
            margin-bottom: 20px;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gm-narration {
            font-size: 1.05em;
            color: #e8dcc4;
            padding: 14px;
            background: rgba(61, 47, 31, 0.3);
            border-left: 3px solid #8b7355;
            border-radius: 4px;
            line-height: 1.7;
        }

        .gm-narration::first-letter {
            font-size: 1.5em;
            font-weight: bold;
            color: #d4af37;
        }

        .player-action {
            color: #a8c8e8;
            font-style: italic;
            padding: 10px 14px;
            background: rgba(40, 60, 80, 0.2);
            border-left: 3px solid #5a7a9a;
            border-radius: 4px;
        }

        .player-action::before {
            content: "> ";
            color: #7a9aba;
            font-style: normal;
        }

        .system-message {
            color: #b8a888;
            font-size: 0.9em;
            padding: 6px 14px;
            background: rgba(90, 74, 58, 0.15);
            border-left: 3px solid #6a5a4a;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .loading-indicator {
            color: #8a7a6a;
            font-style: italic;
            padding: 10px 14px;
        }

        .loading-indicator::after {
            content: '...';
            animation: ellipsis 1.5s infinite;
        }

        @keyframes ellipsis {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        /* Input Section */
        .input-section {
            padding: 15px 25px;
            background: linear-gradient(to top, #3d2f1f, #2a1f15);
            border-top: 2px solid #5a4a3a;
            flex-shrink: 0;
        }

        .action-prompt {
            color: #b8a888;
            font-size: 0.85em;
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        input[type="text"], input[type="number"] {
            padding: 10px 14px;
            background: #1a1410;
            border: 2px solid #5a4a3a;
            border-radius: 4px;
            color: #e8dcc4;
            font-family: 'Crimson Text', 'Georgia', serif;
            font-size: 1em;
        }

        input[type="text"] {
            flex: 1;
        }

        input[type="text"]:focus, input[type="number"]:focus {
            outline: none;
            border-color: #8b7355;
            box-shadow: 0 0 10px rgba(139, 115, 85, 0.3);
        }

        input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button {
            padding: 10px 20px;
            background: linear-gradient(to bottom, #5a4a3a, #4a3a2a);
            border: 2px solid #6a5a4a;
            border-radius: 4px;
            color: #e8dcc4;
            font-family: 'Crimson Text', 'Georgia', serif;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background: linear-gradient(to bottom, #6a5a4a, #5a4a3a);
            border-color: #8b7355;
            box-shadow: 0 0 15px rgba(139, 115, 85, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .secondary-button {
            padding: 6px 12px;
            font-size: 0.85em;
            background: rgba(90, 74, 58, 0.3);
            border: 1px solid #5a4a3a;
        }

        .dice-section {
            display: none;
            gap: 8px;
            align-items: center;
            padding: 10px 0;
            margin-bottom: 8px;
            border: 2px solid #d4af37;
            border-radius: 4px;
            background: rgba(212, 175, 55, 0.1);
            padding: 12px;
            flex-wrap: wrap;
        }

        .dice-section.active {
            display: flex;
        }

        .dice-label {
            color: #d4af37;
            font-size: 0.85em;
            font-weight: bold;
        }

        .dice-input {
            width: 56px;
            min-width: 56px;
            padding: 5px 8px;
            text-align: center;
        }
        /* Remove number input spinners so the field isn't cramped */
        .dice-input::-webkit-outer-spin-button,
        .dice-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        .dice-input[type="number"] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        .dice-button {
            padding: 6px 12px;
            font-size: 0.8em;
        }

        .error-message {
            background: rgba(200, 80, 80, 0.2);
            border: 1px solid #c85050;
            color: #e8a8a8;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        /* Debug Panel */
        #debugPanel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #d4af37;
            border-radius: 8px;
            padding: 15px;
            z-index: 1000;
            min-width: 250px;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        #debugPanel h3 {
            color: #d4af37;
            margin-bottom: 10px;
            font-size: 1em;
            border-bottom: 1px solid #5a4a3a;
            padding-bottom: 5px;
        }

        .debug-section {
            margin-bottom: 15px;
        }

        .debug-section label {
            display: block;
            color: #b8a888;
            font-size: 0.8em;
            margin-bottom: 3px;
        }

        .debug-controls {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .debug-button {
            padding: 5px 10px;
            font-size: 0.75em;
            background: rgba(90, 74, 58, 0.5);
            border: 1px solid #5a4a3a;
            color: #e8dcc4;
            cursor: pointer;
            border-radius: 3px;
        }

        .debug-button:hover {
            background: rgba(90, 74, 58, 0.8);
            border-color: #8b7355;
        }

        .debug-info {
            font-size: 0.75em;
            color: #8a7a6a;
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px;
            border-radius: 3px;
            margin-top: 5px;
            max-height: 200px;
            overflow-y: auto;
        }

        #loadingOverlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(26, 20, 16, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            flex-direction: column;
            gap: 20px;
        }

        #loadingOverlay h2 {
            color: #d4af37;
            font-size: 2em;
        }

        #loadingOverlay p {
            color: #b8a888;
            font-size: 1.2em;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #5a4a3a;
            border-top-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loadingOverlay">
        <h2>Loading Game Data...</h2>
        <div class="spinner"></div>
        <p id="loadingStatus">Initializing...</p>
    </div>

    <!-- Debug Panel (Ctrl+Shift+D to toggle) -->
    <div id="debugPanel">
        <h3>Debug Panel</h3>
        
        <div class="debug-section">
            <label>HP Controls:</label>
            <div class="debug-controls">
                <button class="debug-button" onclick="TestUtils.modifyHP(-10)">-10 HP</button>
                <button class="debug-button" onclick="TestUtils.modifyHP(-5)">-5 HP</button>
                <button class="debug-button" onclick="TestUtils.modifyHP(5)">+5 HP</button>
                <button class="debug-button" onclick="TestUtils.modifyHP(10)">+10 HP</button>
                <button class="debug-button" onclick="TestUtils.fullHeal()">Full Heal</button>
            </div>
        </div>

        <div class="debug-section">
            <label>XP Controls:</label>
            <div class="debug-controls">
                <button class="debug-button" onclick="TestUtils.addXP(25)">+25 XP</button>
                <button class="debug-button" onclick="TestUtils.addXP(50)">+50 XP</button>
                <button class="debug-button" onclick="TestUtils.addXP(100)">+100 XP</button>
            </div>
        </div>

        <div class="debug-section">
            <label>Pack:</label>
            <div class="debug-controls">
                <button class="debug-button" onclick="TestUtils.addPotion()">+Potion</button>
                <button class="debug-button" onclick="TestUtils.addGold(50)">+50 Gold</button>
            </div>
        </div>

        <div class="debug-section">
            <label>Navigation:</label>
            <div class="debug-controls">
                <button class="debug-button" onclick="TestUtils.teleportToRoom('entry_hall')">Entry</button>
                <button class="debug-button" onclick="TestUtils.teleportToRoom('training_room')">Training</button>
                <button class="debug-button" onclick="TestUtils.teleportToRoom('challenge_chamber')">Challenge</button>
                <button class="debug-button" onclick="TestUtils.teleportToRoom('boss_arena')">Boss</button>
            </div>
        </div>

        <div class="debug-section">
            <label>State:</label>
            <div class="debug-controls">
                <button class="debug-button" onclick="TestUtils.logState()">Log State</button>
                <button class="debug-button" onclick="TestUtils.clearHistory()">Clear History</button>
            </div>
        </div>

        <div class="debug-section">
            <label>Parse Log:</label>
            <div class="debug-info" id="debugParseLog">No parsing activity yet...</div>
        </div>
    </div>

    <div class="app-container">
        <!-- Character Panel -->
        <div class="character-panel" id="characterPanel">
            <div class="character-header" id="characterHeader">
                <div class="character-portrait">W</div>
                <div class="character-name" id="charName">Loading...</div>
                <div class="character-class" id="charClass">...</div>
            </div>

            <div class="quick-stats">
                <div class="stat-box">
                    <div class="stat-label">HP</div>
                    <div class="stat-value hp" id="hpDisplay">--/--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">AC</div>
                    <div class="stat-value ac" id="acDisplay">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Level</div>
                    <div class="stat-value" id="levelDisplay">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">XP</div>
                    <div class="stat-value" id="xpDisplay">--</div>
                </div>
            </div>

            <div class="conditions" id="conditionsDisplay"></div>

            <div class="xp-progress">
                <div class="xp-label">
                    <span>XP Progress</span>
                    <span id="xpProgressText">-- / --</span>
                </div>
                <div class="xp-bar-container">
                    <div class="xp-bar-fill" id="xpBarFill" style="width: 0%;"></div>
                </div>
            </div>

            <div class="section-header">Abilities</div>
            <div class="ability-scores" id="abilityScores"></div>

            <div class="section-header">Skills</div>
            <div class="skills-list" id="skillsList"></div>

            <div class="section-header">Equipped</div>
            <div class="equipment-section" id="equippedList"></div>

            <div class="section-header">Pack</div>
            <div class="inventory-section" id="packList"></div>
        </div>

        <!-- Narrative Panel -->
        <div class="narrative-panel">
            <div class="narrative-header">
                <h1 id="dungeonTitle">Loading...</h1>
            </div>

            <div class="narrative-scroll" id="narrativeScroll">
                <!-- Narrative entries will be added here -->
            </div>

            <div class="input-section">
                <!-- Dice Rolling Section -->
                <div class="dice-section" id="diceSection">
                    <span class="dice-label" id="rollPrompt">Roll requested:</span>
                    <button class="dice-button secondary-button" onclick="rollDice()" id="rollBtn">Roll d20</button>
                    <span class="dice-label">or enter result:</span>
                    <input type="number" class="dice-input" id="diceInput" placeholder="1-20" min="1" max="20">
                    <button class="dice-button secondary-button" onclick="submitDiceRoll()" id="submitRollBtn">Submit</button>
                </div>

                <div class="action-prompt">What do you do?</div>
                
                <div class="input-wrapper">
                    <input type="text" id="playerInput" placeholder="Describe your action... (press Enter)" onkeypress="handleKeyPress(event)" disabled>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION & DEBUG
        // ============================================
        
        const CONFIG = {
            DEBUG_MODE: true,
            DATA_FILES: {
                character: './character_aldric.json',
                module: './test_module_arena.json',
                monsters: './monster_manual.json',
                rules: './rules.json'
            },
            API_ENDPOINT: '/api/messages',
            MODEL: 'claude-sonnet-4-20250514',
            MAX_TOKENS: 2000,
            MAX_HISTORY_TURNS: 20
        };

        // Debug logging function
        function debugLog(category, message, data = null) {
            if (!CONFIG.DEBUG_MODE) return;
            
            const timestamp = new Date().toLocaleTimeString();
            const prefix = `[${timestamp}] [${category}]`;
            
            console.log(prefix, message, data || '');
            
            // Update debug panel parse log if it's a parse event
            if (category === 'PARSE') {
                const logDiv = document.getElementById('debugParseLog');
                if (logDiv) {
                    const entry = document.createElement('div');
                    entry.textContent = `${timestamp} ${message}`;
                    entry.style.marginBottom = '2px';
                    logDiv.insertBefore(entry, logDiv.firstChild);
                    
                    // Keep only last 20 entries
                    while (logDiv.children.length > 20) {
                        logDiv.removeChild(logDiv.lastChild);
                    }
                }
            }
        }

        // ============================================
        // GAME DATA & STATE
        // ============================================
        
        const gameData = {
            character: null,
            module: null,
            monsters: null,
            rules: null
        };

        // XP progression table
        const XP_LEVELS = {
            1: 0, 2: 2000, 3: 4000, 4: 8000, 5: 16000,
            6: 32000, 7: 64000, 8: 128000, 9: 256000, 10: 512000
        };
        
        const gameState = {
            character: null,
            currentRoom: null,
            triggeredEvents: [],
            conversationHistory: [],
            waitingForRoll: false,
            pendingRollContext: null,
            /** Damage dealt to each encounter by id (e.g. goblin_guard: 5). Used to show current monster HP. */
            damageToEncounters: {},
            /** True when combat has started (either side attacked). Cleared when all nearby enemies defeated, player dies, or player retreats. */
            inCombat: false,
            /** Items put in use during play (e.g. Torch (lit) when player lights one from pack). Shown in Equipped. */
            equippedInUse: [],
            /** Set when we parse torch use from player message; skip GM parse for same turn to avoid double-count. */
            torchUseParsedThisTurn: false
        };

        // ============================================
        // DATA LOADING
        // ============================================
        
        async function loadGameData() {
            try {
                updateLoadingStatus('Loading character data...');
                const charResponse = await fetch(CONFIG.DATA_FILES.character);
                if (!charResponse.ok) throw new Error('Failed to load character');
                const charData = await charResponse.json();
                gameData.character = charData.character;
                
                updateLoadingStatus('Loading module...');
                const modResponse = await fetch(CONFIG.DATA_FILES.module);
                if (!modResponse.ok) throw new Error('Failed to load module');
                const modData = await modResponse.json();
                // Store the full module data (includes module metadata AND rooms)
                gameData.module = modData;
                
                updateLoadingStatus('Loading monster manual...');
                const monsResponse = await fetch(CONFIG.DATA_FILES.monsters);
                if (!monsResponse.ok) throw new Error('Failed to load monsters');
                const monsData = await monsResponse.json();
                gameData.monsters = monsData.monster_manual.monsters;
                
                updateLoadingStatus('Loading rules...');
                const rulesResponse = await fetch(CONFIG.DATA_FILES.rules);
                if (!rulesResponse.ok) throw new Error('Failed to load rules');
                const rulesData = await rulesResponse.json();
                gameData.rules = rulesData.rules;
                
                debugLog('DATA', 'All game data loaded successfully');
                return true;
                
            } catch (error) {
                console.error('Failed to load game data:', error);
                updateLoadingStatus(`ERROR: ${error.message}`);
                return false;
            }
        }

        function updateLoadingStatus(message) {
            const statusEl = document.getElementById('loadingStatus');
            if (statusEl) statusEl.textContent = message;
        }

        // ============================================
        // MONSTER RESOLUTION
        // ============================================
        
        function resolveMonster(monsterId) {
            if (!gameData.monsters || !gameData.monsters[monsterId]) {
                debugLog('MONSTER', `WARNING: Monster ${monsterId} not found in manual`);
                return null;
            }
            return gameData.monsters[monsterId];
        }

        /** Current HP for an encounter (tracked damage vs monster max HP). */
        function getEncounterHP(encounter) {
            const monster = resolveMonster(encounter.monster_ref);
            if (!monster) return { current: 0, max: 0, defeated: true };
            const damage = gameState.damageToEncounters[encounter.id] || 0;
            const current = Math.max(0, monster.hp - damage);
            return { current, max: monster.hp, defeated: current <= 0 };
        }
        
        function buildEncounterDescription(encounter, includeCurrentHP = false) {
            const monster = resolveMonster(encounter.monster_ref);
            if (!monster) return `Unknown monster: ${encounter.monster_ref}`;
            
            const hpInfo = includeCurrentHP ? getEncounterHP(encounter) : null;
            let hpStr;
            if (hpInfo && hpInfo.defeated) {
                hpStr = `DEFEATED (0/${hpInfo.max} HP) — narrate death, award XP/treasure from On death`;
            } else if (hpInfo) {
                hpStr = `${hpInfo.current}/${hpInfo.max} HP remaining`;
            } else {
                hpStr = `HP ${monster.hp}`;
            }
            // List all attacks with range (melee vs ranged) — GM chooses based on distance
            const attackLines = (monster.attacks || []).map(a => {
                const r = (a.range || 'melee').toString().toLowerCase();
                const rangeStr = r === 'melee' ? 'melee' : `ranged ${a.range}`;
                return `${a.name} +${a.bonus} for ${a.damage} ${a.damage_type} (${rangeStr})`;
            }).join(' | ');
            const attackStr = attackLines || 'no attacks';
            let line = `${encounter.name} (${monster.name}): ${hpStr}, AC ${monster.ac} (use this exact AC for hit/miss). Attacks: ${attackStr}`;
            if (encounter.on_death) {
                if (encounter.on_death.xp_award != null) line += ` | On death: award exactly ${encounter.on_death.xp_award} XP`;
                if (encounter.on_death.treasure && encounter.on_death.treasure.length) {
                    const treasureStr = encounter.on_death.treasure.map(t => t.item === 'gold' ? `${t.quantity} gp` : t.item).join(', ');
                    line += ` | Treasure: ${treasureStr}`;
                }
            }
            return line;
        }

        /** Build explicit dungeon layout from module JSON for the GM. GM must use ONLY this. */
        function buildModuleLayoutForPrompt() {
            const rooms = gameData.module.rooms;
            const moduleMeta = gameData.module.module;
            let out = '';
            for (const [roomId, room] of Object.entries(rooms)) {
                out += `\n--- ROOM: ${room.name} (id: ${roomId}) ---\n`;
                out += `Description: ${room.description}\n`;
                if (room.connections && Object.keys(room.connections).length > 0) {
                    const exits = Object.entries(room.connections).map(([dir, targetId]) => {
                        const target = rooms[targetId];
                        const targetName = target ? target.name : targetId;
                        return `${dir} → ${targetName} (${targetId})`;
                    }).join(', ');
                    out += `Exits (use ONLY these): ${exits}\n`;
                } else {
                    out += `Exits: none\n`;
                }
                if (room.features && room.features.length > 0) {
                    out += 'Features (use ONLY these; do not add others):\n';
                    for (const f of room.features) {
                        out += `- ${f.name}: ${f.description || ''}`;
                        if (f.text) out += ` | When read/used: "${f.text}"`;
                        if (f.note) out += ` | Note: "${f.note}"`;
                        if (f.success) out += ` | On success: "${f.success}"`;
                        if (f.failure) out += ` | On failure: "${f.failure}"`;
                        if (f.contains) out += ` | Contains: ${JSON.stringify(f.contains)}`;
                        if (f.interaction) out += ` | Interaction: ${f.interaction}`;
                        out += '\n';
                    }
                }
                if (room.encounters && room.encounters.length > 0) {
                    out += 'Encounters here (ONLY these monsters exist in this room): ';
                    out += room.encounters.map(e => e.name + ' (' + e.monster_ref + ')').join(', ') + '\n';
                }
            }
            return out;
        }

        // ============================================
        // INITIALIZATION
        // ============================================
        
        async function initializeGame() {
            debugLog('INIT', 'Starting game initialization');
            
            // Load all data files
            const loaded = await loadGameData();
            if (!loaded) {
                alert('Failed to load game data. Check console for details and ensure all JSON files are in the same directory.');
                return;
            }
            
            // Initialize game state from loaded data
            updateLoadingStatus('Initializing game state...');
            
            // Convert loaded character data to game state format
            gameState.character = {
                name: gameData.character.basic_info.name,
                class: gameData.character.basic_info.class,
                level: gameData.character.basic_info.level,
                hp: gameData.character.combat_stats.hit_points.current,
                maxHp: gameData.character.combat_stats.hit_points.maximum,
                ac: gameData.character.combat_stats.armor_class,
                xp: gameData.character.experience.current,
                abilities: {},
                skills: {},
                equipment: [],
                inventory: [],
                conditions: []
            };
            
            // Convert abilities (map full names to short names)
            const abilityNameMap = {
                strength: 'str', dexterity: 'dex', constitution: 'con',
                intelligence: 'int', wisdom: 'wis', charisma: 'cha'
            };
            for (const [key, value] of Object.entries(gameData.character.ability_scores)) {
                const shortKey = abilityNameMap[key] || key;
                gameState.character.abilities[shortKey] = {
                    score: value.score,
                    modifier: value.modifier
                };
            }
            
            debugLog('INIT', 'Character abilities initialized', gameState.character.abilities);
            
            // Convert skills
            for (const [key, value] of Object.entries(gameData.character.skills)) {
                gameState.character.skills[key] = value.modifier;
            }
            
            // Convert equipment: weapons and armor only (no torch, light sources, etc.)
            for (const item of [...gameData.character.equipment.worn, ...gameData.character.equipment.wielded, ...gameData.character.equipment.carried]) {
                const isWeapon = !!item.damage;
                const isArmor = (item.type || '').toLowerCase() === 'armor';
                if (!isWeapon && !isArmor) continue; // skip torch, light sources, etc.
                const typeInfo = isWeapon ? getWeaponTypeInfo(item) : { type: null, range: null };
                let stats = '';
                if (item.damage) {
                    const base = `${item.damage} ${item.damage_type}`;
                    stats = typeInfo.type === 'ranged' && typeInfo.range
                        ? `${base} (ranged ${typeInfo.range})`
                        : `${base} (${typeInfo.type || 'melee'})`;
                } else {
                    stats = item.properties ? item.properties.join(' - ') : '';
                }
                gameState.character.equipment.push({
                    name: item.name,
                    stats,
                    equipped: item.equipped !== undefined ? item.equipped : false,
                    isWeapon,
                    isArmor,
                    weaponType: typeInfo.type,
                    weaponRange: typeInfo.range
                });
            }
            // No weapon readied at start; only armor is "equipped" for display
            gameState.readiedWeaponName = null;
            gameState.armorEquipped = true;
            
            // Convert inventory
            for (const item of gameData.character.equipment.backpack) {
                gameState.character.inventory.push({
                    name: item.name,
                    quantity: item.quantity
                });
            }
            
            // Add coins
            const coins = gameData.character.equipment.coin;
            gameState.character.inventory.push({
                name: 'Gold',
                quantity: `${coins.gold}gp`
            });
            
            // Set starting room
            gameState.currentRoom = gameData.module.module.starting_room;
            
            updateLoadingStatus('Rendering interface...');
            
            // Initialize character sheet display
            initializeCharacterSheet();
            
            // Update title
            document.getElementById('dungeonTitle').textContent = gameData.module.module.title;
            
            // Hide loading overlay
            document.getElementById('loadingOverlay').style.display = 'none';
            
            // Enable input
            document.getElementById('playerInput').disabled = false;
            
            // Add welcome message
            const startingRoom = gameData.module.rooms[gameState.currentRoom];
            addSystemMessage(`Welcome to ${gameData.module.module.title}!`);
            addNarration(startingRoom.description);
            
            // Check for on_entry features
            if (startingRoom.features) {
                for (const feature of startingRoom.features) {
                    if (feature.triggers && feature.triggers.includes('on_entry') && feature.text) {
                        addNarration(`<i>${feature.text}</i>`);
                    }
                }
            }
            
            addSystemMessage('Press Ctrl+Shift+D to toggle debug panel. Type your action and press Enter.');
            
            // Focus input
            document.getElementById('playerInput').focus();
            
            debugLog('INIT', 'Game initialization complete');
        }

        // ============================================
        // CHARACTER SHEET DISPLAY
        // ============================================
        
        function initializeCharacterSheet() {
            const char = gameState.character;
            
            // Update header
            document.getElementById('charName').textContent = char.name;
            document.getElementById('charClass').textContent = `${char.class} - Lvl ${char.level}`;
            
            // Abilities
            const abilitiesHTML = Object.entries(char.abilities).map(([key, value]) => `
                <div class="ability-score">
                    <div class="ability-name">${key.toUpperCase()}</div>
                    <div class="ability-value">${value.score}</div>
                    <div class="ability-modifier">${value.modifier >= 0 ? '+' : ''}${value.modifier}</div>
                </div>
            `).join('');
            document.getElementById('abilityScores').innerHTML = abilitiesHTML;
            
            // Skills
            const skillsHTML = Object.entries(char.skills).map(([key, value]) => `
                <div class="skill-item">
                    <span class="skill-name">${key.charAt(0).toUpperCase() + key.slice(1)}</span>
                    <span class="skill-modifier">+${value}</span>
                </div>
            `).join('');
            document.getElementById('skillsList').innerHTML = skillsHTML;
            
            updateCharacterDisplay();

            const equippedList = document.getElementById('equippedList');
            if (equippedList && !equippedList._weaponClickBound) {
                equippedList._weaponClickBound = true;
                equippedList.addEventListener('click', (e) => {
                    const weaponItem = e.target.closest('.equipment-weapon');
                    if (weaponItem) {
                        const name = weaponItem.dataset.weaponName;
                        if (name) handleWeaponClick(name);
                    }
                });
            }

        /** When player clicks a weapon in Equipped: ready (out of combat), describe (already readied), or attack (in combat, GM verifies). */
        function handleWeaponClick(weaponName) {
            if (gameState.waitingForRoll) return;
            const readied = gameState.readiedWeaponName;
            const alreadyReadied = readied && readied.toLowerCase() === weaponName.toLowerCase();
            let message;
            if (gameState.inCombat) {
                message = `I want to attack with my ${weaponName}.`;
            } else if (alreadyReadied) {
                message = `I check my ${weaponName} — it's already drawn.`;
            } else {
                message = `I ready my ${weaponName}.`;
                gameState.readiedWeaponName = weaponName;
            }
            addPlayerAction(message);
            gameState.conversationHistory.push({ role: 'user', content: message });
            callAIGM();
        }

        /** AC from armor if worn, otherwise 10 + DEX (unarmored). */
        function getEffectiveAC() {
            const char = gameState.character;
            if (!char || !char.abilities) return char ? char.ac : 10;
            if (!gameState.armorEquipped) return 10 + char.abilities.dex.modifier;
            const worn = gameData.character && gameData.character.equipment && gameData.character.equipment.worn;
            const armor = worn && worn.find(w => (w.type || '').toLowerCase() === 'armor');
            return (armor && armor.ac != null) ? armor.ac : char.ac;
        }

        function updateCharacterDisplay() {
            const char = gameState.character;
            const ac = getEffectiveAC();
            document.getElementById('hpDisplay').textContent = `${char.hp}/${char.maxHp}`;
            document.getElementById('acDisplay').textContent = ac;
            document.getElementById('levelDisplay').textContent = char.level;
            document.getElementById('xpDisplay').textContent = char.xp.toLocaleString();
            
            // Update XP progress bar
            const currentLevel = char.level;
            const nextLevel = currentLevel + 1;
            const currentLevelXP = XP_LEVELS[currentLevel];
            const nextLevelXP = XP_LEVELS[nextLevel] || XP_LEVELS[10] * 2;
            
            const xpProgress = char.xp - currentLevelXP;
            const xpNeeded = nextLevelXP - currentLevelXP;
            const progressPercent = Math.min(100, (xpProgress / xpNeeded) * 100);
            
            document.getElementById('xpProgressText').textContent = 
                `${char.xp.toLocaleString()} / ${nextLevelXP.toLocaleString()}`;
            document.getElementById('xpBarFill').style.width = `${progressPercent}%`;
            
            // Combat indicator: red highlight on character header when in combat
            const headerEl = document.getElementById('characterHeader');
            if (headerEl) headerEl.classList.toggle('in-combat', gameState.inCombat);
            
            // Update conditions
            const conditionsHTML = char.conditions.map(condition => 
                `<div class="condition-tag ${condition.type || ''}">${condition.name}</div>`
            ).join('');
            document.getElementById('conditionsDisplay').innerHTML = conditionsHTML;
            
            // Update Equipped: armor, weapons, and items in use (e.g. torch lit). Weapons are clickable.
            const equippedItems = [...char.equipment, ...(gameState.equippedInUse || [])];
            const equippedHTML = equippedItems.map(item => {
                const isWeapon = !!item.isWeapon;
                const weaponAttr = isWeapon ? ` data-weapon-name="${item.name.replace(/"/g, '&quot;')}"` : '';
                const weaponClass = isWeapon ? ' equipment-weapon' : '';
                return `
                <div class="equipment-item${weaponClass}"${weaponAttr}>
                    <div class="equipment-name">${item.name}</div>
                    <div class="equipment-stats">${item.stats || ''}</div>
                </div>
            `}).join('');
            document.getElementById('equippedList').innerHTML = equippedHTML;
            
            // Update Pack: backpack items with quantities (show x0 when used)
            const packHTML = char.inventory.map(item => {
                const qty = item.quantity;
                const qtyStr = item.name === 'Gold' ? ` ${qty}` : `x${qty}`;
                return `
                <div class="inventory-item">
                    <span class="item-name">${item.name}</span>
                    <span class="item-quantity">${qtyStr}</span>
                </div>
            `}).join('');
            document.getElementById('packList').innerHTML = packHTML;
        }

        function modifyHP(amount) {
            debugLog('STATE', `Modifying HP by ${amount}`);
            gameState.character.hp = Math.max(0, Math.min(gameState.character.maxHp, gameState.character.hp + amount));
            updateCharacterDisplay();
            
            if (gameState.character.hp === 0) {
                gameState.inCombat = false;
                addSystemMessage("You have died! Your adventure ends here.");
                disableInput(true);
            }
        }
        
        function addXP(amount) {
            debugLog('STATE', `Adding ${amount} XP`);
            gameState.character.xp += amount;
            addSystemMessage(`Gained ${amount} XP!`);
            updateCharacterDisplay();
        }
        
        function addToInventory(itemName, quantity = 1) {
            debugLog('STATE', `Adding to inventory: ${itemName} x${quantity}`);
            const existing = gameState.character.inventory.find(i => i.name === itemName);
            if (existing) {
                if (typeof existing.quantity === 'number') {
                    existing.quantity += quantity;
                } else {
                    const match = existing.quantity.match(/(\d+)/);
                    if (match) {
                        const current = parseInt(match[1]);
                        existing.quantity = `${current + quantity}gp`;
                    }
                }
            } else {
                gameState.character.inventory.push({ name: itemName, quantity });
            }
            updateCharacterDisplay();
        }
        
        function removeFromInventory(itemName, quantity = 1) {
            debugLog('STATE', `Removing from inventory: ${itemName} x${quantity}`);
            const item = gameState.character.inventory.find(i => i.name === itemName);
            if (item) {
                if (typeof item.quantity === 'number') {
                    item.quantity = Math.max(0, item.quantity - quantity);
                    // Keep item with qty 0 so it can be retrieved (e.g. rope)
                }
            }
            updateCharacterDisplay();
        }

        // ============================================
        // WEAPON DAMAGE (from character JSON)
        // ============================================
        
        /** Whether a weapon uses DEX (ranged) or STR (melee) for damage. */
        function isRangedWeapon(weapon) {
            return getWeaponTypeInfo(weapon).type === 'ranged';
        }

        /** Get weapon type (melee/ranged) and range. Works on character equipment or monster attack. */
        function getWeaponTypeInfo(weapon) {
            if (!weapon) return { type: 'melee', range: null };
            const name = (weapon.name || '').toLowerCase();
            const props = Array.isArray(weapon.properties) ? weapon.properties.join(' ') : (weapon.properties || '');
            const propsLower = props.toLowerCase();
            // Explicit range field (e.g. monster attacks)
            if (weapon.range) {
                const r = String(weapon.range).toLowerCase();
                if (r === 'melee') return { type: 'melee', range: null };
                return { type: 'ranged', range: weapon.range };
            }
            // From properties: "range 80/320" or "range 30/120"
            const rangeMatch = props.match(/range\s+(\d+(?:\/\d+)?)/i);
            if (rangeMatch) return { type: 'ranged', range: rangeMatch[1] };
            // Ammunition property implies ranged
            if (/ammunition/.test(propsLower)) return { type: 'ranged', range: 'see properties' };
            // Name-based
            if (/bow|crossbow|sling|dart|thrown/.test(name)) {
                const m = props.match(/range\s+(\d+(?:\/\d+)?)/i);
                return { type: 'ranged', range: m ? m[1] : 'see properties' };
            }
            return { type: 'melee', range: null };
        }
        
        /** Get readied weapon damage: dice and modifier (STR for melee, DEX for ranged). */
        function getEquippedWeaponDamage() {
            const sources = gameData.character && gameData.character.equipment
                ? [...(gameData.character.equipment.wielded || []), ...(gameData.character.equipment.carried || [])]
                : [];
            const weapons = sources.filter(w => w.damage);
            if (!weapons.length) return { dice: '1d8', modifier: gameState.character.abilities.str.modifier, label: '1d8', count: 1, sides: 8 };
            // Use readied weapon by name, or first equipped
            const readied = gameState.readiedWeaponName;
            let weapon = readied ? weapons.find(w => w.name && w.name.toLowerCase() === readied.toLowerCase()) : null;
            if (!weapon) weapon = weapons.find(w => w.equipped) || weapons[0];
            const useDex = isRangedWeapon(weapon);
            const mod = useDex ? gameState.character.abilities.dex.modifier : gameState.character.abilities.str.modifier;
            return parseWeaponDice(weapon.damage, mod);
        }
        
        /** Resolve dice for a roll request. Returns { type:'weapon'|'custom'|'d20', ... } */
        function getDiceForRollRequest(rollType) {
            const t = (rollType || '').trim().toLowerCase();
            if (t === 'damage') {
                return { type: 'weapon', label: getEquippedWeaponDamage().label };
            }
            // Custom dice: 2d4+2, 1d6, 3d8+1, 1d6-1, etc.
            const diceMatch = t.match(/^(\d+)d(\d+)(?:([+-])(\d+))?$/i);
            if (diceMatch) {
                const count = parseInt(diceMatch[1]);
                const sides = parseInt(diceMatch[2]);
                const modifier = diceMatch[4] ? (diceMatch[3] === '-' ? -parseInt(diceMatch[4]) : parseInt(diceMatch[4])) : 0;
                const modStr = modifier ? (modifier >= 0 ? '+' + modifier : String(modifier)) : '';
                return {
                    type: 'custom',
                    count: count,
                    sides: sides,
                    modifier,
                    label: `${count}d${sides}${modStr}`,
                    minFace: count,
                    maxFace: count * sides
                };
            }
            // Healing: lookup from character or use default 2d4+2
            if (t === 'healing' || t === 'healing potion' || t === 'healingpotion') {
                const backpack = gameData.character?.equipment?.backpack || [];
                const potion = backpack.find(i => (i.name || '').toLowerCase().includes('healing') && (i.effect || '').includes('d'));
                if (potion && potion.effect) {
                    const m = potion.effect.match(/(\d+)d(\d+)(?:\+(\d+))?/i);
                    if (m) {
                        const count = parseInt(m[1]);
                        const sides = parseInt(m[2]);
                        const modifier = m[3] ? parseInt(m[3]) : 0;
                        const modStr = modifier ? (modifier >= 0 ? '+' + modifier : String(modifier)) : '';
                        return {
                            type: 'custom',
                            count, sides, modifier,
                            label: `${count}d${sides}${modStr}`,
                            minFace: count,
                            maxFace: count * sides
                        };
                    }
                }
                return {
                    type: 'custom',
                    count: 2, sides: 4, modifier: 2,
                    label: '2d4+2',
                    minFace: 2,
                    maxFace: 8
                };
            }
            // d20 for abilities/skills
            return { type: 'd20', ability: t };
        }

        /** Parse "1d8" or "2d6" and return { dice, modifier, label } for display and rolling. */
        function parseWeaponDice(diceStr, modifier) {
            const match = (diceStr || '1d8').match(/^(\d+)d(\d+)$/i);
            const count = match ? parseInt(match[1], 10) : 1;
            const sides = match ? parseInt(match[2], 10) : 8;
            const modifierNum = typeof modifier === 'number' ? modifier : 0;
            const modStr = modifierNum >= 0 ? '+' + modifierNum : String(modifierNum);
            return {
                dice: diceStr || '1d8',
                count,
                sides,
                modifier: modifierNum,
                label: (count === 1 ? '1d' + sides : count + 'd' + sides) + (modifierNum !== 0 ? modStr : '')
            };
        }
        
        /** Roll weapon damage (e.g. 1d8+3 or 2d6+2). Returns { total, breakdown } for display. */
        function rollWeaponDamage() {
            const w = getEquippedWeaponDamage();
            const rolls = [];
            let diceTotal = 0;
            for (let i = 0; i < w.count; i++) {
                const r = Math.floor(Math.random() * w.sides) + 1;
                rolls.push(r);
                diceTotal += r;
            }
            const total = diceTotal + w.modifier;
            const diceExpr = w.count === 1 ? `1d${w.sides}` : `${w.count}d${w.sides}`;
            const rollsStr = rolls.join(' + ');
            const modStr2 = w.modifier >= 0 ? ` + ${w.modifier}` : ` - ${Math.abs(w.modifier)}`;
            const breakdown = w.modifier !== 0
                ? `${diceExpr} (${rollsStr})${modStr2} = ${total}`
                : `${diceExpr} (${rollsStr}) = ${total}`;
            return { total, breakdown };
        }

        // ============================================
        // DICE ROLLING
        // ============================================
        
        function showDiceSection(prompt = "Roll requested:", rollType = null) {
            const diceSection = document.getElementById('diceSection');
            const rollPrompt = document.getElementById('rollPrompt');
            const rollBtn = document.getElementById('rollBtn');
            const diceInput = document.getElementById('diceInput');
            
            const rt = rollType || (prompt.match(/Roll\s+(.+?)(?::|$)/i)?.[1]?.trim() || '');
            const dice = getDiceForRollRequest(rt);
            
            if (dice.type === 'weapon') {
                const w = getEquippedWeaponDamage();
                rollPrompt.textContent = `Roll damage (${w.label}):`;
                rollBtn.textContent = `Roll ${w.label}`;
                diceInput.placeholder = `1-${w.count * w.sides}`;
                diceInput.min = String(w.count);
                diceInput.max = String(w.count * w.sides);
            } else if (dice.type === 'custom') {
                rollPrompt.textContent = `Roll ${dice.label}:`;
                rollBtn.textContent = `Roll ${dice.label}`;
                diceInput.placeholder = `${dice.minFace}-${dice.maxFace}`;
                diceInput.min = String(dice.minFace);
                diceInput.max = String(dice.maxFace);
            } else {
                const abilityInfo = getAbilityModifierForRoll(dice.ability);
                const modStr = abilityInfo && abilityInfo.modifier != null
                    ? ` (${abilityInfo.modifier >= 0 ? '+' : ''}${abilityInfo.modifier})`
                    : '';
                rollPrompt.textContent = prompt.endsWith(':') ? prompt : prompt + ':';
                rollBtn.textContent = `Roll d20${modStr}`;
                diceInput.placeholder = '1-20';
                diceInput.min = '1';
                diceInput.max = '20';
            }
            
            diceSection.classList.add('active');
            gameState.waitingForRoll = true;
            gameState.pendingRollContext = { dice };
            disableInput(true);
        }

        function hideDiceSection() {
            const diceSection = document.getElementById('diceSection');
            diceSection.classList.remove('active');
            gameState.waitingForRoll = false;
            gameState.pendingRollContext = null;
            disableInput(false);
        }

        /** Map roll request to modifier for display: use skill modifier if it's a skill, else ability. */
        function getAbilityModifierForRoll(abilityName) {
            if (!abilityName || !gameState.character) return null;
            const key = abilityName.toLowerCase().trim();
            const char = gameState.character;
            if (char.skills && typeof char.skills[key] === 'number') {
                const label = abilityName.charAt(0).toUpperCase() + abilityName.slice(1).toLowerCase();
                return { modifier: char.skills[key], label: label };
            }
            if (!char.abilities) return null;
            const keyMap = {
                strength: 'str', str: 'str', dex: 'dex', dexterity: 'dex',
                constitution: 'con', con: 'con', intelligence: 'int', int: 'int',
                wisdom: 'wis', wis: 'wis', charisma: 'cha', cha: 'cha'
            };
            const abKey = keyMap[key];
            if (!abKey || !char.abilities[abKey]) return null;
            const mod = char.abilities[abKey].modifier;
            const label = abilityName.charAt(0).toUpperCase() + abilityName.slice(1).toLowerCase();
            return { modifier: mod, label: label };
        }

        function rollDice() {
            const ctx = gameState.pendingRollContext?.dice;
            if (!ctx) return;
            if (ctx.type === 'weapon') {
                const result = rollWeaponDamage();
                processDiceRoll(result.total, ctx, { damageBreakdown: result.breakdown });
            } else if (ctx.type === 'custom') {
                const rolls = [];
                let sum = 0;
                for (let i = 0; i < ctx.count; i++) {
                    const r = Math.floor(Math.random() * ctx.sides) + 1;
                    rolls.push(r);
                    sum += r;
                }
                const total = sum + ctx.modifier;
                const rollsStr = rolls.join(' + ');
                const modStr = ctx.modifier ? (ctx.modifier >= 0 ? ` + ${ctx.modifier}` : ` - ${Math.abs(ctx.modifier)}`) : '';
                const breakdown = ctx.modifier !== 0
                    ? `${ctx.label} (${rollsStr})${modStr} = ${total}`
                    : `${ctx.label} (${rollsStr}) = ${total}`;
                processDiceRoll(total, ctx, { customBreakdown: breakdown });
            } else {
                const d20 = Math.floor(Math.random() * 20) + 1;
                processDiceRoll(d20, ctx);
            }
        }

        function submitDiceRoll() {
            const input = document.getElementById('diceInput');
            const roll = parseInt(input.value, 10);
            const min = parseInt(input.min || 1, 10);
            const max = parseInt(input.max || 20, 10);
            const ctx = gameState.pendingRollContext?.dice;
            const isValid = !isNaN(roll) && roll >= min && roll <= max;
            
            if (isValid && ctx) {
                input.value = '';
                const opts = (ctx.type === 'weapon' || ctx.type === 'custom') ? {} : {};
                processDiceRoll(roll, ctx, opts);
            }
        }

        function processDiceRoll(roll, diceCtx, options = {}) {
            let message;
            let totalToSend;
            const ctx = gameState.pendingRollContext?.dice || diceCtx;
            if (!ctx) return;
            
            if (ctx.type === 'weapon') {
                const breakdown = options.damageBreakdown;
                if (breakdown) {
                    message = `You rolled damage: <span class="dice-roll">${breakdown}</span>`;
                    totalToSend = roll;
                } else {
                    const w = getEquippedWeaponDamage();
                    totalToSend = roll + w.modifier;
                    const modStr = w.modifier >= 0 ? ` + ${w.modifier}` : ` - ${Math.abs(w.modifier)}`;
                    message = `You rolled damage: <span class="dice-roll">${w.label} = ${roll} (manual)${w.modifier !== 0 ? modStr : ''} = ${totalToSend}</span>`;
                }
            } else if (ctx.type === 'custom') {
                const breakdown = options.customBreakdown;
                if (breakdown) {
                    message = `You rolled ${ctx.label}: <span class="dice-roll">${breakdown}</span>`;
                    totalToSend = roll;
                } else {
                    totalToSend = roll + (ctx.modifier || 0);
                    const modStr = ctx.modifier ? (ctx.modifier >= 0 ? ` + ${ctx.modifier}` : ` - ${Math.abs(ctx.modifier)}`) : '';
                    message = `You rolled ${ctx.label}: <span class="dice-roll">${ctx.label} = ${roll} (manual)${modStr} = ${totalToSend}</span>`;
                }
            } else {
                const abilityInfo = ctx.ability ? getAbilityModifierForRoll(ctx.ability) : null;
                if (abilityInfo != null && abilityInfo.modifier != null) {
                    totalToSend = roll + abilityInfo.modifier;
                    const modStr = abilityInfo.modifier >= 0 ? ` + ${abilityInfo.modifier}` : ` - ${Math.abs(abilityInfo.modifier)}`;
                    message = `You rolled d20: <span class="dice-roll">${roll} (${abilityInfo.label}${modStr}) = ${totalToSend}</span>`;
                } else {
                    totalToSend = roll;
                    message = `You rolled d20: <span class="dice-roll">${roll}</span>`;
                }
            }
            
            addSystemMessage(message);
            hideDiceSection();
            
            const rollMessage = `I rolled a ${totalToSend != null ? totalToSend : roll}.`;
            gameState.conversationHistory.push({
                role: "user",
                content: rollMessage
            });
            
            callAIGM();
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        
        function disableInput(disabled) {
            document.getElementById('playerInput').disabled = disabled;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
