<!-- Narrative Panel Template (Center Column) -->
<div class="narrative-panel notched">
  <!-- Header with dungeon/adventure title -->
  <div class="narrative-header half-top-notched">
    <div class="half-top-notched narrative-header-inner">
      <h1 id="dungeonTitle">Loading...</h1>
      <span id="modeIndicator" class="mode-indicator" title="Current play mode"></span>
      <span id="debugRoomIndicator" class="debug-room-indicator" title="Engine's current room (DEBUG_MODE only)"></span>
      <button type="button" class="copy-narrative-button" id="copyNarrativeBtn" title="Copy narrative for playtest feedback">Copy narrative</button>
      <button type="button" class="copy-narrative-button" id="copySessionReportBtn" title="Copy full session report (state + debug trail + narrative) for bug reports">Copy session report</button>
    </div>
  </div>
    <!-- Scrollable narrative content area -->
    <div class="narrative-scroll" id="narrativeScroll">
      <!-- Narrative entries will be dynamically added here -->
    </div>
  <!-- Death overlay (shown when character dies) -->
  <div class="death-overlay" id="deathOverlay">
    <div class="death-overlay-content">
      <h2>You have died</h2>
      <p class="death-overlay-subtitle">Your adventure ends here.</p>
      <div class="death-overlay-narration" id="deathOverlayNarration"></div>
      <div class="death-overlay-buttons">
        <button type="button" class="primary-button" id="deathBtnRestart">Restart adventure</button>
        <button type="button" class="secondary-button" id="deathBtnLoadSave">Load save</button>
      </div>
    </div>
  </div>
  <!-- Input Section (fixed to bottom) -->
  <div class="input-section half-bottom-notched">
    <div class="half-bottom-notched">
      <!-- Stage 5: structured room features (lore / searchable / interactive / puzzle cards) -->
      <div class="feature-cards" id="featureCards"></div>
      <!-- Stage 5: structured exits (connection buttons, incl. locked chips) -->
      <div class="connections-strip" id="connectionsStrip"></div>
      <!-- Dice Rolling Section -->
      <div class="dice-section" id="diceSection">
        <span class="dice-label" id="rollPrompt">Roll requested:</span>
        <button
          class="dice-button secondary-button"
          onclick="rollDice()"
          id="rollBtn"
        >
          Roll d20
        </button>
        <span class="dice-label">or enter result:</span>
        <input
          type="number"
          class="dice-input"
          id="diceInput"
          placeholder="1-20"
          min="1"
          max="20"
        />
        <button
          class="dice-button secondary-button"
          onclick="submitDiceRoll()"
          id="submitRollBtn"
        >
          Submit
        </button>
      </div>
      <!-- Action Prompt and Input -->
      <div class="action-prompt">What do you do?</div>

      <div class="input-wrapper">
        <input
          type="text"
          id="playerInput"
          placeholder="Describe your action... (press Enter)"
          onkeypress="handleKeyPress(event)"
          onkeydown="handleInputKeyDown(event)"
          disabled
        />
      </div>
    </div>
  </div>
</div>
